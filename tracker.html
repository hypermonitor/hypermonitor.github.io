          priceFooterWrapEl.classList.remove("rolling");
          priceTrackEl.style.setProperty("--price-scroll-distance", "50%");
          priceTrackEl.style.animationDuration = "";
          return;
        }
        const tops = new Set(Array.from(items).map((el) => el.offsetTop));
        const isWrapped = tops.size > 1;
        const isOverflow = priceListEl.scrollWidth > priceTickerEl.clientWidth + 4;
        const forceRoll = items.length >= 12;
        const shouldRoll = forceRoll || isWrapped || isOverflow;
        priceFooterWrapEl.classList.toggle("rolling", shouldRoll);
        if (shouldRoll) {
          let scrollDistance = 0;
          const exactDistance = priceListCloneEl ? priceListCloneEl.offsetLeft - priceListEl.offsetLeft : 0;
          if (Number.isFinite(exactDistance) && exactDistance > 0) {
            scrollDistance = exactDistance;
            priceTrackEl.style.setProperty("--price-scroll-distance", `${exactDistance}px`);
          } else {
            const trackStyle = getComputedStyle(priceTrackEl);
            const listGap = parseFloat(trackStyle.columnGap || trackStyle.gap || "0") || 0;
            scrollDistance = priceListEl.scrollWidth + listGap;
            priceTrackEl.style.setProperty("--price-scroll-distance", `${scrollDistance}px`);
          }
          const pxPerSecond = 52;
          const durationSeconds = Math.max(18, Math.min(42, scrollDistance / pxPerSecond));
          priceTrackEl.style.animationDuration = `${durationSeconds.toFixed(2)}s`;
        } else {
          priceTrackEl.style.setProperty("--price-scroll-distance", "50%");
          priceTrackEl.style.animationDuration = "";
        }
      }

      async function resolveCoinSymbol(input) {
        const cleaned = String(input || "").trim();
        if (!cleaned) return null;
        if (cleaned.includes(":")) return normalizeFooterCoinValue(cleaned);
        const lookup = cleaned.toLowerCase();
        if (coinNameCache.has(lookup)) return coinNameCache.get(lookup);

        const simple = lookup.replace(/[^a-z0-9]/g, "");
        if (simple && simple === lookup && simple.length <= 6) {
          return simple.toUpperCase();
        }

        try {
          const res = await fetch(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(cleaned)}`);
          if (!res.ok) throw new Error("search failed");
          const data = await res.json();
          const first = data?.coins?.[0];
          const symbol = first?.symbol ? String(first.symbol).toUpperCase() : null;
          if (symbol) {
            coinNameCache.set(lookup, symbol);
            const name = first?.name ? String(first.name).toLowerCase() : "";
            if (name) coinNameCache.set(name, symbol);
            saveCoinNameCache();
            return symbol;
          }
        } catch (e) {}

        return cleaned.toUpperCase();
      }

      function getInputCandidateSymbol(input) {
        const cleaned = String(input || "").trim();
        if (!cleaned) return null;
        if (cleaned.includes(":")) return normalizeFooterCoinValue(cleaned);
        const lookup = cleaned.toLowerCase();
        if (coinNameCache.has(lookup)) return coinNameCache.get(lookup);
        const simple = lookup.replace(/[^a-z0-9]/g, "");
        if (simple && simple === lookup && simple.length <= 6) return simple.toUpperCase();
        return cleaned.toUpperCase();
      }

        const symbol = await resolveCoinSymbol(raw);

        if (!base) return;
        if (findTrackedFooterCoinByBase(base)) return;

        const baseResult = await evaluateFooterCandidate(base);
        if (baseResult) {
          trackedFooterCoins.push(baseResult.coinKey);
          saveFooterCoins();
          renderFooterPrices();
          return;

        for (const prefixed of getPrefixedCandidates(base)) {
          // eslint-disable-next-line no-await-in-loop

          if (prefixedResult) {
            trackedFooterCoins.push(prefixedResult.coinKey);
            saveFooterCoins();
            renderFooterPrices();
            return;

        }
      }

    function parseColorToRgb(color) {
        if (!color) return null;
        const raw = String(color).trim();
        const hexMatch = raw.match(/^#([a-f0-9]{6})$/i);
        if (hexMatch) {
          const hex = hexMatch[1];
          const r = parseInt(hex.slice(0, 2), 16);
          const g = parseInt(hex.slice(2, 4), 16);
          const b = parseInt(hex.slice(4, 6), 16);
          return { r, g, b };
        }
        const rgbMatch = raw.match(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/i);
        if (rgbMatch) {
          return { r: Number(rgbMatch[1]), g: Number(rgbMatch[2]), b: Number(rgbMatch[3]) };
        }
        return null;
      }

      function isColorTooLight(color) {
        const rgb = parseColorToRgb(color);
        if (!rgb) return false;
        const { r, g, b } = rgb;
        const luminance = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
        return luminance > 0.82;
      }

  

    async function fetchFooterDexNames(force = false) {
      if (!force && Array.isArray(footerDexNames) && footerDexNames.length) return footerDexNames.slice();
      let names = [];
      try {
        const dexData = await fetchHyperliquidInfo({ type: "perpDexs" });
        names = (Array.isArray(dexData) ? dexData : [])
          .map((entry) => entry && entry.name)
          .filter((value) => typeof value === "string" && value.length > 0);
      } catch (error) {
        names = [];
      }
      footerDexNames = ["", ...names.filter((value, index, list) => list.indexOf(value) === index)];
      return footerDexNames.slice();
    }

    async function bootstrapFooterCatalog(force = false) {
      const dexNames = await fetchFooterDexNames(force);
      if (force) {
        HYPERLIQUID_TICKERS.clear();
        footerPrefixedMarketsByBase.clear();
      }
      const results = await Promise.allSettled(
        dexNames.map((dex) => fetchHyperliquidInfo(dex ? { type: "metaAndAssetCtxs", dex } : { type: "metaAndAssetCtxs" }))
      );

      results.forEach((result, index) => {
        if (result.status !== "fulfilled") return;
        const dex = dexNames[index] || "";
        const data = result.value;
        const meta = Array.isArray(data) ? data[0] : data && data.meta;
        const assetCtxs = Array.isArray(data) ? data[1] : data && data.assetCtxs;
        const universe = Array.isArray(meta?.universe) ? meta.universe : [];
        const ctxs = Array.isArray(assetCtxs) ? assetCtxs : [];
        const length = Math.max(universe.length, ctxs.length);

        for (let idx = 0; idx < length; idx += 1) {
          const entry = universe[idx] || {};
          const ctx = ctxs[idx] || {};
          const rawName = String(ctx.coin ?? ctx.symbol ?? ctx.asset ?? entry.name ?? "").trim();
          const key = buildCoinKey(rawName, dex);
          const base = getFooterBase(key);
          const markPx = Number(ctx.markPx ?? ctx.mark ?? ctx.midPx ?? ctx.mid ?? ctx.px);
          if (!key || entry.isDelisted) continue;
          if (!dex && base) HYPERLIQUID_TICKERS.add(base);
          else rememberPrefixedFooterMarket(key);
          if (Number.isFinite(markPx) && markPx > 0) {
            liveMids.set(key, markPx);
            if (!dex && !liveMids.has(base)) liveMids.set(base, markPx);
          }
        }
      });
    }

    function connectFooterWsForDex(dex = "") {
      const wsKey = String(dex || "");
      const existing = footerWsByDex.get(wsKey);
      if (existing && (existing.readyState === WebSocket.OPEN || existing.readyState === WebSocket.CONNECTING)) return;

      const ws = new WebSocket(HYPERLIQUID_WS_URL);
      footerWsByDex.set(wsKey, ws);

      ws.addEventListener("open", () => {
        const subscription = wsKey ? { type: "allMids", dex: wsKey } : { type: "allMids" };
        ws.send(JSON.stringify({ method: "subscribe", subscription }));
      });

      ws.addEventListener("message", (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg?.channel !== "allMids") return;
          const mids = msg?.data || {};
          Object.entries(mids).forEach(([rawName, value]) => {
            if (String(rawName || "").startsWith("@")) return;
            const px = Number(value);
            if (!Number.isFinite(px)) return;
            const key = buildCoinKey(rawName, wsKey);
            const base = getFooterBase(key);
            liveMids.set(key, px);
            if (!wsKey) liveMids.set(base, px);
          });
          renderFooterPrices();
        } catch (error) {}
      });

      ws.addEventListener("close", () => {
        if (footerWsByDex.get(wsKey) === ws) footerWsByDex.delete(wsKey);
        window.setTimeout(() => connectFooterWsForDex(wsKey), 2000);
      });

      ws.addEventListener("error", () => {
        try { ws.close(); } catch (error) {}
      });
    }

    async function ensureHeaderCoinOptions() {
      if (headerCoinOptionsPromise) return headerCoinOptionsPromise;

      headerCoinOptionsPromise = (async () => {
        let dexNames = [""];
        try {
          const dexData = await fetchHyperliquidInfo({ type: "perpDexs" });
          const names = (Array.isArray(dexData) ? dexData : [])
            .map((entry) => entry && entry.name)
            .filter((value) => typeof value === "string" && value.length > 0);
          dexNames = ["", ...names.filter((value, index, list) => list.indexOf(value) === index)];
        } catch (error) {
          dexNames = [""];
        }
        footerDexNames = dexNames.slice();

        const marketMap = new Map();
        const results = await Promise.allSettled(
          dexNames.map((dex) => fetchHyperliquidInfo(dex ? { type: "metaAndAssetCtxs", dex } : { type: "metaAndAssetCtxs" }))
        );

        results.forEach((result, resultIndex) => {
          if (result.status !== "fulfilled") return;
          const data = result.value;
          const dex = dexNames[resultIndex] || "";
          const meta = Array.isArray(data) ? data[0] : data && data.meta;
          const assetCtxs = Array.isArray(data) ? data[1] : data && data.assetCtxs;
          const universe = Array.isArray(meta && meta.universe) ? meta.universe : [];
          const ctxs = Array.isArray(assetCtxs) ? assetCtxs : [];
          const length = Math.max(universe.length, ctxs.length);

          for (let index = 0; index < length; index += 1) {
            const entry = universe[index] || {};
            const ctx = ctxs[index] || {};
            const rawName = String(ctx.coin ?? ctx.symbol ?? ctx.asset ?? entry.name ?? "").trim();
            const key = buildCoinKey(rawName, dex);
            const markPx = Number(ctx.markPx ?? ctx.mark ?? ctx.midPx ?? ctx.mid ?? ctx.px);
            if (!key || entry.isDelisted || !Number.isFinite(markPx) || markPx <= 0) continue;
            if (!dex) HYPERLIQUID_TICKERS.add(getCoinBaseName(key));
            else rememberPrefixedFooterMarket(key);
            if (!liveMids.has(key)) liveMids.set(key, markPx);
            if (!dex && !liveMids.has(getCoinBaseName(key))) liveMids.set(getCoinBaseName(key), markPx);

            if (!marketMap.has(key)) {
              const dexName = getCoinDexName(key);
              marketMap.set(key, {
                type: "coin",
                value: key,
                key,
                name: getCoinBaseName(key),
                label: getCoinLabel(key),
                meta: dexName ? `HIP-3 market • ${dexName}` : "Hyperliquid market",
                volume: Number(ctx.dayNtlVlm ?? 0)
              });
            }
          }
        });

        headerCoinOptions = Array.from(marketMap.values()).sort((left, right) => {
          const volumeDiff = (Number(right.volume) || 0) - (Number(left.volume) || 0);
          if (volumeDiff !== 0) return volumeDiff;
          return left.label.localeCompare(right.label);
        });

        return headerCoinOptions;
      })().catch((error) => {
        console.error("Failed to load header coin suggestions", error);
        headerCoinOptions = [];
        return headerCoinOptions;
      });

      return headerCoinOptionsPromise;
    }

    function buildCompactAssetHref(coin, paneId) {
      return "asset.html?coin=" + encodeURIComponent(coin) + "&compact=1&pane=" + encodeURIComponent(paneId);
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getDefaultTradeRowRatio(extraCount) {
      if (extraCount >= 2) return DEFAULT_TRADE_MULTI_ROW_RATIO_FOUR;
      if (extraCount === 1) return DEFAULT_TRADE_MULTI_ROW_RATIO_THREE;
      return DEFAULT_TRADE_SINGLE_ROW_RATIO;
    }

    function getTradeRowRatio(extraCount) {
      if (extraCount > 0) return state.tradeMultiRowRatio ?? getDefaultTradeRowRatio(extraCount);
      return state.tradeSingleRowRatio ?? getDefaultTradeRowRatio(extraCount);
    }

    function setTradeRowRatio(extraCount, ratio) {
      const nextRatio = Number.isFinite(ratio) ? ratio : getDefaultTradeRowRatio(extraCount);
      if (extraCount > 0) state.tradeMultiRowRatio = nextRatio;
      else state.tradeSingleRowRatio = nextRatio;
    }

    function getTradeMaxBookWidth(stackWidth) {
      const safeWidth = Number.isFinite(stackWidth) ? stackWidth : tradeViewStack?.getBoundingClientRect().width || 0;
      return Math.max(MIN_TRADE_BOOK_WIDTH, Math.round(safeWidth - MIN_TRADE_COLUMN_WIDTH * 2));
    }

    function clampTradeBookWidth(bookWidth, stackWidth) {
      const safeWidth = Number.isFinite(stackWidth) ? stackWidth : tradeViewStack?.getBoundingClientRect().width || 0;
      return clamp(Math.round(bookWidth || DEFAULT_TRADE_BOOK_WIDTH), MIN_TRADE_BOOK_WIDTH, getTradeMaxBookWidth(safeWidth));
    }

    function getTradeChartSplitRatio() {
      const ratio = Number(state.tradeChartSplitRatio);
      return Number.isFinite(ratio) ? clamp(ratio, 0.28, 0.72) : 0.5;
    }

    function getTradeVisibleBookWidth() {
      return state.topOrderBookVisible ? state.tradeBookWidth : 0;
    }

    function getTradeSharedLeftPx(stackWidth) {
      const width = Number.isFinite(stackWidth) ? stackWidth : tradeViewStack?.getBoundingClientRect().width || 0;
      const visibleBookWidth = getTradeVisibleBookWidth();
      const usableChartWidth = Math.max(MIN_TRADE_COLUMN_WIDTH * 2, width - visibleBookWidth);
      const targetLeft = Math.round(usableChartWidth * getTradeChartSplitRatio());
      return clamp(targetLeft, MIN_TRADE_COLUMN_WIDTH, Math.max(MIN_TRADE_COLUMN_WIDTH, width - MIN_TRADE_COLUMN_WIDTH));
    }

    function syncTradeSplitters(layout) {
      if (!tradeViewStack || !tradeRowSplitter || !tradeColumnSplitter) return;
      if (!layout || !Number.isFinite(layout.topPx)) {
        tradeRowSplitter.hidden = true;
        tradeColumnSplitter.hidden = true;
        return;
      }

      const rowTop = layout.topPx + ((layout.rowGap || 0) / 2);
      tradeViewStack.style.setProperty("--trade-row-splitter-top", rowTop + "px");
      tradeRowSplitter.hidden = false;
      if (layout.multi && Number.isFinite(layout.leftPx)) {
        tradeViewStack.style.setProperty("--trade-column-splitter-left", layout.leftPx + "px");
        tradeViewStack.style.setProperty("--trade-column-splitter-top", "0px");
        tradeColumnSplitter.hidden = false;
      } else {
        tradeColumnSplitter.hidden = true;
      }
    }

    function syncTradeFrameLayout() {
      if (!tradeFrame || !tradeFrame.contentWindow) return;
      try {
        tradeFrame.contentWindow.postMessage({
          type: "hypermonitor:tracker-layout",
          bookWidth: state.tradeBookWidth,
          chartSplitRatio: getTradeChartSplitRatio()
        }, "*");
      } catch (_) {
        // Ignore iframe timing issues during load.
      }
    }

    function applyTradeViewInlineLayout(extraCount) {
      if (!tradeViewStack) return;

      tradeViewStack.style.removeProperty("grid-template-columns");
      tradeViewStack.style.removeProperty("grid-template-rows");

      const bounds = tradeViewStack.getBoundingClientRect();
      const width = Math.round(bounds.width);
      const height = Math.round(bounds.height);

      if (!width || !height) {
        syncTradeSplitters(null);
        syncTradeFrameLayout();
        return;
      }

      tradeViewStack.style.setProperty("--trade-book-width", state.tradeBookWidth + "px");
      tradeViewStack.style.setProperty(
        "--top-frame-btn-right",
        (state.topOrderBookVisible ? (state.tradeBookWidth + 44) : 76) + "px"
      );

      const computed = getComputedStyle(tradeViewStack);
      const rowGap = parseFloat(computed.rowGap) || 0;
      const multiLayout = extraCount > 0;

      if (multiLayout) {
        const bookWidth = clampTradeBookWidth(state.tradeBookWidth, width);
        if (bookWidth !== state.tradeBookWidth) state.tradeBookWidth = bookWidth;
        tradeViewStack.style.setProperty("--trade-book-width", bookWidth + "px");

        const ratio = getTradeRowRatio(extraCount);
        const topMax = Math.max(MIN_TRADE_TOP_HEIGHT_MULTI, height - MIN_TRADE_BOTTOM_HEIGHT_MULTI);
        const topPx = clamp(Math.round(height * ratio), MIN_TRADE_TOP_HEIGHT_MULTI, topMax);
        const leftPx = clamp(getTradeSharedLeftPx(width), MIN_TRADE_COLUMN_WIDTH, Math.max(MIN_TRADE_COLUMN_WIDTH, width - MIN_TRADE_COLUMN_WIDTH));

        tradeViewStack.style.gridTemplateRows = "minmax(0, " + topPx + "px) minmax(0, 1fr)";
        tradeViewStack.style.gridTemplateColumns = "minmax(0, " + leftPx + "px) minmax(0, 1fr)";

        syncTradeSplitters({ multi: true, topPx, leftPx, rowGap: 0 });
        syncTradeFrameLayout();
        return;
      }

      const ratio = getTradeRowRatio(0);
      const usableHeight = Math.max(0, height - rowGap);
      const topMax = Math.max(MIN_TRADE_TOP_HEIGHT_SINGLE, usableHeight - MIN_TRADE_BOTTOM_HEIGHT_SINGLE);
      const topPx = clamp(Math.round(usableHeight * ratio), MIN_TRADE_TOP_HEIGHT_SINGLE, topMax);
      tradeViewStack.style.gridTemplateRows = "minmax(0, " + topPx + "px) minmax(0, 1fr)";
      syncTradeSplitters({ multi: false, topPx, rowGap });
      syncTradeFrameLayout();
    }

    function updateExtraTradeFrames() {
      extraTradeFrames.forEach((frame, index) => {
        if (!frame) return;
        const coin = state.extraCharts[index];
        if (!coin) return;
        const src = buildCompactAssetHref(coin, "extra-" + (index + 1));
        if (frame.getAttribute("src") !== src) {
          frame.setAttribute("src", src);
        }
      });
    }

    function syncTradeFrameExtraCount() {
      if (!tradeFrame || !tradeFrame.contentWindow) return;
      try {
        tradeFrame.contentWindow.postMessage({
          type: "hypermonitor:extra-chart-count",
          extraCount: state.extraCharts.length
        }, "*");
      } catch (_) {
        // Ignore iframe timing issues during load.
      }
    }

    function syncTradeTimeframe() {
      const tf = String(state.tradeTimeframe || "15m");
      const payload = {
        type: "hypermonitor:set-timeframe",
        tf,
        force: false
      };

      if (tradeFrame?.contentWindow) {
        try {
          tradeFrame.contentWindow.postMessage(payload, "*");
        } catch (_) {
          // Ignore iframe timing issues during load.
        }
      }

      extraTradeFrames.forEach((frame, index) => {
        if (!frame || index >= state.extraCharts.length || !frame.contentWindow) return;
        try {
          frame.contentWindow.postMessage(payload, "*");
        } catch (_) {
          // Ignore iframe timing issues during load.
        }
      });
    }

    function syncTradeDrawingTool() {
      const payload = {
        type: "hypermonitor:set-drawing-tool",
        tool: String(state.tradeDrawingTool || "cursor")
      };

      if (tradeFrame?.contentWindow) {
        try {
          tradeFrame.contentWindow.postMessage(payload, "*");
        } catch (_) {}

      extraTradeFrames.forEach((frame, index) => {
        if (!frame || index >= state.extraCharts.length || !frame.contentWindow) return;
        try {
          frame.contentWindow.postMessage(payload, "*");
        } catch (_) {}
      });
    }

    function syncTradeClearDrawings() {
      const payload = { type: "hypermonitor:clear-drawings" };

      if (tradeFrame?.contentWindow) {
        try {
          tradeFrame.contentWindow.postMessage(payload, "*");
        } catch (_) {}

      extraTradeFrames.forEach((frame, index) => {

        try {
          frame.contentWindow.postMessage(payload, "*");
        } catch (_) {}
      });
    }

    function syncTradeLayout() {
      const extraCount = state.extraCharts.length;
      const totalCharts = state.topChartCount + extraCount;
      const multiLayout = extraCount > 0;

      if (tradeViewStack) {
        tradeViewStack.dataset.layout = multiLayout ? "multi" : "default";
        tradeViewStack.dataset.extraCount = String(extraCount);
        applyTradeViewInlineLayout(extraCount);
      }

      extraChartPanels.forEach((panel, index) => {
        if (!panel) return;
        const active = index < extraCount;
        panel.classList.toggle("is-active", active);
      });

      if (tradeLeaderboardPanel) {
        tradeLeaderboardPanel.hidden = extraCount >= 2;
      }

      if (tradeAddChartBtn) {
        tradeAddChartBtn.hidden = Boolean(state.wallet) || !(state.topChartCount >= 2 && totalCharts < 4);
      }

      updateExtraTradeFrames();
      syncTradeFrameExtraCount();
      syncTradeFrameLayout();
    }

    function addExtraChart() {
      if (state.topChartCount < 2) return;
      if (state.extraCharts.length >= 2) return;
      const nextDefaultCoin = DEFAULT_EXTRA_CHART_COINS[state.extraCharts.length] || state.coin;
      state.extraCharts.push(nextDefaultCoin);
      syncTradeLayout();
    }

    function removeExtraChart(index) {
      if (!Number.isInteger(index) || index < 0 || index >= state.extraCharts.length) return;
      state.extraCharts.splice(index, 1);
      syncTradeLayout();
    }

    function removeLastExtraChart() {
      if (!state.extraCharts.length) return;
      removeExtraChart(state.extraCharts.length - 1);
    }

    function processTradeSplitDrag() {
      tradeSplitDrag.rafId = 0;
      if (!tradeSplitDrag.kind || !tradeViewStack) return;
      const bounds = tradeViewStack.getBoundingClientRect();
      const width = Math.round(bounds.width);
      const height = Math.round(bounds.height);
      if (!width || !height) return;

      if (tradeSplitDrag.kind === "column" && state.extraCharts.length > 0) {
        const visibleBookWidth = getTradeVisibleBookWidth();
        const usableChartWidth = Math.max(MIN_TRADE_COLUMN_WIDTH * 2, width - visibleBookWidth);
        const targetLeft = clamp(
          Math.round(tradeSplitDrag.lastClientX - bounds.left),
          MIN_TRADE_COLUMN_WIDTH,
          Math.max(MIN_TRADE_COLUMN_WIDTH, usableChartWidth - MIN_TRADE_COLUMN_WIDTH)
        );
        state.tradeChartSplitRatio = usableChartWidth > 0
          ? clamp(targetLeft / usableChartWidth, 0.28, 0.72)
          : 0.5;
        applyTradeViewInlineLayout(state.extraCharts.length);
        return;
      }

      if (tradeSplitDrag.kind === "row") {
        const extraCount = state.extraCharts.length;
        const rowGap = extraCount > 0 ? 0 : (parseFloat(getComputedStyle(tradeViewStack).rowGap) || 0);
        const usableHeight = Math.max(0, height - rowGap);
        const minTop = extraCount > 0 ? MIN_TRADE_TOP_HEIGHT_MULTI : MIN_TRADE_TOP_HEIGHT_SINGLE;
        const minBottom = extraCount > 0 ? MIN_TRADE_BOTTOM_HEIGHT_MULTI : MIN_TRADE_BOTTOM_HEIGHT_SINGLE;
        const targetTop = clamp(
          Math.round(tradeSplitDrag.lastClientY - bounds.top - rowGap / 2),
          minTop,
          Math.max(minTop, usableHeight - minBottom)
        );
        const nextRatio = usableHeight > 0 ? targetTop / usableHeight : getDefaultTradeRowRatio(extraCount);
        setTradeRowRatio(extraCount, nextRatio);
        applyTradeViewInlineLayout(extraCount);
      }
    }

    function queueTradeSplitDragFrame() {
      if (tradeSplitDrag.rafId) return;
      tradeSplitDrag.rafId = window.requestAnimationFrame(processTradeSplitDrag);
    }

    function stopTradeSplitDrag() {
      if (!tradeSplitDrag.kind) return;
      if (tradeSplitDrag.rafId) {
        window.cancelAnimationFrame(tradeSplitDrag.rafId);
        tradeSplitDrag.rafId = 0;
      }
      if (tradeSplitDrag.handle && tradeSplitDrag.pointerId !== null && typeof tradeSplitDrag.handle.releasePointerCapture === "function") {
        try {
          tradeSplitDrag.handle.releasePointerCapture(tradeSplitDrag.pointerId);
        } catch (_) {
          // Ignore capture release issues.
        }
      }
      tradeSplitDrag.kind = "";
      tradeSplitDrag.pointerId = null;
      tradeSplitDrag.handle = null;
      if (tradeRowSplitter) tradeRowSplitter.classList.remove("is-dragging");
      if (tradeColumnSplitter) tradeColumnSplitter.classList.remove("is-dragging");
      document.body.style.removeProperty("cursor");
      document.body.style.removeProperty("user-select");
    }

    function updateTradeSplitDrag(event) {
      if (!tradeSplitDrag.kind || !tradeViewStack) return;
      tradeSplitDrag.lastClientX = Number(event.clientX || 0);
      tradeSplitDrag.lastClientY = Number(event.clientY || 0);
      queueTradeSplitDragFrame();
    }

    function startTradeSplitDrag(kind, event) {
      if (!tradeViewStack) return;
      event.preventDefault();
      tradeSplitDrag.kind = kind;
      tradeSplitDrag.pointerId = event.pointerId;
      tradeSplitDrag.handle = event.currentTarget instanceof Element ? event.currentTarget : null;
      tradeSplitDrag.lastClientX = Number(event.clientX || 0);
      tradeSplitDrag.lastClientY = Number(event.clientY || 0);
      document.body.style.cursor = kind === "column" ? "col-resize" : "row-resize";
      document.body.style.userSelect = "none";
      if (tradeSplitDrag.handle && typeof tradeSplitDrag.handle.setPointerCapture === "function") {
        try {
          tradeSplitDrag.handle.setPointerCapture(event.pointerId);
        } catch (_) {
          // Ignore capture issues.
        }
      }
      if (kind === "column" && tradeColumnSplitter) tradeColumnSplitter.classList.add("is-dragging");
      if (kind === "row" && tradeRowSplitter) tradeRowSplitter.classList.add("is-dragging");
      queueTradeSplitDragFrame();
    }

    function buildPrimaryAssetHref(coin) {
      return "asset.html?coin=" + encodeURIComponent(coin);
    }

    function buildTradeFrameHref() {
      return state.wallet ? buildWalletShellTrackerHref(state.wallet) : buildPrimaryAssetHref(state.coin);
    }

    function updateTradeFrame(options = {}) {
      const src = buildTradeFrameHref();
      const currentSrc = String(tradeFrame?.getAttribute("src") || "");
      const nextIsAsset = !state.wallet;
      const currentIsAsset = currentSrc.includes("asset.html");
      const canUpdateInPlace =
        nextIsAsset &&
        currentIsAsset &&
        options.useMessage !== false &&
        tradeFrameReady &&
        Boolean(tradeFrame?.contentWindow) &&
        Boolean(currentSrc);

      if (canUpdateInPlace) {
        try {
          tradeFrame.contentWindow.postMessage({
            type: "hypermonitor:set-primary-coin",
            coin: state.coin
          }, "*");
          return;
        } catch (_) {
          // Fall back to a normal iframe navigation if the message cannot be delivered.
        }
      }

      tradeFrameReady = false;
      if (tradeFrame.getAttribute("src") !== src) {
        tradeFrame.setAttribute("src", src);
      }
    }

    function syncWalletUi() {
      const hasWallet = Boolean(state.wallet);
      if (selectedWalletPill) selectedWalletPill.hidden = !hasWallet;
      if (tradeWalletInline) tradeWalletInline.hidden = !hasWallet;
      if (viewWalletBtn) viewWalletBtn.hidden = !hasWallet;
      if (walletShellChrome) walletShellChrome.hidden = !hasWallet;
      if (topFramePanel) topFramePanel.classList.toggle("is-wallet-mode", hasWallet);

      if (hasWallet) {
        if (selectedWalletText) selectedWalletText.textContent = shortAddress(state.wallet);
        if (tradeWalletText) tradeWalletText.textContent = shortAddress(state.wallet);
      } else {
        if (selectedWalletText) selectedWalletText.textContent = "";
        if (tradeWalletText) tradeWalletText.textContent = "";

    function syncWalletModalTabs() {
      walletSectionTabButtons.forEach((button) => {
        const targetSection =
          walletShellChrome && walletShellChrome.contains(button)
            ? normalizeWalletShellSection(state.walletModalSection)
            : state.walletModalSection;
        const isActive = button.dataset.walletSection === targetSection;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-selected", isActive ? "true" : "false");
        if (isActive && window.matchMedia("(max-width: 720px)").matches) {
          requestAnimationFrame(() => {
            button.scrollIntoView({ block: "nearest", inline: "center", behavior: "smooth" });
          });

    function setWalletModalSection(nextSection, options = {}) {
      const normalizedSection = normalizeWalletModalSection(nextSection);
      const sectionChanged = normalizedSection !== state.walletModalSection;
      state.walletModalSection = normalizedSection;
      syncWalletModalTabs();
      if (options.syncFrame !== false && state.wallet && (sectionChanged || options.forceReload === true)) {
        if (walletModalBackdrop.classList.contains("is-open") && walletTrackerFrame) {
          walletTrackerFrame.src = buildWalletPopupHref(state.wallet, state.walletModalSection);

    function openWalletOverlay(wallet, options = {}) {

      if (!targetWallet) return;

      state.wallet = targetWallet;
      state.walletModalSection = normalizeWalletModalSection(options.section || "positions");

    function closeWalletOverlay(options = {}) {
      pendingTradeFavoritesPanelOpen = false;
      state.wallet = "";
      state.walletModalSection = "positions";

      syncWalletModalTabs();

      walletModalBackdrop.classList.remove("is-open");
      walletModalBackdrop.setAttribute("aria-hidden", "true");
      document.body.classList.remove("modal-open");
      updateTradeFrame({ useMessage: false });
      syncTradeLayout();

      if (!options.fromPopState) {
        updateUrl(options.pushHistory === true);
      }

    function highlightSelectedWallet() {
      leaderboardBodies.forEach((body) => {
        const rows = body.querySelectorAll("tr[data-wallet]");
        rows.forEach((row) => {
          row.classList.toggle("is-selected", row.dataset.wallet === state.wallet);
        });
      });
    }

    function perfForWindow(row, windowKey) {
      const performances = row && row.windowPerformances;
      if (!Array.isArray(performances)) return null;
      for (const entry of performances) {
        if (Array.isArray(entry) && entry[0] === windowKey) return entry[1] || null;
      }
      return null;
    }

    function normalizeLeaderboardRows(rows) {
      return (rows || []).map((row, index) => {
        const performance = perfForWindow(row, state.windowKey) || {};
        const address =
          row.ethAddress ||
          row.address ||
          row.user ||
          row.wallet ||
          "";

        const normalized = {
          rank: Number(row.rank ?? row.csvRank ?? index + 1),
          address,
          accountValue: Number(row.accountValue ?? row.account_value ?? NaN),
          pnl: Number(performance.pnl ?? performance.pnlUsd ?? performance.pnl_usd ?? NaN),
          roi: Number(performance.roi ?? performance.return ?? NaN),
          volume: Number(performance.vlm ?? performance.vol ?? performance.tradeVolume ?? NaN),
          walletScore: Number(row.wallet_score ?? row.walletScore ?? NaN),
          trendScore: Number(row.full_slope_score ?? row.trendScore ?? NaN),
          consistencyScore: Number(row.full_R_sq_score ?? row.consistencyScore ?? NaN),
          activityScore: Number(row.activity_score ?? row.activityScore ?? NaN)
        };

        return normalized;
      });
    }

    function computeFilterCounts(rows, filters) {
      const counts = {};
      filters.forEach((filterMeta) => {
        counts[filterMeta.id] = rows.filter((row) => filterMeta.test(row)).length;
      });
      return counts;
    }

    function renderSidebarFilters() {
      if (!profitFilterList || !sizeFilterList) return;

      const profitCounts = computeFilterCounts(state.normalizedRows, PROFIT_FILTERS);
      const sizeCounts = computeFilterCounts(state.normalizedRows, SIZE_FILTERS);

      profitFilterList.innerHTML = PROFIT_FILTERS.map((filterMeta) => (
        "<button class='sidebar-filter" + (state.profitFilter === filterMeta.id ? " is-active" : "") + "' type='button' data-profit-filter='" + filterMeta.id + "'>" +
          "<span class='sidebar-filter-top'><span>" + escapeHtml(filterMeta.label) + "</span><span>" + profitCounts[filterMeta.id] + "</span></span>" +
          "<span class='sidebar-filter-meta'>" + escapeHtml(filterMeta.description) + "</span>" +
        "</button>"
      )).join("");

      sizeFilterList.innerHTML = SIZE_FILTERS.map((filterMeta) => (
        "<button class='sidebar-filter" + (state.sizeFilter === filterMeta.id ? " is-active" : "") + "' type='button' data-size-filter='" + filterMeta.id + "'>" +
          "<span class='sidebar-filter-top'><span>" + escapeHtml(filterMeta.label) + "</span><span>" + sizeCounts[filterMeta.id] + "</span></span>" +
          "<span class='sidebar-filter-meta'>" + escapeHtml(filterMeta.description) + "</span>" +
        "</button>"
      )).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function applyFiltersAndSort() {
      const searchTerm = state.search.trim().toLowerCase();
      const profitMeta = findFilterMeta(PROFIT_FILTERS, state.profitFilter);
      const sizeMeta = findFilterMeta(SIZE_FILTERS, state.sizeFilter);

      let rows = state.normalizedRows.filter((row) => {
        if (!profitMeta.test(row) || !sizeMeta.test(row)) return false;

        if (!searchTerm) return true;

        const haystack = [
          row.address,
          sizeTierLabel(row),
          qualityLabel(row.walletScore),
          percentFormat(row.roi),
          compactMoney(row.accountValue)
        ].join(" ").toLowerCase();

        return haystack.includes(searchTerm);
      });

      rows.sort((left, right) => {
        const leftValue = getLeaderboardSortValue(left, state.sortKey);
        const rightValue = getLeaderboardSortValue(right, state.sortKey);

        const leftIsNumber = typeof leftValue === "number" && Number.isFinite(leftValue);
        const rightIsNumber = typeof rightValue === "number" && Number.isFinite(rightValue);

        if (leftIsNumber || rightIsNumber) {
          if (!leftIsNumber && !rightIsNumber) return 0;
          if (!leftIsNumber) return 1;
          if (!rightIsNumber) return -1;
          return state.sortDir === "asc" ? leftValue - rightValue : rightValue - leftValue;
        }

        const leftText = String(leftValue || "");
        const rightText = String(rightValue || "");
        const compare = leftText.localeCompare(rightText, undefined, { numeric: true, sensitivity: "base" });
        return state.sortDir === "asc" ? compare : -compare;
      });

      const limit = Number(state.limit) || 100;
      state.displayRows = rows.slice(0, limit);
      renderActiveFilters(rows.length);
      renderTable(state.displayRows);
      renderSortIndicators();
      renderSidebarFilters();
    }

    function renderActiveFilters(filteredCount) {
      const chips = [];
      if (state.profitFilter !== "all") {
        const text = "Profit: " + findFilterMeta(PROFIT_FILTERS, state.profitFilter).label;
        chips.push("<span class='filter-chip' title='" + escapeHtml(text) + "'>" + escapeHtml(text) + "</span>");
      }
      if (state.sizeFilter !== "all") {
        const text = "Size: " + findFilterMeta(SIZE_FILTERS, state.sizeFilter).label;
        chips.push("<span class='filter-chip' title='" + escapeHtml(text) + "'>" + escapeHtml(text) + "</span>");
      }
      const markup = chips.join("");
      activeFilterTargets.forEach((target) => {
        target.innerHTML = markup;
      });
      activeFilterBars.forEach((bar) => {
        bar.classList.toggle("is-hidden", chips.length === 0);
      });
    }

    function renderSortIndicators() {
      document.querySelectorAll("th.sortable").forEach((header) => {
        const key = header.getAttribute("data-key");
        const indicator = header.querySelector(".sort-indicator");
        if (!indicator) return;
        if (key === state.sortKey) {
          header.setAttribute("data-sort-dir", state.sortDir);
          indicator.textContent = state.sortDir === "asc" ? " ↑" : " ↓";
        } else {
          header.removeAttribute("data-sort-dir");
          indicator.textContent = "";
        }
      });
    }

    function renderTable(rows) {
      if (!rows.length) {
        leaderboardBodies.forEach((body) => {
          body.innerHTML = "<tr><td colspan='11' class='table-empty'>No wallets matched the current filters.</td></tr>";
        });
        return;
      }

      const markup = rows.map((row) => {
        const pnlClass = Number.isFinite(row.pnl) ? (row.pnl >= 0 ? "positive" : "negative") : "neutral";
        const roiClass = Number.isFinite(row.roi) ? (row.roi >= 0 ? "positive" : "negative") : "neutral";
        const qualityPct = scorePercent(row.walletScore);
        const trendPct = scorePercent(row.trendScore);
        const consistencyPct = scorePercent(row.consistencyScore);
        const activityPct = scorePercent(row.activityScore);
        const roiTone = Number.isFinite(row.roi) ? getSignedToneColor(row.roi * 100, 180) : "";
        const pnlTone = Number.isFinite(row.roi) ? getSignedToneColor(row.roi * 100, 180) : "";
        const href = buildWalletTrackerHref(row.address);
        const selectedClass = row.address === state.wallet ? " is-selected" : "";
        const favoriteClass = isFavoriteWallet(row.address) ? " is-active" : "";

        return (
          "<tr class='" + selectedClass.trim() + "' data-wallet='" + escapeHtml(row.address) + "'>" +
            "<td class='favorite-wallet-cell'>" +
              "<button class='wallet-favorite-btn" + favoriteClass + "' type='button' aria-label='Favorite wallet' title='Favorite wallet' data-wallet-star='" + escapeHtml(row.address) + "'>" +
                "<svg viewBox='0 0 24 24' aria-hidden='true'>" +
                  "<path d='M12 3.9 14.5 8.8l5.4.77-3.9 3.75.92 5.3L12 16l-4.92 2.61.93-5.3-3.9-3.75 5.4-.77L12 3.9Z' fill='currentColor'></path>" +
                "</svg>" +
              "</button>" +
            "</td>" +
            "<td><span class='rank-badge'>" + row.rank + "</span></td>" +
            "<td>" +
              "<a class='wallet-link' href='" + escapeHtml(href) + "' data-wallet-link='" + escapeHtml(row.address) + "'>" +
                "<strong>" + escapeHtml(shortLeaderboardAddress(row.address)) + "</strong>" +
              "</a>" +
            "</td>" +
            "<td class='money hide-phone'>" + moneyFormat(row.accountValue) + "</td>" +
            "<td class='money " + pnlClass + "'" + (pnlTone ? " style='color:" + escapeHtml(pnlTone) + "'" : "") + ">" + moneyFormat(row.pnl) + "</td>" +
            "<td class='money " + roiClass + "'" + (roiTone ? " style='color:" + escapeHtml(roiTone) + "'" : "") + ">" + percentFormat(row.roi) + "</td>" +
            "<td class='money hide-mobile'>" + compactMoney(row.volume) + "</td>" +
            "<td class='hide-phone'>" + renderScoreCell(qualityPct) + "</td>" +
            "<td class='hide-tablet'>" + renderScoreCell(trendPct) + "</td>" +
            "<td class='hide-tablet'>" + renderScoreCell(consistencyPct) + "</td>" +
            "<td class='hide-mobile'>" + renderScoreCell(activityPct) + "</td>" +
          "</tr>"
        );
      }).join("");

      leaderboardBodies.forEach((body) => {
        body.innerHTML = markup;
      });

      highlightSelectedWallet();
    }

    function renderScoreCell(percent) {
      const safePercent = Number.isFinite(percent) ? Math.max(0, Math.min(100, percent)) : 0;
      const label = Number.isFinite(percent) ? safePercent.toFixed(1) : "-";
      const toneColor = getScoreToneColor(safePercent);
      return (
        "<div class='score-cell'>" +
          "<span class='score-value' style='--score-color:" + escapeHtml(toneColor) + ";'>" + label + "</span>" +
        "</div>"
      );
    }

    async function loadLeaderboard() {
      setStatus("", "Loading leaderboard");
      setLoadingState(true);

      try {
        const sources = getLeaderboardSources();
        let rows = null;
        let usedSource = null;
        let lastError = null;
        let storageSourceFailed = false;

        for (const candidate of sources) {
          try {
            const json = await fetchLeaderboardPayload(candidate.url);
            rows = parseLeaderboardRows(json);
            usedSource = candidate.source;
            break;
          } catch (error) {
            lastError = error;
            if (candidate.source === "storage") storageSourceFailed = true;
          }
        }

        if (!rows) {
          const cached = loadCachedLeaderboardRows();
          if (cached?.rows?.length) {
            state.rawRows = cached.rows;
            state.normalizedRows = normalizeLeaderboardRows(cached.rows);
            setStatus("ok", "Showing cached leaderboard");
            setLoadingState(false);
            applyFiltersAndSort();
            updateHeaderSuggestions();
            return;
          }
          throw lastError || new Error("Failed to fetch leaderboard");
        }

        if (storageSourceFailed && usedSource === "default") {
          clearStoredLeaderboardUrl();
        }

        state.rawRows = rows;
        state.normalizedRows = normalizeLeaderboardRows(rows);
        saveCachedLeaderboardRows(rows);
        setStatus("ok", "Loaded " + state.normalizedRows.length.toLocaleString() + " wallets");
        setLoadingState(false);
        applyFiltersAndSort();
        updateHeaderSuggestions();
      } catch (error) {
        console.error("Failed to load leaderboard", error);
        setStatus("err", "Leaderboard failed to load");
        setLoadingState(false);
        const markup =
          "<tr><td colspan='11' class='table-empty'>Failed to load the leaderboard. " +
          escapeHtml(String(error && error.message ? error.message : error)) +
          "</td></tr>";
        leaderboardBodies.forEach((body) => {
          body.innerHTML = markup;
        });
      }
    }

    function handleTableClick(event) {
      const target = event.target;
      if (!(target instanceof Element)) return;
      const favoriteBtn = target.closest("[data-wallet-star]");
      if (favoriteBtn) {
        event.preventDefault();
        event.stopPropagation();
        const wallet = favoriteBtn.getAttribute("data-wallet-star") || "";
        if (!wallet) return;
        if (toggleFavoriteWallet(wallet)) {
          renderTable(state.displayRows);
        }
        return;
      }
      const row = target.closest("tr[data-wallet]");
      if (!row) return;
      const wallet = row.getAttribute("data-wallet") || "";
      if (!wallet) return;
      event.preventDefault();
      openWalletOverlay(wallet, { pushHistory: true });
    }

    function syncFromUrl() {
      const nextCoin = parseCoin();
      const nextWallet = parseWallet();

      setCoin(nextCoin, { fromPopState: true });

      if (nextWallet) openWalletOverlay(nextWallet, { fromPopState: true });
      else closeWalletOverlay({ fromPopState: true });
    }

    function copyCurrentLink() {
      const link = buildWalletShellHref(state.wallet);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(link).then(() => {
          setStatus("ok", "Copied tracker link");
        }).catch(() => {
          setStatus("err", "Unable to copy link");
        });
        return;
      }

      try {
        const temp = document.createElement("input");
        temp.value = link;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        setStatus("ok", "Copied tracker link");
      } catch (error) {
        setStatus("err", "Unable to copy link");
      }
    }

    function closeHeaderSuggestions() {
      state.headerSuggestions = [];
      state.headerSuggestionIndex = -1;
      if (headerSearchSuggestions) headerSearchSuggestions.hidden = true;
      if (headerSearchInput) headerSearchInput.setAttribute("aria-expanded", "false");
    }

    function renderHeaderSuggestions() {
      if (!headerSearchSuggestions) return;
      const suggestions = state.headerSuggestions || [];

      if (!suggestions.length) {
        headerSearchSuggestions.innerHTML = "";
        headerSearchSuggestions.hidden = true;
        if (headerSearchInput) headerSearchInput.setAttribute("aria-expanded", "false");
        return;
      }

      headerSearchSuggestions.innerHTML = suggestions.map((item, index) => (
        "<button class='header-search-suggestion" + (index === state.headerSuggestionIndex ? " is-active" : "") + "' type='button' data-suggestion-index='" + index + "'>" +
          "<span class='header-search-suggestion-copy'>" +
            "<span class='header-search-suggestion-label'>" + escapeHtml(item.label) + "</span>" +
            "<span class='header-search-suggestion-meta'>" + escapeHtml(item.meta) + "</span>" +
          "</span>" +
          "<span class='header-search-suggestion-type'>" + escapeHtml(item.type) + "</span>" +
        "</button>"
      )).join("");

      headerSearchSuggestions.hidden = false;
      if (headerSearchInput) headerSearchInput.setAttribute("aria-expanded", "true");
    }

    function scoreWalletSuggestion(address, query) {
      const target = String(address || "").toLowerCase();
      if (!target) return Number.POSITIVE_INFINITY;
      if (target === query) return 0;
      if (target.startsWith(query)) return 1;
      const idx = target.indexOf(query);
      return idx === -1 ? Number.POSITIVE_INFINITY : idx + 2;
    }

    function scoreCoinSuggestion(item, query) {
      const normalized = String(query || "").toUpperCase();
      const candidates = [
        String(item.label || "").toUpperCase(),
        String(item.name || "").toUpperCase(),
        String(item.key || "").toUpperCase()
      ];
      if (candidates.some((candidate) => candidate === normalized)) return 0;
      if (candidates.some((candidate) => candidate.startsWith(normalized))) return 1;
      const indexes = candidates
        .map((candidate) => candidate.indexOf(normalized))
        .filter((value) => value >= 0);
      return indexes.length ? Math.min(...indexes) + 2 : Number.POSITIVE_INFINITY;
    }

    function buildWalletSuggestions(query) {
      const normalizedQuery = String(query || "").trim().toLowerCase();
      if (!normalizedQuery) return [];
      const seen = new Set();
      return state.normalizedRows
        .filter((row) => row.address && row.address.toLowerCase().includes(normalizedQuery))
        .sort((left, right) => {
          const scoreDiff = scoreWalletSuggestion(left.address, normalizedQuery) - scoreWalletSuggestion(right.address, normalizedQuery);
          if (scoreDiff !== 0) return scoreDiff;
          return Number(left.rank || 0) - Number(right.rank || 0);
        })
        .filter((row) => {
          if (seen.has(row.address)) return false;
          seen.add(row.address);
          return true;
        })
        .slice(0, 5)
        .map((row) => ({
          type: "wallet",
          value: row.address,
          label: shortAddress(row.address),
          meta: `${row.address} • ${sizeTierLabel(row)}`
        }));
    }

    function buildCoinSuggestions(query) {
      const normalizedQuery = normalizeCoinQuery(query);
      if (!normalizedQuery) return [];
      return headerCoinOptions
        .filter((item) => (
          String(item.label || "").toUpperCase().includes(normalizedQuery) ||
          String(item.name || "").toUpperCase().includes(normalizedQuery) ||
          String(item.key || "").toUpperCase().includes(normalizedQuery)
        ))
        .sort((left, right) => {
          const scoreDiff = scoreCoinSuggestion(left, normalizedQuery) - scoreCoinSuggestion(right, normalizedQuery);
          if (scoreDiff !== 0) return scoreDiff;
          const volumeDiff = (Number(right.volume) || 0) - (Number(left.volume) || 0);
          if (volumeDiff !== 0) return volumeDiff;
          return left.label.localeCompare(right.label);
        })
        .slice(0, 5)
        .map((item) => ({
          type: "asset",
          value: item.value,
          label: item.label,
          meta: item.meta
        }));
    }

    function updateHeaderSuggestions() {
      if (!headerSearchInput) return;
      const rawQuery = headerSearchInput.value.trim();
      if (!rawQuery) {
        closeHeaderSuggestions();
        return;
      }

      const walletSuggestions = buildWalletSuggestions(rawQuery);
      const coinSuggestions = buildCoinSuggestions(rawQuery);
      const preferWallets = rawQuery.toLowerCase().startsWith("0x");
      const combined = (preferWallets ? walletSuggestions.concat(coinSuggestions) : coinSuggestions.concat(walletSuggestions))
        .filter((item, index, list) => list.findIndex((candidate) => candidate.type === item.type && candidate.value === item.value) === index)
        .slice(0, 8);

      state.headerSuggestions = combined;
      state.headerSuggestionIndex = -1;
      renderHeaderSuggestions();
    }

    function applyHeaderSuggestion(index) {
      const item = state.headerSuggestions[index];
      if (!item) return;
      closeHeaderSuggestions();
      if (headerSearchInput) {
        headerSearchInput.setCustomValidity("");
        headerSearchInput.value = item.type === "asset" ? item.label : item.value;
      }
      if (item.type === "wallet") {
        openWalletOverlay(item.value, { pushHistory: true });
        return;
      }
      openCoinInShell(item.value, { pushHistory: true });
    }

    function focusHeaderSearch(options = {}) {
      if (!headerSearchInput) return;
      headerSearchInput.focus({ preventScroll: options.preventScroll !== false });
      headerSearchInput.select();
      ensureHeaderCoinOptions().then(() => {
        updateHeaderSuggestions();
      });
    }

    function submitHeaderSearch(rawValue) {
      const value = String(rawValue || "").trim();
      if (!value) return;
      closeHeaderSuggestions();

      if (isWalletAddress(value)) {
        if (headerSearchInput) headerSearchInput.value = value;
        openWalletOverlay(value, { pushHistory: true });
        return;
      }

      const coin = normalizeCoinQuery(value);
      const exactCoinMatch = headerCoinOptions.find((item) => (
        String(item.key || "").toUpperCase() === coin ||
        String(item.label || "").toUpperCase() === coin ||
        String(item.name || "").toUpperCase() === coin
      ));

      if (exactCoinMatch) {
        if (headerSearchInput) {
          headerSearchInput.setCustomValidity("");
          headerSearchInput.value = exactCoinMatch.label;
        }
        openCoinInShell(exactCoinMatch.value, { pushHistory: true });
        return;
      }

      if (!isCoinQuery(coin)) {
        if (headerSearchInput) {
          headerSearchInput.setCustomValidity("Enter a full wallet address or asset symbol.");
          headerSearchInput.reportValidity();
        }
        return;
      }

      if (headerSearchInput) {
        headerSearchInput.setCustomValidity("Choose a suggested asset or enter the full symbol.");
        headerSearchInput.reportValidity();
      }
    }

    if (marketChipGroup) {
      marketChipGroup.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const button = target.closest("[data-coin]");
        if (!button) return;
        setCoin(button.getAttribute("data-coin"));
      });
    }

    if (walletJumpForm && walletJumpInput) {
      walletJumpForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const wallet = walletJumpInput.value.trim();
        if (!wallet) return;
        openWalletOverlay(wallet, { pushHistory: true });
        walletJumpInput.value = wallet;
      });
    }

    if (headerSearchInput) {
      headerSearchInput.addEventListener("input", () => {
        headerSearchInput.setCustomValidity("");
        updateHeaderSuggestions();
      });

      headerSearchInput.addEventListener("focus", () => {
        ensureHeaderCoinOptions().then(() => {
          updateHeaderSuggestions();
        });
      });

      headerSearchInput.addEventListener("keydown", (event) => {
        if (!state.headerSuggestions.length) {
          if (event.key === "Escape") closeHeaderSuggestions();
          return;
        }

        if (event.key === "ArrowDown") {
          event.preventDefault();
          state.headerSuggestionIndex =
            state.headerSuggestionIndex < state.headerSuggestions.length - 1
              ? state.headerSuggestionIndex + 1
              : 0;
          renderHeaderSuggestions();
          return;
        }

        if (event.key === "ArrowUp") {
          event.preventDefault();
          state.headerSuggestionIndex =
            state.headerSuggestionIndex > 0
              ? state.headerSuggestionIndex - 1
              : state.headerSuggestions.length - 1;
          renderHeaderSuggestions();
          return;
        }

        if (event.key === "Enter" && state.headerSuggestionIndex >= 0) {
          event.preventDefault();
          applyHeaderSuggestion(state.headerSuggestionIndex);
          return;
        }

        if (event.key === "Escape") {
          event.preventDefault();
          closeHeaderSuggestions();
        }
      });
    }

    if (headerThemeBtn) {
      headerThemeBtn.addEventListener("click", () => {
        applyTheme(getActiveTheme() === "light" ? "dark" : "light");
      });
    }

    if (headerFavoritesBtn) {
      headerFavoritesBtn.addEventListener("click", () => {
        requestTradeFavoritesPanel();
      });
    }

    if (headerSearchForm) {
      headerSearchForm.addEventListener("submit", (event) => {
        event.preventDefault();
        submitHeaderSearch(headerSearchInput ? headerSearchInput.value : "");
      });
    }

    if (headerSearchSuggestions) {
      headerSearchSuggestions.addEventListener("mousedown", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.closest("[data-suggestion-index]")) event.preventDefault();
      });

      headerSearchSuggestions.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const button = target.closest("[data-suggestion-index]");
        if (!button) return;
        const index = Number(button.getAttribute("data-suggestion-index"));
        if (!Number.isFinite(index)) return;
        applyHeaderSuggestion(index);
      });
    }

    if (viewWalletBtn) {
      viewWalletBtn.addEventListener("click", () => {
        if (!state.wallet) return;
        openWalletOverlay(state.wallet, { pushHistory: false });
      });
    }

    if (closeWalletShellBtn) {
      closeWalletShellBtn.addEventListener("click", () => {
        closeWalletOverlay({ pushHistory: true });
      });
    }

    if (profitFilterList) {
      profitFilterList.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const button = target.closest("[data-profit-filter]");
        if (!button) return;
        state.profitFilter = button.getAttribute("data-profit-filter") || "all";
        applyFiltersAndSort();
      });
    }

    if (sizeFilterList) {
      sizeFilterList.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const button = target.closest("[data-size-filter]");
        if (!button) return;
        state.sizeFilter = button.getAttribute("data-size-filter") || "all";
        applyFiltersAndSort();
      });
    }

    document.querySelectorAll("th.sortable").forEach((header) => {
      header.addEventListener("click", () => {
        const key = header.getAttribute("data-key");
        if (!key) return;
        if (state.sortKey === key) state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
        else {
          state.sortKey = key;
          state.sortDir = getLeaderboardSortDefaultDir(key);
        }
        applyFiltersAndSort();
      });
    });

    if (tbody) tbody.addEventListener("click", handleTableClick);
    if (tradeTbody) tradeTbody.addEventListener("click", handleTableClick);

    if (marketHeatmapTiles) {
      marketHeatmapTiles.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const tile = target.closest("[data-heatmap-coin]");
        if (!tile) return;
        const coin = tile.getAttribute("data-heatmap-coin");
        if (!coin) return;
        openCoinInShell(coin);
      });
    }

    walletModalBackdrop.addEventListener("click", (event) => {
      if (event.target === walletModalBackdrop) {
        closeWalletOverlay({ pushHistory: true });
      }
    });

    walletSectionTabButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (!state.wallet) return;
        const fallbackSection =
          walletShellChrome && walletShellChrome.contains(button) ? "positions" : "overview";
        setWalletModalSection(button.dataset.walletSection || fallbackSection);
      });
    });

    document.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof Node)) return;
      if (headerSearchForm && !headerSearchForm.contains(target)) {
        closeHeaderSuggestions();
      }
    });

    closeWalletModalBtn.addEventListener("click", () => {
      closeWalletOverlay({ pushHistory: true });
    });

    copyWalletLinkBtn.addEventListener("click", () => {
      if (!state.wallet) return;
      copyCurrentLink();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && walletModalBackdrop.classList.contains("is-open")) {
        closeWalletOverlay({ pushHistory: true });
      }
    });

    window.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && !event.shiftKey && !event.altKey && String(event.key || "").toLowerCase() === "k") {
        event.preventDefault();
        focusHeaderSearch();
      }
    });

    window.addEventListener("popstate", () => {
      syncFromUrl();
    });

    if (priceAddBtnEl) {
      priceAddBtnEl.addEventListener("click", async () => {
        const value = priceAddInputEl?.value || "";
        if (isCompactFooterAddMode() && !footerAddCompactOpen) {
          openFooterAddControls();
          return;
        }
        await toggleFooterCoin(value);
        if (priceAddInputEl) priceAddInputEl.value = "";
        updateFooterActionLabel();
        closeFooterAddControls(true);
      });
    }

    if (priceAddToggleBtnEl) {
      priceAddToggleBtnEl.addEventListener("click", () => {
        openFooterAddControls();
      });
    }

    if (priceAddInputEl) {
      priceAddInputEl.addEventListener("keydown", async (event) => {
        if (event.key === "Enter") {
          await toggleFooterCoin(priceAddInputEl.value);
          priceAddInputEl.value = "";
          updateFooterActionLabel();
          closeFooterAddControls(true);
        } else if (event.key === "Escape") {
          priceAddInputEl.value = "";
          updateFooterActionLabel();
          closeFooterAddControls(true);
        }
      });
      priceAddInputEl.addEventListener("input", updateFooterActionLabel);
      priceAddInputEl.addEventListener("blur", () => {
        window.setTimeout(() => closeFooterAddControls(false), 0);
      });
    }

    if (priceListEl) {
      let draggingCoin = null;
      let draggingEl = null;
      let lastDragOrder = null;

      const commitFooterOrder = (order) => {
        const ordered = Array.isArray(order)
          ? order
          : Array.from(priceListEl.querySelectorAll(".price-item")).map((item) => item.dataset.coin).filter(Boolean);
        if (!ordered.length) return;
        trackedFooterCoins = ordered;
        saveFooterCoins();
        renderFooterPrices();
      };

      const getDragAfterElement = (container, x) => {
        const items = Array.from(container.querySelectorAll(".price-item:not(.dragging)"));
        let closest = null;
        let closestOffset = Number.NEGATIVE_INFINITY;
        items.forEach((item) => {
          const rect = item.getBoundingClientRect();
          const offset = x - rect.left - rect.width / 2;
          if (offset < 0 && offset > closestOffset) {
            closestOffset = offset;
            closest = item;
          }
        });
        return closest;
      };

      priceListEl.addEventListener("dragstart", (event) => {
        const item = event.target.closest(".price-item");
        if (!item) return;
        draggingCoin = item.dataset.coin;
        draggingEl = item;
        lastDragOrder = null;
        item.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
        try { event.dataTransfer.setData("text/plain", draggingCoin); } catch (error) {}
      });

      priceListEl.addEventListener("selectstart", (event) => {
        const target = event.target;
        const origin =
          target instanceof Element
            ? target
            : target instanceof Node
              ? target.parentElement
              : null;
        if (origin?.closest(".price-item")) {
          event.preventDefault();
        }
      });

      priceListEl.addEventListener("dragend", (event) => {
        const item = event.target.closest(".price-item");
        if (item) item.classList.remove("dragging");
        if (lastDragOrder) commitFooterOrder(lastDragOrder);
        draggingCoin = null;
        draggingEl = null;
        lastDragOrder = null;
        lastFooterDragEndedAt = Date.now();
      });

      priceListEl.addEventListener("dragover", (event) => {
        if (!draggingEl) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = "move";
        const after = getDragAfterElement(priceListEl, event.clientX);
        if (after === draggingEl) return;
        if (after == null) priceListEl.appendChild(draggingEl);
        else priceListEl.insertBefore(draggingEl, after);
        lastDragOrder = Array.from(priceListEl.querySelectorAll(".price-item")).map((item) => item.dataset.coin).filter(Boolean);
      });

      priceListEl.addEventListener("drop", (event) => {
        const item = event.target.closest(".price-item");
        if (!item || !draggingCoin) return;
        event.preventDefault();
        trackedFooterCoins = Array.from(priceListEl.querySelectorAll(".price-item")).map((entry) => entry.dataset.coin).filter(Boolean);
        saveFooterCoins();
        renderFooterPrices();
      });
    }

    if (priceFooterWrapEl) {
      priceFooterWrapEl.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (
          target.closest(".price-currency-switch") ||
          target.closest(".price-controls") ||
          target.closest(".price-input") ||
          target.closest(".price-add-btn") ||
          target.closest("#priceContextMenu")
        ) {
          return;
        }

        const item = target.closest(".price-item");
        if (!item) return;
        if (Date.now() - lastFooterDragEndedAt < 250) return;

        const coin = item.dataset.coin;
        if (!coin) return;

        event.preventDefault();
        event.stopPropagation();
        openCoinInShell(coin);
      });

      priceFooterWrapEl.addEventListener("contextmenu", (event) => {
        if (
          event.target.closest(".price-currency-switch") ||
          event.target.closest(".price-controls") ||
          event.target.closest(".price-input") ||
          event.target.closest(".price-add-btn")
        ) {
          return;
        }
        const item = event.target.closest(".price-item");
        event.preventDefault();
        showPriceContextMenu(event.clientX, event.clientY, item ? item.dataset.coin : null);
      });
    }

    if (priceCurrencySwitchEl) {
      priceCurrencySwitchEl.addEventListener("click", (event) => {
        const btn = event.target.closest(".price-currency-btn");
        if (!btn) return;
        setFooterPriceCurrency(btn.dataset.currency, { forceRate: true });
      });
    }

    if (priceContextMenuEl) {
      priceContextMenuEl.addEventListener("click", (event) => {
        const btn = event.target.closest("[data-action]");
        if (!btn) return;
        const action = btn.dataset.action;
        if (action === "remove" && priceContextCoin) {
          removeFooterCoin(priceContextCoin);
        } else if (action === "pin" && priceContextCoin) {
          trackedFooterCoins = [priceContextCoin].concat(trackedFooterCoins.filter((coin) => coin !== priceContextCoin));
          saveFooterCoins();
          renderFooterPrices();
        } else if (action === "reset") {
          if (window.confirm("Reset the bottom bar to the default coins?")) {
            resetFooterCoins();
            refreshFooterBar();
          }
        } else if (action === "toggle-change") {
          footerChangeEnabled = !footerChangeEnabled;
          saveFooterChangePrefs();
          applyFooterChangeVisibility();
          updateFooterChangeMenu();
          refreshFooterBar();
        } else if (action === "change-currency") {
          setFooterPriceCurrency(btn.dataset.currency, { forceRate: true });
          updateFooterChangeMenu();
        } else if (action === "change-separators") {
          const count = Number(btn.dataset.count);
          if (FOOTER_SEPARATOR_OPTIONS.has(count)) {
            footerSeparatorEvery = count;
            saveFooterChangePrefs();
            updateFooterChangeMenu();
            renderFooterPrices();
          }
        } else if (action === "change-range") {
          const range = btn.dataset.range;
          if (range && FOOTER_CHANGE_RANGES[range]) {
            footerChangeRange = range;
            saveFooterChangePrefs();
            updateFooterChangeMenu();
            refreshFooterBar();
          }
        }
        hidePriceContextMenu();
      });
    }

    document.addEventListener("click", (event) => {
      if (priceContextMenuEl && priceContextMenuEl.classList.contains("show") && !event.target.closest("#priceContextMenu")) {
        hidePriceContextMenu();
      }
      if (priceControlsEl && isCompactFooterAddMode() && !event.target.closest("#priceControls")) {
        closeFooterAddControls(false);
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") hidePriceContextMenu();
    });

    window.addEventListener("resize", () => {
      hidePriceContextMenu();
      updatePriceTickerRolling();
      if (!isCompactFooterAddMode()) footerAddCompactOpen = false;
      syncFooterAddControls();
      syncTradeLayout();
    });

    window.addEventListener("scroll", hidePriceContextMenu, true);

    if (tradeAddChartBtn) {
      tradeAddChartBtn.addEventListener("click", () => {
        addExtraChart();
      });
    }

    if (tradeRowSplitter) {
      tradeRowSplitter.addEventListener("pointerdown", (event) => {
        startTradeSplitDrag("row", event);
      });
    }

    if (tradeColumnSplitter) {
      tradeColumnSplitter.addEventListener("pointerdown", (event) => {
        startTradeSplitDrag("column", event);
      });
    }

    window.addEventListener("pointermove", updateTradeSplitDrag);
    window.addEventListener("pointerup", stopTradeSplitDrag);
    window.addEventListener("pointercancel", stopTradeSplitDrag);

    if (tradeFrame) {
      tradeFrame.addEventListener("load", () => {
        tradeFrameReady = true;
        postThemeToFrame(tradeFrame);
        syncTradeFrameExtraCount();
        syncTradeFrameLayout();
        syncTradeTimeframe();
        syncTradeDrawingTool();
        if (pendingTradeFavoritesPanelOpen && String(tradeFrame.getAttribute("src") || "").includes("track.html") && tradeFrame.contentWindow) {
          try {
            tradeFrame.contentWindow.postMessage({ type: "hypermonitor:open-favorites-panel" }, "*");
            pendingTradeFavoritesPanelOpen = false;
          } catch (_) {}
        }
      });
    }

    extraTradeFrames.forEach((frame) => {
      if (!frame) return;
      frame.addEventListener("load", () => {
        postThemeToFrame(frame);
        syncTradeTimeframe();
        syncTradeDrawingTool();
      });
    });

    if (walletTrackerFrame) {
      walletTrackerFrame.addEventListener("load", () => {
        postThemeToFrame(walletTrackerFrame);
      });
    }

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;
      if (data.type === "hypermonitor:focus-search") {
        focusHeaderSearch();
        return;
      }
      const isPrimaryFrame = event.source === tradeFrame?.contentWindow;
      const extraFrameIndex = extraTradeFrames.findIndex((frame) => frame?.contentWindow === event.source);
      if (!isPrimaryFrame && extraFrameIndex === -1) return;
      if (data.type === "hypermonitor:wallet-change") {
        if (!isPrimaryFrame) return;
        const wallet = normalizeFavoriteWallet(data.wallet);
        if (!wallet) return;
        state.wallet = wallet;
        syncWalletUi();
        highlightSelectedWallet();
        updateUrl(false);
        return;
      }
      if (data.type === "hypermonitor:wallet-section-change") {
        if (!isPrimaryFrame) return;
        state.walletModalSection = normalizeWalletModalSection(data.section);
        return;
      }
      if (data.type === "hypermonitor:close-wallet-shell") {
        if (!isPrimaryFrame) return;
        closeWalletOverlay({ pushHistory: true });
        return;
      }
      if (data.type === "hypermonitor:coin-change") {
        const coin = String(data.coin || "").trim();
        if (!coin) return;
        if (isPrimaryFrame) {
          state.coin = coin;
          syncTrackerDocumentTitle();
        } else if (extraFrameIndex >= 0 && extraFrameIndex < state.extraCharts.length) {
          state.extraCharts[extraFrameIndex] = coin;
        }
        return;
      }
      if (data.type === "hypermonitor:live-price") {
        if (!isPrimaryFrame) return;
        const rawCoin = String(data.coin || state.coin || "").trim();
        const price = Number(data.price);
        if (!rawCoin || !Number.isFinite(price) || price <= 0) return;
        const coinKey = normalizeFooterCoinValue(rawCoin);
        const base = getFooterBase(coinKey);
        liveMids.set(coinKey, price);
        if (base) liveMids.set(base, price);
        syncTrackerDocumentTitle();
        return;
      }
      if (!isPrimaryFrame) return;
      if (data.type === "hypermonitor:remove-extra-chart") {
        removeLastExtraChart();
        return;
      }
      if (data.type === "hypermonitor:book-width-change") {
        const width = Number(data.bookWidth);
        if (Number.isFinite(width) && width > 0) {
          state.tradeBookWidth = width;
          syncTradeLayout();
        }
        return;
      }
      if (data.type === "hypermonitor:timeframe-change") {
        const tf = String(data.tf || "").trim();
        if (tf) {
          state.tradeTimeframe = tf;
          syncTradeTimeframe();
        }
        return;
      }
      if (data.type === "hypermonitor:drawing-tool-change") {
        state.tradeDrawingTool = String(data.tool || "cursor");
        syncTradeDrawingTool();
        return;
      }
      if (data.type === "hypermonitor:clear-drawings") {
        syncTradeClearDrawings();
        return;
      }
      if (data.type !== "hypermonitor:asset-chart-state") return;
      state.topChartCount = data.chart2Active ? 2 : 1;
      if (typeof data.orderBookVisible === "boolean") {
        state.topOrderBookVisible = data.orderBookVisible;
      }
      const splitRatio = Number(data.chartSplitRatio);
      if (Number.isFinite(splitRatio) && splitRatio > 0) {
        state.tradeChartSplitRatio = clamp(splitRatio, 0.28, 0.72);
      }
      const reportedBookWidth = Number(data.bookWidth);
      if (state.topOrderBookVisible && Number.isFinite(reportedBookWidth) && reportedBookWidth > 0) {
        state.tradeBookWidth = clampTradeBookWidth(reportedBookWidth);
      }
      if (state.topChartCount < 2 && state.extraCharts.length) {
        state.extraCharts = [];
      }
      syncTradeLayout();
    });

    window.addEventListener("storage", (event) => {
      if (event.key !== FAVORITES_KEY) return;
      loadFavoriteWallets();
      renderTable(state.displayRows);
    });

    initTheme();
    loadFavoriteWallets();

    state.coin = parseCoin();
    state.wallet = parseWallet();

    setCoin(state.coin, { fromPopState: true });
    syncTradeLayout();
    syncWalletUi();

    initFooterBar();
    ensureHeaderCoinOptions().then(() => {
      updateHeaderSuggestions();
    });
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        refreshFooterBar();
      }
    });

    if (state.wallet) {
      openWalletOverlay(state.wallet, { fromPopState: true });
    }

    updateUrl(false);
    loadLeaderboard();
  </script>
</body>
</html>
