<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BTC | Hypermonitor</title>
  <meta
    name="description"
    content="Hypermonitor trade terminal and explore leaderboard in one view."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <script>
    (() => {
      try {
        if (localStorage.getItem("hypermonitor-theme") === "light") {
          document.documentElement.classList.add("light");
        }
      } catch (_) {}
    })();
  </script>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Outfit", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #0d1014;
      --bg-soft: #12161c;
      --panel: rgba(15, 18, 23, 0.92);
      --panel-strong: rgba(15, 18, 23, 0.98);
      --panel-muted: rgba(255, 255, 255, 0.02);
      --border: #20252d;
      --border-strong: #2b313a;
      --text: #e3e8ee;
      --text-main: #e3e8ee;
      --muted: #7c848f;
      --muted-strong: #aeb6c0;
      --accent: #d3d8df;
      --accent-soft: rgba(211, 216, 223, 0.1);
      --accent-green: #0ECB81;
      --accent-green-soft: rgba(14, 203, 129, 0.16);
      --accent-cyan: #7f8ea1;
      --accent-blue: #74849a;
      --accent-amber: #d3d8df;
      --danger: #F6465D;
      --danger-soft: rgba(246, 70, 93, 0.16);
      --glass-border: #20252d;
      --neutral-blue: rgba(124, 176, 255, 0.95);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      --radius-xl: 16px;
      --radius-lg: 12px;
      --radius-md: 8px;
      --radius-sm: 6px;
      --header-height: 50px;
      --shell-v-gap: 2px;
      --footer-reserve: 34px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      color: var(--text);
      background: linear-gradient(180deg, #0d1014 0%, #0a0c10 100%);
      background-attachment: fixed;
    }

    html.light {
      color-scheme: light;
    }

    body.light {
      background-color: #f4f4f3;
      background-image:
        linear-gradient(180deg, #fafaf9 0%, #f4f4f3 42%, #efefee 100%);
      color-scheme: light;
      --bg: #fbfcfe;
      --bg-soft: #f1f5f9;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-strong: rgba(255, 255, 255, 0.98);
      --panel-muted: rgba(15, 23, 42, 0.04);
      --border: #dbe3ee;
      --border-strong: #cbd5e1;
      --text: #0f172a;
      --text-main: #0f172a;
      --muted: #64748b;
      --muted-strong: #475569;
      --accent: #0f172a;
      --accent-soft: rgba(15, 23, 42, 0.06);
      --accent-green: #16a34a;
      --accent-green-soft: rgba(22, 163, 74, 0.14);
      --accent-cyan: #64748b;
      --accent-blue: #64748b;
      --accent-amber: #0f172a;
      --danger: #dc2626;
      --danger-soft: rgba(220, 38, 38, 0.14);
      --glass-border: #dbe3ee;
      --neutral-blue: #2563eb;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    }

    body.modal-open {
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    #app {
      width: min(1920px, 100vw);
      height: 100dvh;
      margin: 0 auto;
      padding: 6px 0 var(--footer-reserve);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .shell-header {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: var(--header-height);
      padding: 0 8px 0 10px;
      margin-bottom: var(--shell-v-gap);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: var(--bg);
      box-shadow: none;
      backdrop-filter: none;
    }

    body.light .shell-header {
      border-bottom-color: rgba(148, 163, 184, 0.24);
      background: rgba(251, 252, 254, 0.94);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      white-space: nowrap;
    }

    a.brand,
    a.brand:visited,
    a.brand:hover,
    a.brand:active {
      text-decoration: none !important;
      color: inherit;
    }

    .brand img {
      width: 34px;
      height: 34px;
      border-radius: 0;
      object-fit: cover;
      box-shadow: none;
    }

    .brand-name {
      font-weight: 600;
      letter-spacing: 0.03em;
      font-size: 0.98rem;
      text-transform: uppercase;
      margin: 0;
      color: #fff;
      font-style: normal;
    }

    body.light .brand-name {
      color: #0f172a;
    }

    .brand-name .hyper,
    .brand-name em {
      font-style: inherit !important;
      font-weight: 600;
    }

    .top-nav {
      display: inline-flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .header-search-form {
      position: relative;
      margin-left: auto;
      flex: 0 1 360px;
      min-width: 280px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex: 0 0 auto;
      height: auto;
    }

    .header-theme-btn {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      transition: color 160ms ease;
      flex: 0 0 auto;
      margin: 0;
    }

    .header-theme-btn svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .header-theme-btn:hover,
    .header-theme-btn:focus-visible {
      color: var(--text);
      outline: none;
    }

    .header-favorites-btn.is-active {
      color: var(--muted);
    }

    body.light .header-favorites-btn.is-active {
      color: var(--muted);
    }

    .header-search-shell {
      display: flex;
      align-items: center;
      min-height: 38px;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.03);
      transition: border-color 160ms ease, background 160ms ease;
    }

    .header-search-shell:focus-within {
      border-color: rgba(255, 255, 255, 0.34);
      background: rgba(255, 255, 255, 0.05);
    }

    body.light .header-search-shell {
      background: rgba(255, 255, 255, 0.92);
    }

    body.light .header-search-shell:focus-within {
      border-color: #cbd5e1;
      background: #ffffff;
    }

    .header-search-icon {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 0 0 13px;
      color: var(--muted);
      line-height: 1;
      user-select: none;
    }

    .header-search-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .header-search-input {
      width: 100%;
      min-width: 0;
      padding: 9px 10px 9px 10px;
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 0.84rem;
      outline: none;
    }

    .header-search-input::placeholder {
      color: var(--muted);
    }

    .header-search-shortcut {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 46px;
      height: 22px;
      margin-right: 8px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 0.63rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      line-height: 1;
      user-select: none;
      white-space: nowrap;
    }

    .header-search-shell:focus-within .header-search-shortcut {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.18);
    }

    body.light .header-search-shortcut {
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    body.light .header-search-shell:focus-within .header-search-shortcut {
      border-color: #d6dce5;
    }

    .header-search-suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      display: grid;
      gap: 0;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: #101014;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.5);
      z-index: 60;
    }

    body.light .header-search-suggestions {
      background: #ffffff;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    }

    .header-search-suggestions[hidden] {
      display: none;
    }

    .header-search-suggestion {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 0;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .header-search-suggestion:hover,
    .header-search-suggestion.is-active {
      background: rgba(255, 255, 255, 0.05);
    }

    body.light .header-search-suggestion:hover,
    body.light .header-search-suggestion.is-active {
      background: #f8fafc;
    }

    .header-search-suggestion-copy {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .header-search-suggestion-label {
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-search-suggestion-meta {
      font-size: 0.74rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-search-suggestion-type {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted-strong);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      padding: 0;
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.52);
      font-size: 0.84rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 160ms ease, opacity 160ms ease;
    }

    .nav-link:hover {
      color: var(--text);
      text-decoration: none;
    }

    .nav-link.is-active {
      color: var(--text);
      opacity: 1;
    }

    .header-btn,
    .ghost-btn,
    .primary-btn,
    .sidebar-filter,
    .market-chip,
    .refresh-btn {
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease, color 160ms ease;
    }

    .header-btn,
    .primary-btn,
    .ghost-btn,
    .refresh-btn {
      padding: 10px 14px;
      font-size: 0.84rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .ghost-btn:hover,
    .header-btn:hover,
    .refresh-btn:hover,
    .sidebar-filter:hover,
    .market-chip:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--border-strong);
    }

    .primary-btn {
      border-color: #fff;
      background: #fff;
      color: var(--bg);
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      border-color: #ddd;
      background: #ddd;
    }

    .view {
      display: none;
    }

    .view.is-active {
      display: flex;
      flex: 1 1 auto;
      width: 100%;
      min-height: 0;
    }

    main {
      min-height: 0;
      overflow: hidden;
      display: flex;
    }

    .section-intro {
      display: none;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    body.light .panel {
      backdrop-filter: none;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
    }

    .panel-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .trade-top {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 0;
    }

    .context-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
    }

    .context-copy {
      display: grid;
      gap: 6px;
    }

    .context-copy strong {
      font-size: 1rem;
      font-weight: 600;
    }

    .context-copy span {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .selected-wallet-inline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      padding: 8px 12px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: var(--muted-strong);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .trade-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-content: flex-start;
      justify-content: flex-end;
    }

    .market-chip {
      padding: 10px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted-strong);
    }

    .market-chip.is-active {
      border-color: var(--border-strong);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .trade-frame-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    .trade-frame-panel .panel-head,
    .trade-footnote {
      display: none;
    }

    .trade-frame {
      width: 100%;
      height: auto;
      flex: 1 1 auto;
      min-height: 0;
      border: none;
      display: block;
      background: var(--bg);
    }

    .wallet-shell-chrome {
      display: none;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      min-height: 44px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex: 0 0 auto;
      padding-right: 8px;
    }

    .top-frame-panel.is-wallet-mode .wallet-shell-chrome {
      display: none;
    }

    .wallet-shell-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex: 0 0 auto;
    }

    .trade-view-stack {
      --trade-bottom-gap: 0px;
      --trade-book-width: 310px;
      display: grid;
      grid-template-rows: minmax(0, 3.85fr) minmax(0, 1.45fr);
      gap: var(--shell-v-gap);
      width: 100%;
      height: 100%;
      min-height: 0;
      position: relative;
    }

    .trade-view-stack[data-layout="multi"] {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      grid-template-rows: minmax(0, 1.78fr) minmax(0, 0.9fr);
      column-gap: 0;
      row-gap: 0;
    }

    .trade-view-stack[data-layout="multi"][data-extra-count="1"] {
      grid-template-rows: minmax(0, 1.21fr) minmax(0, 1fr);
      grid-template-columns:
        minmax(0, calc((100% - var(--trade-book-width)) / 2))
        minmax(0, calc((100% + var(--trade-book-width)) / 2));
    }

    .trade-view-stack[data-layout="multi"][data-extra-count="2"] {
      column-gap: 0;
      grid-template-columns:
        minmax(0, calc((100% - var(--trade-book-width)) / 2))
        minmax(0, calc((100% + var(--trade-book-width)) / 2));
    }

    .trade-view-stack[data-layout="multi"] .top-frame-panel {
      grid-column: 1 / span 2;
      grid-row: 1;
      border-bottom-width: 0;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      box-shadow: none;
      backdrop-filter: none;
    }

    .trade-view-stack[data-layout="multi"] .trade-leaderboard-panel {
      grid-column: 2;
      grid-row: 2;
      border-top-width: 0;
      border-top-left-radius: 0;
      border-top-right-radius: 0;
    }

    .trade-view-stack[data-layout="multi"] .extra-chart-panel[data-pane="1"] {
      grid-column: 1;
      grid-row: 2;
      border-width: 0;
    }

    .trade-view-stack[data-layout="multi"] .extra-chart-panel[data-pane="2"] {
      grid-column: 2;
      grid-row: 2;
      border-width: 0;
    }

    .trade-view-stack[data-layout="multi"][data-extra-count="1"] .trade-leaderboard-panel {
      border-left-width: 0;
    }

    .trade-view-stack[data-layout="multi"] .extra-chart-panel {
      border-width: 0;
      border-radius: 0;
      border-top-left-radius: 0;
      border-top-right-radius: 0;
      box-shadow: none;
      backdrop-filter: none;
    }

    .trade-leaderboard-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      background: var(--bg);
      border-color: #20252d;
      box-shadow: none;
      backdrop-filter: none;
    }

    .trade-leaderboard-panel[hidden] {
      display: none !important;
    }

    .multi-chart-add-btn,
    .multi-chart-remove-btn {
      position: absolute;
      top: var(--pane-btn-top, 12px);
      right: var(--pane-btn-right, 12px);
      z-index: 3;
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      transition: color 160ms ease;
    }

    .multi-chart-add-btn svg,
    .multi-chart-remove-btn svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .top-frame-panel {
      --pane-btn-top: 61.5px;
      --pane-btn-right: var(--top-frame-btn-right, calc(var(--trade-book-width) + 44px));
    }

    .extra-chart-panel {
      --pane-btn-top: 3px;
      --pane-btn-right: 10px;
    }

    .extra-chart-panel .multi-chart-remove-btn {
      display: none !important;
    }

    .multi-chart-add-btn:hover,
    .multi-chart-remove-btn:hover {
      color: var(--text);
      background: transparent;
    }

    .multi-chart-add-btn[hidden],
    .multi-chart-remove-btn[hidden] {
      display: none;
    }

    .extra-chart-panel {
      display: none;
      min-height: 0;
      overflow: hidden;
    }

    .extra-chart-panel.is-active {
      display: flex;
    }

    .trade-splitter {
      position: absolute;
      z-index: 4;
      background: transparent;
      border: 0;
      padding: 0;
      opacity: 1;
      touch-action: none;
      user-select: none;
    }

    .trade-splitter::before {
      content: "";
      position: absolute;
      background: transparent;
      transition: background 140ms ease, opacity 140ms ease;
      opacity: 0;
    }

    .trade-splitter:hover::before,
    .trade-splitter.is-dragging::before {
      opacity: 1;
      background: rgba(227, 232, 238, 0.16);
    }

    .trade-row-splitter {
      left: 0;
      right: 0;
      top: var(--trade-row-splitter-top, 50%);
      height: 12px;
      transform: translateY(-50%);
      cursor: row-resize;
    }

    .trade-row-splitter::before {
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      transform: translateY(-50%);
    }

    .trade-column-splitter {
      top: var(--trade-column-splitter-top, 50%);
      bottom: 0;
      left: var(--trade-column-splitter-left, 50%);
      width: 12px;
      transform: translateX(-50%);
      cursor: col-resize;
    }

    .trade-column-splitter::before {
      top: var(--trade-column-line-start, 0);
      bottom: 0;
      left: 50%;
      width: 1px;
      transform: translateX(-50%);
    }

    .trade-view-stack[data-layout="multi"] .trade-column-splitter::before {
      --trade-column-line-start: 86px;
      opacity: 1;
      background: var(--border);
    }

    .trade-view-stack[data-layout="multi"] .trade-row-splitter::before {
      opacity: 1;
      background: var(--border);
    }

    .trade-leaderboard-panel .active-filters-bar {
      padding-bottom: 12px;
    }

    .trade-leaderboard-panel .table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      max-height: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.015), transparent 10%);
    }

    .trade-leaderboard-panel .table-wrap.loading {
      min-height: 0;
    }

    function normalizeTheme(value) {
      return value === "light" ? "light" : "dark";
    }

    function getActiveTheme() {
      return document.body.classList.contains("light") ? "light" : "dark";
    }

    function postThemeToFrame(frame) {
      if (!frame?.contentWindow) return;
      try {
        frame.contentWindow.postMessage({
          type: "hypermonitor:set-theme",
          theme: getActiveTheme()
        }, "*");
      } catch (_) {
        // Ignore iframe timing issues during load.
      }
    }

    function broadcastTheme() {
      postThemeToFrame(tradeFrame);
      extraTradeFrames.forEach((frame) => postThemeToFrame(frame));
      postThemeToFrame(walletTrackerFrame);
    }

    function syncThemeToggleButton(theme) {
      if (!headerThemeBtn) return;
      const isLight = theme === "light";
      headerThemeBtn.innerHTML = isLight ? THEME_ICON_SUN : THEME_ICON_MOON;
      headerThemeBtn.setAttribute("aria-label", isLight ? "Light mode" : "Dark mode");
      headerThemeBtn.setAttribute("title", isLight ? "Light mode" : "Dark mode");
    }

    function applyTheme(theme, options = {}) {
      const nextTheme = normalizeTheme(theme);
      const isLight = nextTheme === "light";
      document.documentElement.classList.toggle("light", isLight);
      document.body.classList.toggle("light", isLight);
      syncThemeToggleButton(nextTheme);
      if (headerSearchShortcut) headerSearchShortcut.textContent = SEARCH_SHORTCUT_LABEL;
      if (options.persist !== false) {
        try {
          localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
        } catch (_) {}
      }
      renderFooterPrices();
      updatePriceTickerRolling();
      if (options.broadcast !== false) {
        broadcastTheme();
      }
    }

    function initTheme() {
      let theme = "dark";
      try {
        const saved = localStorage.getItem(THEME_STORAGE_KEY);
        if (saved === "light" || saved === "dark") theme = saved;
      } catch (_) {}
      applyTheme(theme, { persist: false, broadcast: false });
    }

    function parseCoin() {
      const params = new URLSearchParams(window.location.search);
      return (params.get("coin") || params.get("asset") || "BTC").toUpperCase();
    }

    function parseWallet() {
      const params = new URLSearchParams(window.location.search);
      return (params.get("wallet") || "").trim();
    }

    function splitDexCoin(name) {
      const value = String(name || "").trim();
      const idx = value.indexOf(":");
      if (idx > 0 && idx < value.length - 1) {
        return { dex: value.slice(0, idx), base: value.slice(idx + 1) };
      }
      return { dex: "", base: value };
    }

    function sanitizeLeaderboardUrl(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      try {
        const url = new URL(raw, window.location.href);
        if (url.protocol !== "http:" && url.protocol !== "https:") return "";
        return url.toString();
      } catch (error) {
        return "";
      }
    }

    function getStoredLeaderboardUrl() {
      try {
        return sanitizeLeaderboardUrl(localStorage.getItem(LEADERBOARD_OVERRIDE_STORAGE_KEY) || "");
      } catch (error) {
        return "";
      }
    }

    function clearStoredLeaderboardUrl() {
      try {
        localStorage.removeItem(LEADERBOARD_OVERRIDE_STORAGE_KEY);
      } catch (error) {}
    }

    function getLeaderboardSources() {
      const sources = [];
      const seen = new Set();
      const push = (url, source) => {
        const normalized = sanitizeLeaderboardUrl(url);
        if (!normalized || seen.has(normalized)) return;
        seen.add(normalized);
        sources.push({ url: normalized, source });
      };

      push(window.HYPERMONITOR_LEADERBOARD_API_URL, "window");
      push(getStoredLeaderboardUrl(), "storage");
      push(DEFAULT_LEADERBOARD_URL, "default");
      return sources;
    }

    async function fetchLeaderboardPayload(url, timeoutMs = 12000) {
      const controller = typeof AbortController === "function" ? new AbortController() : null;
      let timer = null;
      if (controller) {
        timer = window.setTimeout(() => controller.abort(), timeoutMs);
      }

      try {
        const response = await fetch(url, {
          cache: "no-store",
          mode: "cors",
          credentials: "omit",
          signal: controller ? controller.signal : undefined
        });
        const rawText = await response.text();

        if (!response.ok) {
          throw new Error("HTTP " + response.status + " " + response.statusText + " - " + rawText.slice(0, 120));
        }

        try {
          return JSON.parse(rawText);
        } catch (error) {
          throw new Error("Non-JSON leaderboard response");
        }
      } catch (error) {
        if (error && error.name === "AbortError") {
          throw new Error("Leaderboard request timed out");
        }
        throw error;
      } finally {
        if (timer) window.clearTimeout(timer);
      }
    }

    function parseLeaderboardRows(json) {
      if (Array.isArray(json)) return json;
      if (json && typeof json === "object") {
        if (Array.isArray(json.data)) return json.data;
        if (Array.isArray(json.leaderboard)) return json.leaderboard;
        if (Array.isArray(json.leaderboardRows)) return json.leaderboardRows;
        if (Array.isArray(json.result)) return json.result;
        if (Array.isArray(json.payload)) return json.payload;
        if (json.error || json.message) {
          throw new Error(String(json.error || json.message));
        }
      }
      throw new Error("Unexpected leaderboard response shape");
    }

    function saveCachedLeaderboardRows(rows) {

    function loadCachedLeaderboardRows() {

        if (!Array.isArray(rows) || !rows.length) return null;
        return {

    function buildCoinKey(name, dex = "") {
      const value = String(name || "").trim();
      if (!value) return "";
      const parsed = splitDexCoin(value);
      const base = String(parsed.base || value).trim().toUpperCase();
      const prefix = String(parsed.dex || dex || "").trim().toLowerCase();
      return prefix ? `${prefix}:${base}` : base;
    }

    function moneyFormat(value, decimals = 2) {
      if (!Number.isFinite(value)) return "-";
      const abs = Math.abs(value);
      const digits = abs >= 1000 ? decimals : Math.min(decimals, 2);
      return (value < 0 ? "-" : "") + "$" + abs.toLocaleString(undefined, {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });
    }

    function compactMoney(value) {
      if (!Number.isFinite(value)) return "-";
      const abs = Math.abs(value);
      const sign = value < 0 ? "-" : "";
      if (abs >= 1000000000) return sign + "$" + (abs / 1000000000).toFixed(2) + "B";
      if (abs >= 1000000) return sign + "$" + (abs / 1000000).toFixed(2) + "M";
      if (abs >= 1000) return sign + "$" + (abs / 1000).toFixed(1) + "K";
      return sign + "$" + abs.toFixed(0);
    }

    function percentFormat(value) {
      if (!Number.isFinite(value)) return "-";
      return (value >= 0 ? "+" : "") + (value * 100).toLocaleString(undefined, {
        minimumFractionDigits: 1,
        maximumFractionDigits: 2
      }) + "%";
    }

    function shortAddress(address) {
      if (!address) return "-";
      if (address.length <= 14) return address;
      return address.slice(0, 6) + "..." + address.slice(-4);
    }

    function shortLeaderboardAddress(address) {
      if (!address) return "-";
      if (address.length <= 14) return address;
      return address.slice(0, 6) + "..." + address.slice(-4);
    }

    function scorePercent(value) {
      if (!Number.isFinite(value)) return NaN;
      return Math.max(0, Math.min(100, value * 100));
    }

    function findFilterMeta(list, id) {
      return list.find((item) => item.id === id) || list[0];
    }

    function sizeTierLabel(row) {
      if (SIZE_FILTERS[1].test(row)) return "Apex";
      if (SIZE_FILTERS[2].test(row)) return "Whale";
      if (SIZE_FILTERS[3].test(row)) return "Large";
      if (SIZE_FILTERS[4].test(row)) return "Medium";
      return "Small";
    }

    function qualityLabel(value) {
      const pct = scorePercent(value);
      if (!Number.isFinite(pct)) return "Unscored";
      if (pct >= 85) return "Elite";
      if (pct >= 70) return "Strong";
      if (pct >= 50) return "Watch";
      return "Speculative";
    }

    function pnlChipClass(value) {
      if (!Number.isFinite(value)) return "";
      return value >= 0 ? "good" : "bad";
    }

    function mixChannel(start, end, weight) {
      const t = Math.max(0, Math.min(1, Number(weight)));
      return Math.round(start + (end - start) * t);
    }

    function rgbString(red, green, blue) {
      return "rgb(" + red + ", " + green + ", " + blue + ")";
    }

    function getSignedToneColor(value, maxAbs = 100) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "rgb(226, 232, 240)";
      const weight = Math.min(1, Math.abs(n) / Math.max(1, maxAbs));
      if (n >= 0) {
        return rgbString(
          mixChannel(214, 89, weight),
          mixChannel(219, 164, weight),
          mixChannel(231, 127, weight)
        );
      }
      return rgbString(
        mixChannel(214, 173, weight),
        mixChannel(219, 53, weight),
        mixChannel(231, 66, weight)
      );
    }

    function getScoreToneColor(percent) {
      const safePercent = Number.isFinite(percent) ? Math.max(0, Math.min(100, percent)) : NaN;
      if (!Number.isFinite(safePercent)) return "rgb(226, 232, 240)";
      if (safePercent >= 50) {
        const weight = (safePercent - 50) / 50;
        return rgbString(
          mixChannel(214, 89, weight),
          mixChannel(219, 164, weight),
          mixChannel(231, 127, weight)
        );
      }
      const weight = safePercent / 50;
      return rgbString(
        mixChannel(173, 214, weight),
        mixChannel(53, 219, weight),
        mixChannel(66, 231, weight)
      );
    }

    function formatHeatmapPrice(value) {
      const amount = Number(value);
      if (!Number.isFinite(amount)) return "";
      const abs = Math.abs(amount);
      let digits = 2;
      if (abs >= 10000) digits = 0;
      else if (abs >= 1000) digits = 1;
      else if (abs >= 100) digits = 2;
      else if (abs >= 1) digits = 3;
      else digits = 4;
      return "$" + abs.toLocaleString(undefined, {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });
    }

    function formatHeatmapChange(value) {
      const amount = Number(value);
      if (!Number.isFinite(amount)) return "";
      return (amount >= 0 ? "+" : "") + amount.toFixed(2) + "%";
    }

    function getHeatmapPalette(changePct) {
      const value = Number(changePct);
      if (!Number.isFinite(value)) {
        return {
          start: "rgb(46, 50, 58)",
          end: "rgb(26, 28, 34)"
        };
      }
      const weight = Math.min(1, Math.abs(value) / 12);
      if (value >= 0) {
        const r = mixChannel(36, 46, weight);
        const g = mixChannel(46, 189, weight);
        const b = mixChannel(42, 133, weight);
        return {
          start: rgbString(r, g, b),
          end: rgbString(Math.max(18, r - 18), Math.max(28, g - 30), Math.max(24, b - 22))
        };
      }
      const r = mixChannel(56, 246, weight);
      const g = mixChannel(44, 70, weight);
      const b = mixChannel(48, 93, weight);
      return {
        start: rgbString(r, g, b),
        end: rgbString(Math.max(26, r - 22), Math.max(22, g - 20), Math.max(24, b - 18))
      };
    }

    function splitTreemapItems(items) {
      const total = items.reduce((sum, item) => sum + (Number(item.weight) || 0), 0);
      if (!items.length || total <= 0) {
        const mid = Math.ceil(items.length / 2);
        return [items.slice(0, mid), items.slice(mid)];
      }
      let running = 0;
      let splitIndex = 1;
      for (let index = 0; index < items.length; index += 1) {
        running += Number(items[index].weight) || 0;
        if (running >= total / 2) {
          splitIndex = index + 1;
          break;
        }
      }
      splitIndex = Math.max(1, Math.min(items.length - 1, splitIndex));
      return [items.slice(0, splitIndex), items.slice(splitIndex)];
    }

    function layoutTreemap(items, x, y, width, height, output) {
      if (!items.length || width <= 0 || height <= 0) return;
      if (items.length === 1) {
        output.push({
          item: items[0],
          x,
          y,
          width,
          height
        });
        return;
      }

      const [first, second] = splitTreemapItems(items);
      const firstWeight = first.reduce((sum, item) => sum + (Number(item.weight) || 0), 0);
      const secondWeight = second.reduce((sum, item) => sum + (Number(item.weight) || 0), 0);
      const totalWeight = firstWeight + secondWeight || items.length;
      const ratio = firstWeight > 0 ? firstWeight / totalWeight : first.length / items.length;

      if (width >= height) {
        const firstWidth = width * ratio;
        layoutTreemap(first, x, y, firstWidth, height, output);
        layoutTreemap(second, x + firstWidth, y, width - firstWidth, height, output);
        return;
      }

      const firstHeight = height * ratio;
      layoutTreemap(first, x, y, width, firstHeight, output);
      layoutTreemap(second, x, y + firstHeight, width, height - firstHeight, output);
    }

    function getHeatmapTileSizeClass(tile) {
      const area = Number(tile.width) * Number(tile.height);
      if (area >= 360) return "size-xl";
      if (area >= 120) return "size-lg";
      if (area >= 42) return "size-md";
      if (area >= 14) return "size-sm";
      return "size-xs";
    }

    function renderMarketHeatmapSummary(markets) {

        marketHeatmapSummary.innerHTML = "";

      const gainers = scored.filter((item) => item.changePct >= 0).sort((a, b) => b.changePct - a.changePct);
      const losers = scored.filter((item) => item.changePct < 0).sort((a, b) => a.changePct - b.changePct);
      const summaryBits = [];
      if (losers[0]) {
        summaryBits.push(
          "<span class='market-heatmap-stat'><strong>Worst 24h</strong><span style='color:" +
            escapeHtml(getSignedToneColor(losers[0].changePct, 12)) +
            ";'>" +
            escapeHtml(getCoinLabel(losers[0].key)) +
            " " +
            escapeHtml(formatHeatmapChange(losers[0].changePct)) +
            "</span></span>"
        );
      }
      if (gainers[0]) {
        summaryBits.push(
          "<span class='market-heatmap-stat'><strong>Best 24h</strong><span style='color:" +
            escapeHtml(getSignedToneColor(gainers[0].changePct, 12)) +
            ";'>" +
            escapeHtml(getCoinLabel(gainers[0].key)) +
            " " +
            escapeHtml(formatHeatmapChange(gainers[0].changePct)) +

      }
      summaryBits.push(
        "<span class='market-heatmap-stat'><strong>Markets</strong><span>" +
          escapeHtml(markets.length.toLocaleString()) +

      );
      marketHeatmapSummary.innerHTML = summaryBits.join("");

    function renderMarketHeatmap() {
      if (!marketHeatmapTiles || !marketHeatmapBoard) return;
      const markets = Array.isArray(state.marketHeatmapRows) ? state.marketHeatmapRows.slice() : [];
      if (!markets.length) {
        marketHeatmapTiles.innerHTML = "";
        renderMarketHeatmapSummary([]);
        setMarketHeatmapState(false, "No market heatmap data available.", true);

      const items = markets
        .map((item) => ({
          ...item,
          weight: Math.max(1, Number(item.weight) || 1)
        }))
        .sort((left, right) => (Number(right.weight) || 0) - (Number(left.weight) || 0));

      const layout = [];
      layoutTreemap(items, 0, 0, 100, 100, layout);

      marketHeatmapTiles.innerHTML = layout.map((tile) => {
        const sizeClass = getHeatmapTileSizeClass(tile);
        const palette = getHeatmapPalette(tile.item.changePct);
        const label = escapeHtml(tile.item.base || getCoinBaseName(tile.item.key));
        const dex = escapeHtml(tile.item.dex || "");
        const fullLabel = escapeHtml(getCoinLabel(tile.item.key));
        const changeText = escapeHtml(formatHeatmapChange(tile.item.changePct));
        const priceText = escapeHtml(formatHeatmapPrice(tile.item.markPx));
        const volumeText = escapeHtml(compactMoney(tile.item.volume));
        return (
          "<button class='market-heatmap-tile " + sizeClass + "' type='button' data-heatmap-coin='" + escapeHtml(tile.item.key) + "'" +
            " title='" + fullLabel + " · " + changeText + " · " + priceText + "'" +
            " style='left:" + tile.x.toFixed(4) + "%;top:" + tile.y.toFixed(4) + "%;width:" + tile.width.toFixed(4) + "%;height:" + tile.height.toFixed(4) + "%;--heat-start:" + escapeHtml(palette.start) + ";--heat-end:" + escapeHtml(palette.end) + ";'>" +
            "<span class='market-heatmap-tile-content'>" +
              "<span class='market-heatmap-tile-top'>" +
                "<span class='market-heatmap-tile-symbol'>" + label + "</span>" +
                (dex ? "<span class='market-heatmap-tile-dex'>" + dex + "</span>" : "") +
              "</span>" +
              "<span class='market-heatmap-tile-body'>" +
                "<span class='market-heatmap-tile-change'>" + changeText + "</span>" +
                "<span class='market-heatmap-tile-price'>" + priceText + "</span>" +
                "<span class='market-heatmap-tile-volume'>Vol " + volumeText + "</span>" +
              "</span>" +
            "</span>" +
          "</button>"
        );
      }).join("");

      renderMarketHeatmapSummary(markets);
      setMarketHeatmapState(false, "Updated " + new Date().toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      }), false);
    }

    async function loadMarketHeatmap(force = false) {
      if (!marketHeatmapBoard) return [];
      if (!force && marketHeatmapPromise) return marketHeatmapPromise;

      setMarketHeatmapState(true, "Loading market heatmap…", false);

      marketHeatmapPromise = (async () => {
        let dexNames = [""];
        try {
          const dexData = await fetchHyperliquidInfo({ type: "perpDexs" });
          const names = (Array.isArray(dexData) ? dexData : [])
            .map((entry) => entry && entry.name)
            .filter((value) => typeof value === "string" && value.length > 0);
          dexNames = ["", ...names.filter((value, index, list) => list.indexOf(value) === index)];
        } catch (error) {
          dexNames = [""];
        }

        const marketMap = new Map();
        const results = await Promise.allSettled(
          dexNames.map((dex) => fetchHyperliquidInfo(dex ? { type: "metaAndAssetCtxs", dex } : { type: "metaAndAssetCtxs" }))
        );

        results.forEach((result, resultIndex) => {
          if (result.status !== "fulfilled") return;
          const dex = dexNames[resultIndex] || "";
          const data = result.value;
          const meta = Array.isArray(data) ? data[0] : data && data.meta;
          const assetCtxs = Array.isArray(data) ? data[1] : data && data.assetCtxs;
          const universe = Array.isArray(meta && meta.universe) ? meta.universe : [];
          const ctxs = Array.isArray(assetCtxs) ? assetCtxs : [];
          const length = Math.max(universe.length, ctxs.length);

          for (let index = 0; index < length; index += 1) {
            const entry = universe[index] || {};
            const ctx = ctxs[index] || {};
            const rawName = String(ctx.coin ?? ctx.symbol ?? ctx.asset ?? entry.name ?? "").trim();
            const key = buildCoinKey(rawName, dex);
            const markPx = Number(ctx.markPx ?? ctx.mark ?? ctx.midPx ?? ctx.mid ?? ctx.px);
            if (!key || entry.isDelisted || !Number.isFinite(markPx) || markPx <= 0) continue;

            const prevDayPx = Number(ctx.prevDayPx ?? ctx.prevDay ?? ctx.prevPx ?? ctx.openPx);
            const changePct = Number.isFinite(prevDayPx) && prevDayPx > 0
              ? ((markPx - prevDayPx) / prevDayPx) * 100
              : NaN;
            const volume = Number(ctx.dayNtlVlm ?? 0);
            const oi = Number(ctx.openInterest ?? 0);
            const weight = Number.isFinite(volume) && volume > 0
              ? volume
              : Number.isFinite(oi) && oi > 0
                ? oi * markPx
                : markPx;

            marketMap.set(key, {
              key,
              base: getCoinBaseName(key),
              dex: getCoinDexName(key),
              markPx,
              prevDayPx,
              changePct,
              volume,
              weight
            });
          }
        });

        state.marketHeatmapRows = Array.from(marketMap.values()).sort((left, right) => {
          const volumeDiff = (Number(right.weight) || 0) - (Number(left.weight) || 0);
          if (volumeDiff !== 0) return volumeDiff;
          return getCoinLabel(left.key).localeCompare(getCoinLabel(right.key));
        });

        renderMarketHeatmap();
        return state.marketHeatmapRows;
      })().catch((error) => {
        console.error("Failed to load market heatmap", error);
        state.marketHeatmapRows = [];
        if (marketHeatmapTiles) marketHeatmapTiles.innerHTML = "";
        renderMarketHeatmapSummary([]);
        setMarketHeatmapState(false, "Failed to load market heatmap.", true);
        return [];
      }).finally(() => {
        marketHeatmapPromise = null;
      });

      return marketHeatmapPromise;
    }

          if (!response.ok) throw new Error("HTTP " + response.status);

      async function ensureFooterEurUsdRate(force = false) {

        if (!force && freshEnough) return footerEurUsdRate;
        if (!force && footerEurUsdPromise) return footerEurUsdPromise;
        footerEurUsdPromise = (async () => {
          const rate = await fetchFooterEurUsdRate();
          if (Number.isFinite(rate) && rate > 0) {
            footerEurUsdRate = rate;
            footerEurUsdFetchedAt = Date.now();
            refreshCurrencyDisplay();

          return rate;
        })();
        try {
          return await footerEurUsdPromise;
        } finally {
          footerEurUsdPromise = null;
        }

    window.__logoOk = (rawKey, imgEl) => {

        const nextUrl = imgEl?.currentSrc || imgEl?.src || entry.urls?.[entry.idx];
        const wasOk = entry.state === "ok" && entry.okUrl === nextUrl;
        entry.state = "ok";
        entry.okUrl = nextUrl;
        if (!wasOk) {
          const hasFallbackForKey = Array.from(
            document.querySelectorAll("span.coinFallback[data-logo-key]")

          if (hasFallbackForKey) scheduleLogoRefresh();

      window.__logoErr = (rawKey, imgEl, fallbackLetter) => {
        const entry = logoCache.get(rawKey);
        if (!entry) return;

        if (window.location?.protocol === "file:") {
          entry.state = "bad";
          entry.permaFail = true;
          entry.retryCount = 999;
          try {
            if (imgEl && imgEl.outerHTML) {
              imgEl.outerHTML = `<span class="coinFallback">${fallbackLetter || "?"}</span>`;
            }
          } catch {}
          return;
        }

        const nextIdx = (entry.idx ?? 0) + 1;
        if (entry.urls && nextIdx < entry.urls.length) {
          entry.idx = nextIdx;
          const nextUrl = entry.urls[nextIdx];
          try {
            if (imgEl && imgEl.src !== nextUrl) imgEl.src = nextUrl;
          } catch {}
          return;
        }

        entry.state = "bad";
        entry.retryCount = (entry.retryCount || 0) + 1;
        scheduleLogoRetry();
        try {
          if (imgEl && imgEl.outerHTML) {
            imgEl.outerHTML = `<span class="coinFallback">${fallbackLetter || "?"}</span>`;

    function formatTitlePrice(value) {
        const price = Number(value);
        if (!Number.isFinite(price) || price <= 0) return "";
        const abs = Math.abs(price);
        let decimals = 4;
        if (abs >= 10000) decimals = 0;
        else if (abs >= 1000) decimals = 1;
        else if (abs >= 100) decimals = 2;
        else if (abs >= 10) decimals = 3;
        else if (abs >= 1) decimals = 4;
        else decimals = 5;
        return price.toLocaleString("en-US", {
          minimumFractionDigits: 0,
          maximumFractionDigits: decimals
        });
      }

    function xmlEscape(v) {
      const s = v === null || v === undefined ? "" : String(v);
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&apos;");

    function getIconCandidates(rawName, cleanName) {
        const candidates = [];
        const addPrefixedCandidates = (name) => {
          const raw = String(name || "").trim();
          if (!raw) return;
          if (!raw.includes(":")) return;
          // Keep exact prefixed path first for HIP-3/non-crypto assets (e.g. xyz:NVDA).
          candidates.push(`${COIN_ICON_BASE}${encodeURIComponent(raw)}.svg`);
          const upper = raw.toUpperCase();
          if (upper !== raw) candidates.push(`${COIN_ICON_BASE}${encodeURIComponent(upper)}.svg`);
        };
        const getWrappedBaseSymbol = (name) => {
          const raw = String(name || "").trim();
          if (!raw) return "";
          const { base } = splitDexCoin(raw);
          const symbol = String(base || raw).trim().toUpperCase();
          if (!symbol.startsWith("U") || symbol.length <= 1) return "";
          const unwrapped = symbol.slice(1);
          if (!unwrapped) return "";
          if (HYPERLIQUID_TICKERS.has(unwrapped) || SPECIAL_LOGOS.has(unwrapped)) return unwrapped;
          return "";
        };

        const addSymbolCandidates = (name) => {
          const raw = String(name || "").trim();
          if (!raw) return;
          const { dex, base } = splitDexCoin(raw);
          const symbol = String(base || raw).trim();
          if (!symbol) return;
          const upper = symbol.toUpperCase();
          const safe = symbol.replace(/\//g, "_");
          const pngOnly = new Set(["USA500", "COPPER"]);
          const localExt = pngOnly.has(upper) ? "png" : "svg";
          const dexLower = String(dex || "").toLowerCase();
          candidates.push(`images/coins/${encodeURIComponent(safe)}.${localExt}`);
          if (upper !== safe) candidates.push(`images/coins/${encodeURIComponent(upper)}.${localExt}`);
          candidates.push(`${COIN_ICON_BASE}${encodeURIComponent(symbol)}.svg`);
          if (upper !== symbol) candidates.push(`${COIN_ICON_BASE}${encodeURIComponent(upper)}.svg`);
          if (!pngOnly.has(upper) && !symbol.includes("/") && !NON_CRYPTO_PREFIXES.includes(dexLower)) {
            // Some spot assets only exist as {symbol}_spot.svg (e.g. KNTQ, FEUSD).
            candidates.push(`${COIN_ICON_BASE}${encodeURIComponent(symbol)}_spot.svg`);
            if (upper !== symbol) candidates.push(`${COIN_ICON_BASE}${encodeURIComponent(upper)}_spot.svg`);
          }
          if (NON_CRYPTO_PREFIXES.includes(dexLower)) {
            // Generic HIP-3 ticker logo fallbacks (e.g. xyz:NVDA, xyz:MSTR, cash:SPY).
            candidates.push(`https://financialmodelingprep.com/image-stock/${encodeURIComponent(upper)}.png`);
            candidates.push(`https://eodhd.com/img/logos/US/${encodeURIComponent(upper)}.png`);
          }
        };

        const addWrappedSpotFallback = (name) => {
          const baseSymbol = getWrappedBaseSymbol(name);
          if (!baseSymbol) return;
          addSymbolCandidates(baseSymbol);
        };

        const addKnownPrefixedAlternatives = (name) => {
          const raw = String(name || "").trim();
          if (!raw || raw.includes(":")) return;
          const base = String(splitDexCoin(raw).base || raw).trim().toUpperCase();
          if (!base || HYPERLIQUID_TICKERS.has(base)) return;
          getPrefixedCandidates(base).forEach((prefixed) => {
            candidates.push(`${COIN_ICON_BASE}${encodeURIComponent(prefixed)}.svg`);
            const upper = prefixed.toUpperCase();
            if (upper !== prefixed) candidates.push(`${COIN_ICON_BASE}${encodeURIComponent(upper)}.svg`);
          });
        };

        const shouldPrioritizeSpecialLogo = [cleanName, rawName].some((name) => {
          const { base } = splitDexCoin(name);
          const upper = String(base || name || "").trim().toUpperCase();
          return GLOBAL_SPECIAL_LOGO_PRIORITY.has(upper);
        });

        const specialLogo = getSpecialLogoUrl(rawName, cleanName);
        if (shouldPrioritizeSpecialLogo && specialLogo) candidates.push(specialLogo);

        // Prefer exact prefixed Hyperliquid logos for HIP-3/non-crypto assets.
        addPrefixedCandidates(cleanName);
        addPrefixedCandidates(rawName);
        addKnownPrefixedAlternatives(cleanName);
        addKnownPrefixedAlternatives(rawName);

        // Prefer canonical base logo for wrapped spot symbols (e.g. UBTC -> BTC).
        addWrappedSpotFallback(cleanName);
        addWrappedSpotFallback(rawName);

        if (!shouldPrioritizeSpecialLogo && specialLogo) candidates.push(specialLogo);
        addSymbolCandidates(rawName);
        addSymbolCandidates(cleanName);

        return Array.from(new Set(candidates));
      }

      function getSpecialLogoUrl(rawName, cleanName) {
        const keys = [cleanName, rawName];
        for (const key of keys) {
          if (!key) continue;
          const upper = String(key).trim().toUpperCase();
          if (SPECIAL_LOGOS.has(upper)) return SPECIAL_LOGOS.get(upper);
          if (DOMAIN_LOGOS.has(upper)) return DOMAIN_LOGOS.get(upper);
          if (upper.includes(":")) {
            const base = upper.split(":").pop();
            if (SPECIAL_LOGOS.has(base)) return SPECIAL_LOGOS.get(base);
            if (DOMAIN_LOGOS.has(base)) return DOMAIN_LOGOS.get(base);
          }
        }
        return null;
      }

      function ensureLogoCache(rawKey, rawName, cleanName) {
        const urls = getIconCandidates(rawName, cleanName);
        const existing = logoCache.get(rawKey);
        if (existing) {
          const oldList = Array.isArray(existing.urls) ? existing.urls : [];
          const sameLength = oldList.length === urls.length;
          const sameUrls = sameLength && oldList.every((url, idx) => url === urls[idx]);
          if (!sameUrls) {
            existing.urls = urls;
            existing.idx = 0;
            existing.okUrl = null;
            existing.state = "unknown";
            existing.permaFail = false;
            existing.retryCount = 0;
          } else if (
            existing.state === "bad" &&
            !existing.permaFail &&
            Array.isArray(existing.urls) &&
            existing.urls.length > 0
          ) {
            // Allow stale bad entries to recover on subsequent renders.
            existing.state = "unknown";
            existing.idx = 0;
          }
          return existing;
        }
        const entry = { state: "unknown", idx: 0, urls, okUrl: null };
        logoCache.set(rawKey, entry);
        return entry;
      }

      function scheduleLogoRetry() {
        if (logoRetryTimer) return;
        logoRetryTimer = setTimeout(() => {
          logoRetryTimer = null;
          retryFailedLogos();
        }, 3000);
      }

      function scheduleLogoRefresh() {
        if (logoRefreshTimer) return;
        logoRefreshTimer = setTimeout(() => {
          logoRefreshTimer = null;
          renderFooterPrices();
        }, 120);
      }

      function retryFailedLogos() {
        let changed = false;
        logoCache.forEach((entry) => {
          if (entry.state !== "bad") return;
          if (entry.permaFail) return;
          if ((entry.retryCount || 0) > 2) return;
          entry.state = "unknown";
          entry.idx = 0;
          entry.okUrl = null;
          changed = true;
        });
        if (!changed) return;
        renderFooterPrices();
      }

      function coinIconHtml(rawName, cleanName) {
        const logoKey = normalizeLogoKey(rawName || cleanName);
        const entry = ensureLogoCache(logoKey, rawName, cleanName);
        const letter = (cleanName?.[0] || rawName?.[0] || "?").toUpperCase();
        const coinKey = xmlEscape(rawName || cleanName || "");
        const label = xmlEscape(cleanName || rawName || "");
        const logoKeyAttr = xmlEscape(logoKey);

        if (entry.state === "bad" || !entry.urls.length) {
          return `<span class="coinFallback coin-info-trigger" data-logo-key="${logoKeyAttr}" data-coin-key="${coinKey}" data-coin-label="${label}">${letter}</span>`;
        }

        const src = (entry.state === "ok" && entry.okUrl) ? entry.okUrl : entry.urls[entry.idx || 0];
        const safeKey = logoKey.replace(/'/g, "\\'");

        return `
          <img
            class="coinIcon coin-info-trigger"
            src="${src}"
            alt="${xmlEscape(cleanName || rawName || "")}"
            data-logo-key="${logoKeyAttr}"
            data-coin-key="${coinKey}"
            data-coin-label="${label}"
            loading="lazy"
            referrerpolicy="no-referrer"
            onload="window.__logoOk('${safeKey}', this)"
            onerror="window.__logoErr('${safeKey}', this, '${letter}')"
          />
        `;
      }

      function footerCoinIconHtml(rawName, cleanName) {
        const normalized = normalizeFooterCoinValue(rawName || cleanName);
        const base = getFooterBase(normalized);
        const footerLogoUrl = FOOTER_SPECIAL_LOGOS.get(base);
        if (!footerLogoUrl) return coinIconHtml(rawName, cleanName);
        const coinKey = xmlEscape(rawName || cleanName || "");
        const label = xmlEscape(cleanName || rawName || "");
        const extraStyle = FOOTER_CIRCLE_LOGOS.has(base) ? ' style="border-radius:50%;"' : "";
        return `
          <img
            class="coinIcon coin-info-trigger"
            src="${footerLogoUrl}"
            alt="${label}"
            data-logo-key="${xmlEscape(normalized)}"
            data-coin-key="${coinKey}"
            data-coin-label="${label}"
            loading="lazy"
            referrerpolicy="no-referrer"
            ${extraStyle}
          />
        `;
      }

  
    function normalizeCoin(coin) {
        return (coin || "").toUpperCase();
      }

      function normalizeFooterCoinValue(value) {
        const cleaned = String(value || "").trim();
        if (!cleaned) return "";
        const { dex, base } = splitDexCoin(cleaned);
        if (dex) return `${dex.toLowerCase()}:${String(base || "").toUpperCase()}`;
        const upper = cleaned.toUpperCase();
        if (upper === "USA500") return "cash:USA500";
        return upper;
      }

      function normalizeLogoKey(value) {
        const cleaned = String(value || "").trim();
        if (!cleaned) return "";
        const { dex, base } = splitDexCoin(cleaned);
        let normalizedBase = String(base || "").toUpperCase();
        if (normalizedBase.startsWith("U") && normalizedBase.length > 1) {
          const unwrapped = normalizedBase.slice(1);
          if (HYPERLIQUID_TICKERS.has(unwrapped) || SPECIAL_LOGOS.has(unwrapped)) {
            normalizedBase = unwrapped;
          }
        }
        if (dex) return `${dex.toLowerCase()}:${normalizedBase}`;
        if (!normalizedBase) return cleaned.toUpperCase();
        return normalizedBase;
      }

      function getFooterBase(coin) {
        const { base } = splitDexCoin(coin);
        return String(base || "").toUpperCase();
      }

      function formatPrefixedCoin(prefix, base) {
        return `${prefix}:${String(base || "").toUpperCase()}`;
      }

      function rememberPrefixedFooterMarket(coin) {
        const normalized = normalizeFooterCoinValue(coin);
        const { dex, base } = splitDexCoin(normalized);
        const normalizedBase = String(base || "").toUpperCase();
        if (!dex || !normalizedBase) return;
        const existing = footerPrefixedMarketsByBase.get(normalizedBase) || [];
        if (!existing.includes(normalized)) {
          existing.push(normalized);
          footerPrefixedMarketsByBase.set(normalizedBase, existing);
        }
      }

      function getPrefixedCandidates(base) {
        const normalizedBase = String(base || "").toUpperCase();
        const available = footerPrefixedMarketsByBase.get(normalizedBase) || [];
        const ordered = [];
        NON_CRYPTO_PREFIXES.forEach((prefix) => {
          const exact = formatPrefixedCoin(prefix, normalizedBase);
          if (available.includes(exact)) ordered.push(exact);
        });
        available.forEach((coin) => {
          if (!ordered.includes(coin)) ordered.push(coin);
        });
        NON_CRYPTO_PREFIXES.forEach((prefix) => {
          const exact = formatPrefixedCoin(prefix, normalizedBase);
          if (!ordered.includes(exact)) ordered.push(exact);
        });
        return ordered;
      }

      function isNonCryptoPrefixed(coin) {
        const { dex } = splitDexCoin(coin);
        if (!dex) return false;
        return NON_CRYPTO_PREFIXES.includes(String(dex).toLowerCase());
      }

      function findTrackedFooterCoinByBase(base) {
        const normBase = String(base || "").toUpperCase();
        return trackedFooterCoins.find((coin) => getFooterBase(coin) === normBase) || null;
      }

      function getExactLivePriceForCoin(raw) {
        const normalized = normalizeFooterCoinValue(raw);
        const { dex, base } = splitDexCoin(normalized);
        const candidates = [raw, normalized];
        if (!dex && base) {
          candidates.push(base, normalizeCoin(base));
        }
        for (const key of candidates) {
          if (!key) continue;
          const px = liveMids.get(key);
          if (Number.isFinite(px)) return px;
        }
        return undefined;
      }

      function getLivePriceForCoin(raw) {
        const direct = getExactLivePriceForCoin(raw);
        if (Number.isFinite(direct)) return direct;
        const { dex, base } = splitDexCoin(raw);
        for (const prefixed of !dex && base && !HYPERLIQUID_TICKERS.has(String(base).toUpperCase()) ? getPrefixedCandidates(base) : []) {
          const px = getExactLivePriceForCoin(prefixed);
          if (Number.isFinite(px)) return px;
        }
        return undefined;
      }

      function normalizeFooterChangeRefKey(raw) {
        const normalized = normalizeFooterCoinValue(raw);
        const { dex, base } = splitDexCoin(normalized);
        const normalizedBase = String(base || normalized).toUpperCase();
        if (!normalizedBase) return "";
        return dex ? `${String(dex).toUpperCase()}:${normalizedBase}` : normalizedBase;
      }

      function getFooterChangeBaselineToken() {
        if (footerChangeRange !== "1d") return footerChangeRange;
        const now = new Date();
        return `1d:${now.getUTCFullYear()}-${String(now.getUTCMonth() + 1).padStart(2, "0")}-${String(now.getUTCDate()).padStart(2, "0")}`;
      }

      function getFooterChangePct(raw) {
        const coin = normalizeFooterChangeRefKey(raw);
        const base = getFooterBase(coin);
        const key = footerChangeRefs.has(coin) ? coin : footerChangeRefs.has(base) ? base : null;
          if (!key) {
            if (footerChangePcts.has(coin)) return footerChangePcts.get(coin);
            if (footerChangePcts.has(base)) return footerChangePcts.get(base);
            const live = getLivePriceForCoin(coin);
            if (Number.isFinite(live)) {
              footerChangeRefs.set(coin, { prev: live, last: live });
              footerChangeProvisional.add(coin);
              return null;
            }
            return null;
          }
        const ref = footerChangeRefs.get(key);
        const prev = Number(ref?.prev);
        if (!Number.isFinite(prev) || prev === 0) return null;
        const live = getLivePriceForCoin(coin);
        const last = Number.isFinite(live) ? live : Number(ref?.last);
        if (!Number.isFinite(last)) return null;
        return (last - prev) / prev;
      }

      async function fetchChangeFromCandles(rawCoin, rangeKey) {
        const coin = String(rawCoin || "").trim();
        const range = FOOTER_CHANGE_RANGES[rangeKey] || FOOTER_CHANGE_RANGES["1d"];
        if (!coin || !range) return null;
        const end = Date.now();
        const start = end - range.ms * 4;
        const res = await fetch(HYPERLIQUID_INFO_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "candleSnapshot", req: { coin, interval: range.interval, startTime: start, endTime: end } }),
        });
        if (!res.ok) throw new Error(`candleSnapshot error: ${res.status} ${res.statusText}`);
        const data = await res.json();
        const candles = (Array.isArray(data) ? data : [])
          .map((c) => ({
            time: Number(c.t),
            open: Number(c.o),
            close: Number(c.c),
          }))
          .filter((c) => Number.isFinite(c.time) && Number.isFinite(c.open) && Number.isFinite(c.close))
          .sort((a, b) => a.time - b.time);
        if (candles.length >= 2) {
          const prev = candles[candles.length - 2].close;
          const last = candles[candles.length - 1].close;
          if (Number.isFinite(prev) && prev !== 0 && Number.isFinite(last)) return { prev, last };
        }
        if (candles.length === 1) {
          const prev = candles[0].open;
          const last = candles[0].close;
          if (Number.isFinite(prev) && prev !== 0 && Number.isFinite(last)) return { prev, last };
        }
        return null;
      }

      async function refreshFooterChanges() {
        try {
          if (!footerChangeEnabled) {
            footerChangePcts.clear();
            renderFooterPrices();
            return;
          }

          const nextBaselineToken = getFooterChangeBaselineToken();
          if (footerChangeRangeKey !== footerChangeRange || footerChangeBaselineToken !== nextBaselineToken) {
            footerChangeRangeKey = footerChangeRange;
            footerChangeBaselineToken = nextBaselineToken;
            footerChangeRefs.clear();
            footerChangeProvisional.clear();
          }

          const dexes = new Set();
          trackedFooterCoins.forEach((coin) => {
            const { dex } = splitDexCoin(coin);
            if (!dex) return;
            dexes.add(dex);
          });

          const fetchCtxs = async (dex = "") => {
            const payload = dex ? { type: "metaAndAssetCtxs", dex } : { type: "metaAndAssetCtxs" };
            const res = await fetch(HYPERLIQUID_INFO_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (!res.ok) throw new Error(`metaAndAssetCtxs error: ${res.status} ${res.statusText}`);
            const data = await res.json();
            return {
              dex,
              universe: Array.isArray(data) ? data?.[0]?.universe : data?.meta?.universe,
              assetCtxs: Array.isArray(data) ? data[1] : data?.assetCtxs,
            };
          };

          footerChangePcts.clear();

          const missing = trackedFooterCoins
            .map((c) => normalizeFooterCoinValue(c))
            .filter(Boolean)
            .filter((coin) => {
              const changeKey = normalizeFooterChangeRefKey(coin);
              return !footerChangeRefs.has(changeKey) || footerChangeProvisional.has(changeKey);
            });

          if (!missing.length) {
            renderFooterPrices();
            return;
          }

          if (footerChangeRange === "1d") {
            const results = await Promise.allSettled([fetchCtxs(), ...Array.from(dexes).map((d) => fetchCtxs(d))]);
            results.forEach((res) => {
              if (res.status !== "fulfilled") return;
              const { dex, universe, assetCtxs } = res.value || {};
              if (!Array.isArray(assetCtxs)) return;
              assetCtxs.forEach((ctx, idx) => {
                if (!ctx || typeof ctx !== "object") return;
                const fallbackName = Array.isArray(universe) ? universe[idx]?.name : "";
                const coinRaw = String(ctx.coin ?? ctx.symbol ?? ctx.asset ?? fallbackName ?? "").trim();
                const coinKey = buildCoinKey(coinRaw, dex);
                const changeKey = normalizeFooterChangeRefKey(coinKey);
                const baseKey = normalizeFooterChangeRefKey(getFooterBase(coinKey));
                if (!changeKey) return;
                const mark = Number(ctx.markPx ?? ctx.mark ?? ctx.midPx ?? ctx.mid ?? ctx.px);
                const prev = Number(ctx.prevDayPx ?? ctx.prevDay ?? ctx.prevPx ?? ctx.openPx);
                if (!Number.isFinite(mark) || !Number.isFinite(prev) || prev === 0) return;
                if (!footerChangeRefs.has(changeKey) || footerChangeProvisional.has(changeKey)) {
                  footerChangeRefs.set(changeKey, { prev, last: mark });
                  footerChangeProvisional.delete(changeKey);
                }
                if (!dex && baseKey && (!footerChangeRefs.has(baseKey) || footerChangeProvisional.has(baseKey))) {
                  footerChangeRefs.set(baseKey, { prev, last: mark });
                  footerChangeProvisional.delete(baseKey);
                }
              });
            });
          }

          const unresolved = trackedFooterCoins
            .map((c) => normalizeFooterCoinValue(c))
            .filter(Boolean)
            .filter((coin) => {
              const changeKey = normalizeFooterChangeRefKey(coin);
              return !footerChangeRefs.has(changeKey) || footerChangeProvisional.has(changeKey);
            });

          await Promise.allSettled(
            unresolved.map(async (coin) => {
              try {
                let change = await fetchChangeFromCandles(coin, footerChangeRange);
                if ((!change || !Number.isFinite(change.prev)) && coin.includes(":")) {
                  const base = getFooterBase(coin);
                  if (base) change = await fetchChangeFromCandles(base, footerChangeRange);
                }
                if (!change || !Number.isFinite(change.prev)) return;
                const key = normalizeFooterChangeRefKey(coin);
                footerChangeRefs.set(key, change);
                footerChangeProvisional.delete(key);
                const base = getFooterBase(coin);
                const baseKey = normalizeFooterChangeRefKey(base);
                if (base && !coin.includes(":")) {
                  footerChangeRefs.set(baseKey, change);
                  footerChangeProvisional.delete(baseKey);
                }
              } catch (err) {
                console.warn("Footer candle fallback failed", coin, err);
              }
            })
          );

          renderFooterPrices();
        } catch (err) {
          console.warn("Footer 24h change fetch failed", err);
        }
      }

      function ensureFooterChangeTimer() {
        if (footerChangeTimer) return;
        footerChangeTimer = setInterval(refreshFooterChanges, 60000);

      function ensureManualMidTimer() {
        if (manualMidTimer || manualMidCoins.size === 0) return;
        manualMidTimer = setInterval(() => {
          refreshManualMids();
        }, 12000);
      }

      function stopManualMidTimerIfIdle() {
        if (!manualMidTimer) return;
        if (manualMidCoins.size > 0) return;
        clearInterval(manualMidTimer);
        manualMidTimer = null;
      }

      async function fetchL2BookMid(coin) {
        try {
          const res = await fetch(HYPERLIQUID_INFO_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ type: "l2Book", coin }),
          });
          if (!res.ok) return null;
          const data = await res.json();
          const levels = data?.levels;
          if (!Array.isArray(levels) || levels.length < 2) return null;
          const getPx = (entry) => {
            if (!entry) return null;
            if (typeof entry.px !== "undefined") return Number(entry.px);
            if (Array.isArray(entry)) return Number(entry[0]);
            return null;
          };
          const bestBid = getPx(levels[0]?.[0]);
          const bestAsk = getPx(levels[1]?.[0]);
          if (!Number.isFinite(bestBid) || !Number.isFinite(bestAsk)) return null;
          return (bestBid + bestAsk) / 2;
        } catch (e) {
          return null;
        }
      }

      async function refreshManualMids() {
        const coins = Array.from(manualMidCoins);
        if (!coins.length) {
          stopManualMidTimerIfIdle();
          return;
        }
        const updates = await Promise.all(coins.map((coin) => fetchL2BookMid(coin)));
        updates.forEach((mid, idx) => {
          const coin = coins[idx];
          if (!Number.isFinite(mid)) return;
          liveMids.set(coin, mid);
        });
        renderFooterPrices();
      }

      function requestManualMidRefresh() {
        const now = Date.now();
        if (now - lastManualMidRefreshRequestMs < 5000) return;
        lastManualMidRefreshRequestMs = now;
        refreshManualMids();
      }

      async function primeManualMidsForFooter() {
        const manualCoins = trackedFooterCoins.filter((coin) => coin.includes(":"));
        if (!manualCoins.length) return;
        manualCoins.forEach((coin) => manualMidCoins.add(coin));
        ensureManualMidTimer();
        await refreshManualMids();
      }

      async function sanitizeFooterCoins() {
        const next = [];
        const seenBases = new Set();
        for (const raw of trackedFooterCoins) {
          const normalized = normalizeFooterCoinValue(raw);
          const base = getFooterBase(normalized);
          if (!base || seenBases.has(base)) continue;
          if (normalized.includes(":") || HYPERLIQUID_TICKERS.has(base)) {
            next.push(normalized);
            seenBases.add(base);
            continue;
          }
          // eslint-disable-next-line no-await-in-loop
          const baseResult = await evaluateFooterCandidate(base);
          if (baseResult) {
            next.push(baseResult.coinKey);
            seenBases.add(base);
            continue;
          }
          let added = false;
          for (const prefixed of getPrefixedCandidates(base)) {
            // eslint-disable-next-line no-await-in-loop
            const prefixedResult = await evaluateFooterCandidate(prefixed);
            if (prefixedResult) {
              next.push(prefixedResult.coinKey);
              seenBases.add(base);
              added = true;
              break;
            }
          }
          if (!added) {
            // Drop coins that have no logo and no price data.
          }
        }
        trackedFooterCoins = next;
        saveFooterCoins();
      }

      function rememberLogoOk(rawKey, okUrl) {
        const normalized = normalizeLogoKey(rawKey);
        const entry = ensureLogoCache(normalized, rawKey, rawKey);
        entry.state = "ok";
        entry.idx = 0;
        entry.okUrl = okUrl;
        entry.urls = [okUrl];
      }

      function checkLogoUrl(url) {
        return new Promise((resolve) => {
          const img = new Image();
          let done = false;
          const finish = (ok) => {
            if (done) return;
            done = true;
            resolve(ok);
          };
          const timer = setTimeout(() => finish(false), 3000);
          img.onload = () => {
            clearTimeout(timer);
            finish(true);
          };
          img.onerror = () => {
            clearTimeout(timer);
            finish(false);
          };
          img.referrerPolicy = "no-referrer";
          img.src = url;
        });
      }

    async function findAvailableLogoUrl(rawName) {
      const candidates = getIconCandidates(rawName, rawName);
      for (const url of candidates) {
        // eslint-disable-next-line no-await-in-loop
        const ok = await checkLogoUrl(url);
        if (ok) return url;
      }
      return null;

      async function evaluateFooterCandidate(coinKey) {
        const normalizedCoin = normalizeFooterCoinValue(coinKey);
        const { dex, base } = splitDexCoin(normalizedCoin);
        const existing = getExactLivePriceForCoin(coinKey);
        let mid = Number.isFinite(existing) ? existing : null;
        let logoUrl = null;
        if (Number.isFinite(existing) && coinKey.includes(":")) {
          manualMidCoins.add(coinKey);
          ensureManualMidTimer();
        }
        if (!Number.isFinite(existing)) {
          logoUrl = await findAvailableLogoUrl(coinKey);
          if (logoUrl) rememberLogoOk(coinKey, logoUrl);
          mid = await fetchL2BookMid(coinKey);
          if (Number.isFinite(mid)) {
            liveMids.set(coinKey, mid);
            manualMidCoins.add(coinKey);
            ensureManualMidTimer();
          }
        }
        if (!logoUrl && Number.isFinite(existing)) {
          return { coinKey, hasLogo: false, hasPrice: true };
        }
        if (!dex && base && !HYPERLIQUID_TICKERS.has(String(base).toUpperCase()) && !Number.isFinite(mid) && !Number.isFinite(existing)) {
          return null;
        }
        if (logoUrl || Number.isFinite(mid)) {
          return { coinKey, hasLogo: Boolean(logoUrl), hasPrice: Number.isFinite(mid) || Number.isFinite(existing) };
        }
        return null;
      }

      async function extractDominantColorFromLogo(symbol) {
        if (window.location?.protocol === "file:") return null;
        const normalized = normalizeFooterCoinValue(symbol);
        if (!normalized) return null;
        const { base } = splitDexCoin(normalized);
        const local = String(base || normalized).replace("/", "_");
        if (local === "USA500" || local === "COPPER") return null;
        const iconUrl = `images/coins/${encodeURIComponent(local)}.svg`;
        if (!isSameOriginAsset(iconUrl)) return null;
        try {
          const res = await fetch(iconUrl);
          if (!res.ok) return null;
          const svgText = await res.text();
          const matches = svgText.match(/#[0-9a-fA-F]{3,6}/g) || [];
          if (!matches.length) return null;

          const counts = new Map();
          const normalizeHex = (hex) => {
            const h = hex.replace("#", "");
            if (h.length === 3) return `#${h[0]}${h[0]}${h[1]}${h[1]}${h[2]}${h[2]}`.toLowerCase();
            return `#${h.padEnd(6, "0").slice(0, 6)}`.toLowerCase();
          };
          const brightness = (hex) => {
            const h = normalizeHex(hex).slice(1);
            const r = parseInt(h.slice(0, 2), 16);
            const g = parseInt(h.slice(2, 4), 16);
            const b = parseInt(h.slice(4, 6), 16);
            return (r * 299 + g * 587 + b * 114) / 1000;
          };

          matches.forEach((hex) => {
            const norm = normalizeHex(hex);
            const b = brightness(norm);
            if (b > 240 || b < 20) return;
            counts.set(norm, (counts.get(norm) || 0) + 1);
          });

          let best = null;
          let bestCount = 0;
          counts.forEach((count, color) => {
            if (count > bestCount) {
              best = color;
              bestCount = count;
            }
          });
          return best;
        } catch (e) {
          return null;
        }
      }

      function updatePriceTickerRolling() {
        if (!priceFooterWrapEl || !priceListEl || !priceTickerEl || !priceTrackEl) return;
        const items = priceListEl.querySelectorAll(".price-item");
