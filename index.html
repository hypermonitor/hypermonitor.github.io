<head>

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Hypermonitor",
      "url": "https://hypermonitor.org/",
      "logo": "https://hypermonitor.org/images/logo.png",
      "sameAs": [
        "https://twitter.com/HypermonitorX",
        "https://github.com/hypermonitor"
      ]
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/favicon.png" />

  <style>
    :root {
      --apple-font: 'Outfit', -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      font-family: var(--apple-font);
      color-scheme: dark;

      /* Deepmind-style palette */
      --bg: #101014;
      --card-bg: #0a0a0a;
      --accent: #0070f3;
      /* Cleaner blue */
      --accent-2: #00b4d8;
      /* Cyan */
      --accent-rgb: 0, 112, 243;
      --accent-2-rgb: 0, 180, 216;
      --cta-rgb: 250, 250, 250;
      /* Stark white for primary actions */
      --accent-soft: rgba(0, 112, 243, 0.1);
      --danger: #e00;
      --muted: #888;
      --border: #222;
      --text-main: #ededed;

      --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
      --radius: 8px;
      --page-width: 1200px;
      /* Sharper corners */
      --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
      --section-spacing: 4.5rem;
    }

    * {
      box-sizing: border-box;
      font-family: inherit;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: var(--text-main);
      font-size: 18px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: 'Outfit', var(--apple-font);
      font-weight: 600;
      margin-top: 0;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: 'Outfit', var(--apple-font);
      font-weight: 600;
      margin-top: 0;
    }

    a {
      color: #dcdddd;
      text-decoration: none;
      padding: 0;
      border: none;
      background: none;
    }

    a:hover {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    #app {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 1rem;
      position: relative;
      z-index: 1;
    }

    /* Top nav */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 1rem;
      z-index: 20;
      margin-bottom: 1.2rem;
      padding: 0.75rem 1rem;
      border-radius: 999px;
      background: rgba(10, 10, 12, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(15px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
    }

    .brand-name {
      font-weight: 600;
      letter-spacing: 0.04em;
      font-size: 1.05rem;
      text-transform: uppercase;
      margin: 0;
      color: #fff;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-link,
    .nav-cta {
      font-size: 0.9rem;
      padding: 0.38rem 0.7rem;
      border-radius: 999px;
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .nav-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(10, 10, 12, 0.7);
      color: #fff;
      cursor: pointer;
    }

    .nav-toggle span,
    .nav-toggle span::before,
    .nav-toggle span::after {
      display: block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      position: relative;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .nav-toggle span::before,
    .nav-toggle span::after {
      content: "";
      position: absolute;
      left: 0;
    }

    .nav-toggle span::before {
      top: -6px;
    }

    .nav-toggle span::after {
      bottom: -6px;
    }

    .nav-link {
      color: rgba(255, 255, 255, 0.82);
    }

    .nav-link:hover,
    .nav-link.is-active {
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
      text-decoration: none;
    }

    .nav-cta {
      background: #fff;
      color: #000;
      font-weight: 600;
    }

    .nav-cta:hover {
      background: #ddd;
      color: #000;
      text-decoration: none;
    }


    /* Hero */
    .hero {
      position: relative;
      overflow: hidden;
      border-radius: calc(var(--radius) + .2rem);
      border: none;
      background: transparent;
      box-shadow: none;
      margin-bottom: 0;
    }

    @media (max-width: 900px) {
      header {
        flex-wrap: wrap;
        border-radius: 22px;
      }

      .nav-toggle {
        display: inline-flex;
        margin-left: auto;
      }

      nav {
        display: none;
        width: 100%;
        flex-direction: column;
        align-items: flex-start;
        padding-top: 0.5rem;
      }

      nav a {
        width: 100%;
      }

      header.nav-open nav {
        display: flex;
      }

      header.nav-open .nav-toggle span {
        background: transparent;
      }

      header.nav-open .nav-toggle span::before {
        transform: translateY(6px) rotate(45deg);
      }

      header.nav-open .nav-toggle span::after {
        transform: translateY(-6px) rotate(-45deg);
      }

    }

    @media (max-width: 640px) {
      #app {
        padding: 0.9rem;
      }

      .brand-name {
        font-size: 0.9rem;
      }
    }

    @media (max-width: 900px) and (orientation: portrait) {
      .bleed-inner {
        padding: 0 0.9rem;
      }

      footer {
        padding: 1.5rem 1rem 1.5rem 1rem;
      }

      .grid {
        grid-template-columns: 1fr !important;
      }

      #leaderboard table {
        table-layout: fixed;
        width: 100%;
      }

      #leaderboard th,
      #leaderboard td {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #leaderboard th:first-child,
      #leaderboard td:first-child {
        width: 2.2rem;
      }

      #leaderboard th:nth-child(2),
      #leaderboard td:nth-child(2) {
        width: 58%;
      }

      #leaderboard th:nth-child(5),
      #leaderboard td:nth-child(5) {
        width: 26%;
        text-align: right;
      }

      #leaderboard th:nth-child(3),
      #leaderboard td:nth-child(3),
      #leaderboard th:nth-child(4),
      #leaderboard td:nth-child(4),
      #leaderboard th:nth-child(6),
      #leaderboard td:nth-child(6) {
        display: none;
      }
    }

    @media (max-width: 768px) {
      #leaderboard .leaderboard-table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      #leaderboard table {
        font-size: 0.78rem;
      }

      #leaderboard th,
      #leaderboard td {
        padding: 0.35rem 0.4rem;
      }

      #leaderboard th:first-child,
      #leaderboard td:first-child {
        width: 2.2rem;
      }

      #leaderboard th:nth-child(2),
      #leaderboard td:nth-child(2) {
        max-width: 8rem;
      }
    }

    .hero h1 {
      margin: 0 0 .35rem;
      font-size: 2.4rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 0 0 0.65rem;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.5;
      max-width: 60ch;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .45rem;
      padding: .55rem 1.2rem;
      border-radius: var(--radius);
      font-size: .95rem;
      border: 1px solid var(--border);
      background: #111;
      color: var(--text-main);
      cursor: pointer;
      text-decoration: none;
      user-select: none;
      transition: border-color 0.15s ease, transform 0.15s ease, filter 0.15s ease;
    }

    .btn:hover {
      border-color: #475569;
      transform: translateY(-1px);
      filter: brightness(1.05);
      text-decoration: none;
    }

    .btn-primary {
      border-color: transparent;
      background: #fff;
      color: #000;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #ddd;
      color: #000;
      text-decoration: none;
    }

    .btn-secondary {
      border-color: #2f2f2f;
      background: #cfd2d4;
      color: #111;
      font-weight: 600;
    }

    .btn-secondary:hover {
      background: #b7bbbf;
      color: #111;
      text-decoration: none;
    }

    .btn small {
      font-weight: 600;
      opacity: .85;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 0.7rem;
      margin: 0.6rem 0 0.6rem;
    }

    .stack {
      grid-template-columns: 1fr;
      gap: 1.4rem;
    }

    .center-stack {
      display: flex;
      flex-direction: column;
    }

    .center-vert {
      display: flex;
      align-items: center;
    }

    .card {
      background: transparent;
      border-radius: var(--radius);
      border: none;
      padding: 0;
      box-shadow: none;
      position: relative;
      overflow: hidden;
    }

    .info-card {
      background: transparent;
      border: none;
      padding: 1.1rem;
      box-shadow: none;
    }

    .info-card::before,
    .info-card::after {
      display: none;
    }

    .info-card>* {
      position: relative;
      z-index: 1;
    }

    .info-card.animate-on-scroll {
      transition:
        opacity 600ms ease,
        transform 700ms var(--ease);
    }

    .info-card.animate-on-scroll.is-visible {
      box-shadow: none;
    }

    .info-card h2 {
      margin-bottom: 0.5rem;
    }

    .bleed-panel {
      position: relative;
      overflow: visible;
    }

    .bleed-panel::before {
      display: none;
    }

    .bleed-inner {
      max-width: var(--page-width);
      margin: 0 auto;
      padding: 0 1rem;
    }

    #faq .grid {
      justify-items: start;
    }

    .bleed-panel.purple-panel::before {
      display: none;
    }

    .card h2 {
      margin: 0 0 0.75rem;
      display: flex;
      align-items: center;
      gap: .4rem;
      justify-content: space-between;
    }

    .section-title {
      font-size: 1.8rem;
      letter-spacing: -0.01em;
      font-weight: 600;
    }

    .card h2 .left {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }

    .muted {
      color: var(--muted);
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead {
      background: transparent;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    th,
    td {
      padding: 0.45rem 0.5rem;
      text-align: left;
      border-bottom: none;
      white-space: nowrap;
    }

    tbody tr:nth-child(even) {
      background: transparent;
    }

    .row-link {
      cursor: pointer;
    }

    .row-link:hover {
      background: rgba(255, 255, 255, 0.08) !important;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 0.15rem 0.45rem;
      border-radius: 9999px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(148, 163, 184, 0.35);
      color: var(--muted);
      background: rgba(148, 163, 184, 0.12);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(6px);
      position: relative;
      isolation: isolate;
    }

    .pill-live {
      color: #4ade80;
      border-color: rgba(74, 222, 128, 0.6);
      background: linear-gradient(120deg, rgba(74, 222, 128, 0.25), rgba(16, 185, 129, 0.1));
    }

    .pill-soon {
      color: #38bdf8;
      border-color: rgba(56, 189, 248, 0.55);
      background: linear-gradient(120deg, rgba(56, 189, 248, 0.24), rgba(14, 116, 144, 0.1));
    }

    /* Feature list */
    .feature {
      display: grid;
      grid-template-columns: 1fr;
      gap: .7rem;
      align-items: start;
      padding: .7rem .75rem;
      border-radius: .85rem;
      border: none;
      background: transparent;
    }

    .feature h4 {
      margin: 0 0 .2rem;
      font-size: 1.05rem;
    }

    .feature p {
      margin: 0;
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.4;
    }

    .how-panel:not(.how-card) {
      border: none;
      background: transparent;
      box-shadow: none;
    }

    .how-panel:not(.how-card).animate-on-scroll,
    .how-panel:not(.how-card).animate-on-scroll.is-visible {
      box-shadow: none;
    }

    #how {
      position: relative;
      overflow: hidden;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    #leaderboard {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
    }

    .leaderboard-footer-row td {
      padding: 0.6rem 0.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
    }

    .leaderboard-footer-link {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      gap: 0.4rem;
      align-items: center;
      transition: color 0.15s ease;
    }

    .leaderboard-footer-link:hover {
      color: var(--text-main);
    }

    #leaderboard th.sortable {
      cursor: pointer;
    }

    #leaderboard th.sortable:hover {
      color: #97fde5;
    }

    #leaderboard .muted {
      font-size: 0.9rem;
    }

    #leaderboard table {
      font-size: 0.82rem;
    }
    #leaderboard .leaderboard-table-wrap {
      position: relative;
    }
    #leaderboard .leaderboard-table-wrap.loading {
      --pulse-size: 220px;
      background-image: url("images/pulse.gif");
      background-repeat: no-repeat;
      background-position: center 45%;
      background-size: var(--pulse-size) auto;
    }
    #leaderboard .loading-overlay {
      position: absolute;
      left: 50%;
      top: calc(45% + (var(--pulse-size) * 0.35));
      transform: translate(-50%, -50%);
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
      display: none;
    }
    #leaderboard .leaderboard-table-wrap.loading .loading-overlay {
      display: block;
    }

    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .feature-tile {
      padding: .85rem .9rem;
      border-radius: .95rem;
      border: none;
      background: rgba(255, 255, 255, 0.02);
      align-items: center;
      --tile-border: #26d97f;
      --tile-tag: #26d97f;
      --tile-icon-bg: rgba(38, 217, 127, 0.08);
      transition: transform 350ms var(--ease), background 350ms var(--ease);
    }

    .feature-tile:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: none;
    }



    /* Contact form */
    .contact-form {
      margin-top: 1rem;
      display: grid;
      gap: .65rem;
      max-width: 680px;
    }

    .contact-card {
      padding: 1.1rem;
    }

    .contact-form label {
      font-size: .85rem;
      color: var(--muted);
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: .6rem .7rem;
      border-radius: .7rem;
      border: 1px solid #3b3b3b;
      background: #2a2a2a;
      color: var(--text-main);
      font-size: .95rem;
      font-family: inherit;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      outline: none;
      border-color: #fff;
    }

    .contact-form textarea {
      min-height: 96px;
      resize: vertical;
    }

    .contact-actions {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: .4rem;
    }

    @media (max-width: 600px) {
      .contact-actions {
        margin-bottom: .8rem;
      }
    }

    .contact-status {
      min-height: 1em;
      font-size: .82rem;
      color: var(--muted);
    }

    .contact-status.is-success {
      color: #4ade80;
    }

    .contact-status.is-error {
      color: #fb7185;
    }

    /* Success popup */

    /* Footer */
    footer {
      margin-top: 0;
      padding: 2rem 1rem 1rem 1.75rem;
      min-height: 140px;
      background: #f3f3f3 !important;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.45;
      position: relative;
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
    }

    footer a {
      color: var(--muted);
    }

    footer a:hover {
      color: #000;
    }

    .x-logo,
    .li-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      vertical-align: middle;
    }

    .x-logo svg,
    .li-logo svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* Light theme */

    .panel-section {
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
    }

    .section-gap {
      margin-top: 4rem;
    }

    .panel-dark {
      background: transparent;
    }

    .panel-dark-alt {
      background: transparent;
    }

    /* Scroll reveal */
    .animate-on-scroll {
      opacity: 0;
      transform: translateY(18px);
      transition:
        opacity 420ms ease,
        transform 520ms ease;
      transition-delay: var(--reveal-delay, 0ms);
      will-change: opacity, transform;
    }

    .animate-on-scroll.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .animate-on-scroll {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
      }
    }

    @media (max-width: 768px) {
      .section-gap {
        margin-top: 2.5rem;
      }
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- HEADER / NAV -->
    <header>
      <a class="brand" href="/" aria-label="Hypermonitor home">
        <img src="images/logo.png" alt="Hypermonitor logo" style="width: 2.8rem; height: auto; border-radius: 4px;" />
        <h1 class="brand-name"><span>Hyper</span><em style="font-style: inherit;">monitor</em></h1>
      </a>

      <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false"
        aria-controls="primary-nav">
        <span></span>
      </button>

  <script>
    const navToggle = document.querySelector(".nav-toggle");
    const header = document.querySelector("header");
    const primaryNav = document.getElementById("primary-nav");
    if (navToggle && header && primaryNav) {
      navToggle.addEventListener("click", () => {
        const isOpen = header.classList.toggle("nav-open");
        navToggle.setAttribute("aria-expanded", String(isOpen));
      });

      primaryNav.addEventListener("click", (event) => {
        if (!(event.target instanceof HTMLElement)) return;
        const link = event.target.closest("a");
        if (!link) return;
        header.classList.remove("nav-open");
        navToggle.setAttribute("aria-expanded", "false");
      });
    }

    // Smooth scroll for on-page links (mirrors test.html)
    document.addEventListener("click", (e) => {
      const anchor = e.target.closest('a[href^="#"]');
      if (!anchor) return;
      const id = anchor.getAttribute("href");
      if (!id || id.length <= 1) return;
      const target = document.querySelector(id);
      if (!target) return;
      e.preventDefault();
      target.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    // Footer year
    const yearElement = document.getElementById("year");
    if (yearElement) {
      yearElement.textContent = new Date().getFullYear();
    }

    // Count-up animation for preview numbers
    const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    function formatCount(value) {
      return Math.round(value).toLocaleString();
    }
    function animateCount(el) {
      const target = Number(el.getAttribute("data-count"));
      if (!Number.isFinite(target)) return;
      const suffix = el.getAttribute("data-suffix") || "";
      const start = performance.now();
      const duration = 1100;

      function tick(now) {
        const t = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        const current = target * eased;
        el.textContent = `${formatCount(current)}${suffix}`;
        if (t < 1) requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }
    function initCountUps() {
      const counters = document.querySelectorAll(".count-up[data-count]");
      if (!counters.length) return;
      if (prefersReduced) {
        counters.forEach(el => {
          const target = Number(el.getAttribute("data-count")) || 0;
          const suffix = el.getAttribute("data-suffix") || "";
          el.textContent = `${formatCount(target)}${suffix}`;
        });
        return;
      }

      const io = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            animateCount(entry.target);
            obs.unobserve(entry.target);
          }
        });
      }, { threshold: 0.6 });

      counters.forEach(el => io.observe(el));
    }

    // Contact form success popup
    const contactForm = document.getElementById("contactForm");
    const contactStatus = document.getElementById("contactStatus");
    if (contactForm) {
      contactForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        if (contactStatus) {
          contactStatus.textContent = "Sending...";
          contactStatus.classList.remove("is-success", "is-error");
        }
        try {
          const res = await fetch(contactForm.action, {
            method: "POST",
            headers: { "Accept": "application/json" },
            body: new FormData(contactForm)
          });
          if (!res.ok) throw new Error("Form submit failed");
          if (contactStatus) {
            contactStatus.textContent = "Sent!";
            contactStatus.classList.add("is-success");
          }
          contactForm.reset();
        } catch (err) {
          if (contactStatus) {
            contactStatus.textContent = "Submit failed. Check the endpoint.";
            contactStatus.classList.add("is-error");
          }
        }
      });
    }

    function initScrollReveals() {
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const smallScreen = window.matchMedia("(max-width: 768px)").matches;
      const targets = Array.from(
        document.querySelectorAll(".hero, .card, .feature, .person")
      );
      if (!targets.length) return;
      if (smallScreen) {
        targets.forEach((el) => el.classList.add("is-visible"));
        return;
      }
      if (!("IntersectionObserver" in window)) {
        targets.forEach((el) => el.classList.add("is-visible"));
        return;
      }

      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            obs.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15, rootMargin: "0px 0px -10% 0px" });

      targets.forEach((el, idx) => {
        el.classList.add("animate-on-scroll");
        if (!reduceMotion) {
          const delay = Math.min(idx * 70, 350);
          el.style.setProperty("--reveal-delay", `${delay}ms`);
        }
        observer.observe(el);
      });

      const revealInView = () => {
        const vh = window.innerHeight;
        targets.forEach((el) => {
          if (el.classList.contains("is-visible")) return;
          const rect = el.getBoundingClientRect();
          if (rect.bottom > 0 && rect.top < vh * 0.9) {
            el.classList.add("is-visible");
          }
        });
      };

      requestAnimationFrame(revealInView);
      window.setTimeout(revealInView, 500);
      window.setTimeout(revealInView, 1400);
    }



    const runWhenIdle = (fn, timeout = 1200) => {
      if ("requestIdleCallback" in window) {
        window.requestIdleCallback(fn, { timeout });
        return;
      }
      window.setTimeout(fn, Math.min(timeout, 800));
    };

    const runAfterLoad = (fn) => {
      if (document.readyState === "complete") {
        fn();
        return;
      }
      window.addEventListener("load", fn, { once: true });
    };

    // Leaderboard preview (first entries from leaderboard.html)
    function initLeaderboardPreview() {
      const tbody = document.getElementById("leaderboardPreviewBody");
      const tableWrap = document.getElementById("leaderboardPreviewWrap");
      if (!tbody) return;

      const LEADERBOARD_URL =
        window.HYPERMONITOR_LEADERBOARD_API_URL ||
        (() => {
          try {
            return localStorage.getItem("hypermonitor-leaderboard-api-url") || "";
          } catch (err) {
            return "";
          }
        })() ||
        "https://hypermonitor-private-leaderboard.hypermonitor.workers.dev/api/leaderboard";
      const DEST_BASE = "https://www.hypermonitor.org/track?wallet=";
      const PREVIEW_LIMIT = 10;
      const PREVIEW_WINDOW = "allTime";
      let viewRows = [];
      let sortKey = "rank";
      let sortDir = "asc";

      const setStatus = (msg) => {
        if (tableWrap) tableWrap.classList.remove("loading");
        tbody.innerHTML = `<tr><td colspan="7" class="muted">${msg}</td></tr>`;
      };
      const renderLoadingRows = (count = 10) => {
        const rows = Array.from({ length: count }, () => (
          `<tr><td class="mono">&nbsp;</td><td class="mono">&nbsp;</td><td class="mono">&nbsp;</td><td class="mono">&nbsp;</td><td class="mono">&nbsp;</td><td class="mono">&nbsp;</td><td class="mono">&nbsp;</td></tr>`
        )).join("");
        tbody.innerHTML = rows;
      };
      const setLoadingState = (isLoading) => {
        if (tableWrap) tableWrap.classList.toggle("loading", isLoading);
        if (isLoading) renderLoadingRows();
      };

      const fmtMoney = (v, decimals = 2) => {
        const n = Number(v);
        if (!Number.isFinite(n)) return "";
        const sign = n < 0 ? "-" : "";
        const abs = Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        return `${sign}$${abs}`;
      };

      const fmtPct = (v) => {
        const n = Number(v);
        if (!Number.isFinite(n)) return "";
        const sign = n < 0 ? "-" : "";
        const abs = Math.abs(n * 100).toLocaleString(undefined, { maximumFractionDigits: 2 });
        return `${sign}${abs}%`;
      };

      const fmtScore = (v) => {
        const n = Number(v);
        if (!Number.isFinite(n)) return "";
        return (n * 100).toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
      };

      const shortAddr = (addr) => {
        if (!addr || typeof addr !== "string") return "";
        if (addr.length <= 12) return addr;
        return addr.slice(0, 6) + "…" + addr.slice(-4);
      };

      const perfForWindow = (row, windowKey) => {
        const wp = row?.windowPerformances;
        if (!Array.isArray(wp)) return null;
        for (const entry of wp) {
          if (Array.isArray(entry) && entry[0] === windowKey) return entry[1] || null;
        }
        return null;
      };

      const normalize = (rows) => {
        return (rows || []).map((r, idx) => {
          const address =
            r?.ethAddress ||
            r?.address ||
            r?.user ||
            r?.wallet ||
            "";

          const accountValue = Number(r?.accountValue ?? r?.account_value ?? NaN);

          const p = perfForWindow(r, PREVIEW_WINDOW) || {};
          const pnl = Number(p?.pnl ?? p?.pnlUsd ?? p?.pnl_usd ?? NaN);
          const roi = Number(p?.roi ?? p?.return ?? NaN);
          const volume = Number(p?.vlm ?? p?.vol ?? p?.tradeVolume ?? NaN);
          const walletScore = Number(r?.wallet_score ?? r?.walletScore ?? NaN);

          return { rank: idx + 1, address, accountValue, pnl, roi, volume, walletScore };
        });
      };

      const applySortAndRender = () => {
        const rows = viewRows.slice();
        rows.sort((a, b) => {
          const va = a?.[sortKey];
          const vb = b?.[sortKey];
          const na = Number(va);
          const nb = Number(vb);
          const aValid = Number.isFinite(na);
          const bValid = Number.isFinite(nb);
          if (!aValid && !bValid) return 0;
          if (!aValid) return 1;
          if (!bValid) return -1;
          return sortDir === "asc" ? (na - nb) : (nb - na);
        });
        render(rows.slice(0, PREVIEW_LIMIT));
      };

      const render = (rows) => {
        if (!rows.length) {
          setStatus("No results.");
          return;
        }

        tbody.innerHTML = rows.map(r => {
          const addr = r.address || "";
          const href = DEST_BASE + encodeURIComponent(addr);
          const pnlColor = Number.isFinite(r.pnl) ? (r.pnl >= 0 ? "#4ade80" : "#fb7185") : "inherit";
          const roiColor = Number.isFinite(r.roi) ? (r.roi >= 0 ? "#4ade80" : "#fb7185") : "inherit";

          return `
            <tr class="row-link" data-href="${href}" title="Open ${addr}">
              <td class="mono">${r.rank}</td>
              <td class="mono">${shortAddr(addr)}</td>
              <td class="mono">${fmtMoney(r.accountValue)}</td>
              <td class="mono" style="color:${pnlColor};">${Number.isFinite(r.pnl) ? fmtMoney(r.pnl) : ""}</td>
              <td class="mono" style="color:${roiColor};">${Number.isFinite(r.roi) ? fmtPct(r.roi) : ""}</td>
              <td class="mono">${Number.isFinite(r.volume) ? fmtMoney(r.volume, 0) : ""}</td>
              <td class="mono">${Number.isFinite(r.walletScore) ? fmtScore(r.walletScore) : ""}</td>
            </tr>
          `;
        }).join("");

        tbody.querySelectorAll("tr[data-href]").forEach(tr => {
          tr.addEventListener("click", () => {
            const href = tr.getAttribute("data-href");
            if (href) window.open(href, "_blank", "noopener");
          });
        });
      };

      const parseRows = (json) => {
        if (Array.isArray(json)) return json;
        if (json && typeof json === "object") {
          if (Array.isArray(json.data)) return json.data;
          if (Array.isArray(json.leaderboard)) return json.leaderboard;
          if (Array.isArray(json.leaderboardRows)) return json.leaderboardRows;
          if (json.result && Array.isArray(json.result)) return json.result;
          if (json.payload && Array.isArray(json.payload)) return json.payload;
        }
        return null;
      };

      const loadLeaderboardPreview = async () => {
        setLoadingState(true);
        try {
          const res = await fetch(LEADERBOARD_URL, { cache: "no-store" });
          const rawText = await res.text();
          if (!res.ok) {
            throw new Error(`HTTP ${res.status} ${res.statusText} — ${rawText.slice(0, 120)}`);
          }

          let json;
          try {
            json = JSON.parse(rawText);
          } catch {
            throw new Error(`Non-JSON response: ${rawText.slice(0, 120)}`);
          }

          const rawRows = parseRows(json);
          if (!rawRows) throw new Error("Unexpected leaderboard response.");

          viewRows = normalize(rawRows).slice(0, PREVIEW_LIMIT);
          setLoadingState(false);
          applySortAndRender();
        } catch (e) {
          console.error("Leaderboard preview failed:", e);
          setStatus("Failed to load private leaderboard preview.");
        }
      };

      document.querySelectorAll("#leaderboardPreviewWrap th.sortable").forEach(th => {
        th.addEventListener("click", () => {
          const key = th.getAttribute("data-key");
          if (!key) return;
          if (sortKey === key) sortDir = (sortDir === "asc" ? "desc" : "asc");
          else {
            sortKey = key;
            sortDir = "asc";
          }
          applySortAndRender();
        });
      });

      loadLeaderboardPreview();
    }

    function initFeatureCardInteraction() {
      const cards = document.querySelectorAll(".feature-card");
      cards.forEach(card => {
        card.addEventListener("mouseenter", () => {
          cards.forEach(c => c.classList.remove("is-active"));
          card.classList.add("is-active");
        });
      });
    }

    const initCore = () => {
      initScrollReveals();
      initCountUps();
      initFeatureCardInteraction();
      initLeaderboardPreview();
      initHeroRotator();
    };

    function initHeroRotator() {
      const items = document.querySelectorAll('.rotator-item');
      if (items.length < 2) return;
      let current = 0;

      setInterval(() => {
        const prev = items[current];
        prev.classList.remove('is-active');
        prev.classList.add('is-leaving');

        setTimeout(() => {
          prev.classList.remove('is-leaving');
        }, 800);

        current = (current + 1) % items.length;
        items[current].classList.add('is-active');
      }, 3500);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initCore, { once: true });
    } else {
      initCore();
    }

    runAfterLoad(() => {
    });
  </script>
