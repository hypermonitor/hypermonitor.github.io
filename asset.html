<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hypermonitor — Asset Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Hypermonitor asset terminal with live chart and order book." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/favicon.png" />

  <style>
    :root {
      font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: dark;
      --bg: #0b0b0f;
      --card-bg: rgba(12, 12, 16, 0.92);
      --accent: #26d97f;
      --accent-soft: rgba(38, 217, 127, 0.18);
      --danger: #f25f5c;
      --border: rgba(255,255,255,0.08);
      --muted: rgba(245,245,255,0.62);
      --text-main: #f5f5ff;
      --glass: rgba(10, 10, 12, 0.7);
      --glass-border: rgba(255, 255, 255, 0.12);
      --accent-blue: #0070f3;
      --accent-cyan: #00b4d8;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --radius: 12px;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text-main);
      overflow-x: hidden;
    }

    body.light {
      color-scheme: light;
      --bg: #f7f8fb;
      --card-bg: rgba(255, 255, 255, 0.92);
      --border: rgba(15, 23, 42, 0.12);
      --muted: rgba(15, 23, 42, 0.65);
      --text-main: #0f172a;
      --glass: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(15, 23, 42, 0.10);
    }

    a { color: inherit; text-decoration: none; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    /* ---- Shell ---- */
    #app {
      min-height: 100vh;
      padding: 1.5rem;
      padding-bottom: 4rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      flex: 0 0 auto;
    }

    .brand img {
      width: 2.4rem;
      height: 2.4rem;
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
    }

    .brand-name {
      margin: 0;
      font-weight: 600;
      letter-spacing: 0.04em;
      font-size: 1rem;
      text-transform: uppercase;
      line-height: 1;
    }

    .brand-name .hyper { color: #fff; }
    .brand-name em { font-style: normal; opacity: 0.9; }
    body.light .brand-name .hyper { color: #0f172a; }

    .header-center {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex: 1 1 auto;
      min-width: 0;
      justify-content: center;
      justify-self: center;
    }

    a {
      color: var(--muted);
      text-decoration: none;
      padding: 0;
      border: none;
      background: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    a:hover { color: inherit; text-decoration: underline; }
    body.light a { color: #475569; }
    body.light a:hover { color: inherit; text-decoration: underline; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.6rem;
      border-radius: 999px;
      border: 1px solid var(--glass-border);
      background: rgba(10, 10, 12, 0.45);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      white-space: nowrap;
      max-width: 100%;
    }
    body.light .pill { background: rgba(255,255,255,0.75); }

    .pill-label {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .asset-input {
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-main);
      font-family: var(--mono);
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      width: 9ch;
    }

    .asset-btn {
      border: 1px solid #334155;
      background: #0f172a;
      color: #cbd5f5;
      border-radius: 999px;
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      font-size: 0.75rem;
      transition: transform 120ms ease, filter 120ms ease;
    }
    body.light .asset-btn {
      background: #ffffff;
      color: #475569;
      border-color: #e5e7eb;
    }
    .asset-btn:hover { filter: brightness(1.12); transform: translateY(-1px); }

    .kpi {
      display: inline-flex;
      flex-direction: column;
      gap: 0.1rem;
      padding: 0.45rem 0.7rem;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(10, 10, 12, 0.55);
      min-width: 160px;
    }
    body.light .kpi { background: rgba(255,255,255,0.55); }

    .kpi .label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .kpi .value {
      font-family: var(--mono);
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-right {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      flex: 0 0 auto;
      justify-self: end;
    }

    .theme-toggle-btn {
      border-radius: 999px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #cbd5f5;
      padding: 0.32rem 0.7rem;
      cursor: pointer;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }
    body.light .theme-toggle-btn {
      background: #ffffff;
      color: #475569;
      border-color: #e5e7eb;
    }
    .theme-toggle-btn:hover { border-color: #475569; transform: translateY(-1px); }

    /* ---- Terminal Layout ---- */
    .terminal {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) 360px;
      gap: 0.9rem;
      align-items: stretch;
      flex: 1 1 auto;
      min-height: 72vh;
    }

    .panel {
      border-radius: var(--radius);
      border: 1px solid rgba(148, 163, 184, 0.12);
      background: var(--card-bg);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.8rem 0.85rem;
      border-bottom: 1px solid var(--border);
      background: #17181f;
    }
    body.light .panel-header { background: rgba(15, 23, 42, 0.04); }

    .panel-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin: 0;
    }

    .panel-sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin: 0;
      font-family: var(--mono);
    }

    .coinFallback {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--border);
      color: var(--muted);
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Chart */
    .chart-wrap {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
    }

    #hl_chart {
      width: 100%;
      height: 100%;
      min-height: 520px;
    }

    .chart-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      pointer-events: none;
    }

    .chart-empty.hidden { display: none; }

    .chart-overlay {
      position: absolute;
      left: 0.85rem;
      top: 0.85rem;
      z-index: 5;
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .tf-btn {
      border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.18);
      color: var(--text-main);
      border-radius: 999px;
      padding: 0.25rem 0.55rem;
      font-size: 0.72rem;
      cursor: pointer;
      font-family: var(--mono);
      transition: filter 120ms ease, transform 120ms ease;
    }
    body.light .tf-btn { background: rgba(255,255,255,0.62); }
    .tf-btn:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .tf-btn.active {
      border-color: rgba(38, 217, 127, 0.6);
      box-shadow: 0 0 0 3px rgba(38, 217, 127, 0.15);
    }

    /* Order book */
    .book {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .book-body {
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      gap: 0;
      min-height: 0;
    }

    .book-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.78rem;
      font-variant-numeric: tabular-nums;
    }

    .book-table thead th {
      text-align: right;
      padding: 0.45rem 0.75rem;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: #17181f;
      z-index: 2;
    }
    body.light .book-table thead th { background: rgba(255,255,255,0.7); }

    .book-table tbody tr { position: relative; }

    .book-table td {
      padding: 0.32rem 0.75rem;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    body.light .book-table td { border-bottom-color: rgba(15,23,42,0.06); }

    .book-scroll {
      overflow: auto;
      min-height: 0;
    }

    .row-bar {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      opacity: 0.22;
      pointer-events: none;
      transform-origin: right center;
    }

    .row-bar.bid { background: var(--accent); }
    .row-bar.ask { background: var(--danger); }

    .midline {
      padding: 0.55rem 0.85rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem;
      background: rgba(0,0,0,0.12);
    }
    body.light .midline { background: rgba(15, 23, 42, 0.04); }

    .midline .mid {
      font-family: var(--mono);
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
    }

    .midline .spread {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      padding: 0.7rem 0.85rem;
    }

    .price-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 50;
      background: rgba(10, 10, 12, 0.9);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      box-shadow: 0 -12px 30px rgba(0, 0, 0, 0.4);
    }

    .price-footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.15rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: nowrap;
    }

    .price-logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      flex: 0 0 auto;
    }

    .price-ticker {
      flex: 1 1 auto;
      overflow: hidden;
      min-width: 0;
    }

    .price-track {
      display: inline-flex;
      align-items: center;
      gap: 1.2rem;
      white-space: nowrap;
    }

    .price-list {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .price-list.clone {
      pointer-events: none;
      display: none;
    }

    .price-item {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--text-main);
      font-weight: 400;
      letter-spacing: 0.02em;
      cursor: grab;
    }

    .price-item img,
    .price-item .coinIcon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      object-fit: contain;
      background: transparent;
      padding: 0;
    }

    .price-item.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .price-item .coin-price {
      font-weight: 400;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      display: inline-block;
      min-width: 6ch;
      text-align: right;
    }

    .price-footer.rolling .price-list {
      flex-wrap: nowrap;
    }

    .price-footer.rolling .price-list.clone {
      display: inline-flex;
    }

    .price-footer.rolling .price-track {
      animation: priceScroll 24s linear infinite;
    }

    @keyframes priceScroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .price-controls {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-left: auto;
    }

    .price-input {
      padding: 0.3rem 0.5rem;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(10, 10, 12, 0.35);
      color: var(--text-main);
      font-size: 0.72rem;
      outline: none;
      width: 90px;
      text-transform: uppercase;
    }

    .price-add-btn {
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(148, 163, 184, 0.12);
      color: var(--text-main);
      padding: 0.25rem 0.5rem;
      border-radius: 999px;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .price-add-btn:hover { filter: brightness(1.1); }

    body.light .price-footer {
      background: rgba(255, 255, 255, 0.9);
      border-top-color: #e5e7eb;
      box-shadow: 0 -12px 24px rgba(15, 23, 42, 0.08);
    }

    body.light .price-item {
      color: #0f172a;
    }

    body.light .price-input {
      background: #ffffff;
      border-color: #e5e7eb;
      color: #0f172a;
    }

    body.light .price-add-btn {
      border-color: #e5e7eb;
      background: #f8fafc;
      color: #0f172a;
    }

    /* Responsive */
    @media (max-width: 1180px) {
      .terminal { grid-template-columns: 1fr 340px; }
    }
    @media (max-width: 980px) {
      header { grid-template-columns: 1fr; }
      .terminal { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
      .kpi { display: none; }
      #hl_chart { min-height: 520px; }
    }
  </style>
</head>

<body>
  <div id="app">
    <header>
      <a class="brand" href="/" aria-label="Hypermonitor home">
        <img src="images/logo.png" alt="Hypermonitor logo" />
        <h1 class="brand-name"><span class="hyper">Hyper</span><em>monitor</em></h1>
      </a>

      <div class="header-center">
        <div class="pill" title="Change asset">
          <span class="pill-label">Asset</span>
          <input id="assetInput" class="asset-input" type="text" autocomplete="off" spellcheck="false" />
          <button id="assetGo" class="asset-btn" type="button">Go</button>
        </div>

        <div class="kpi" aria-live="polite">
          <div class="label">Hyperliquid mid</div>
          <div class="value" id="midKpi">—</div>
        </div>

        <div class="kpi" aria-live="polite">
          <div class="label">Best bid / ask</div>
          <div class="value" id="baKpi">—</div>
        </div>
      </div>

      <div class="header-right">
        <a class="asset-btn" href="/track" title="Open wallet tracker">Tracker</a>
        <button id="themeToggle" class="theme-toggle-btn" type="button" aria-label="Toggle theme">☀️</button>
      </div>
    </header>

    <main class="terminal" aria-label="Asset terminal">
      <!-- Middle: Chart -->
      <section class="panel" aria-label="Chart">
        <div class="panel-header">
          <div>
            <div class="panel-title" id="chartTitle">Chart</div>
            <div class="panel-sub" id="chartSub">Hyperliquid candles</div>
          </div>
          <div class="panel-sub" id="tvSymbol">—</div>
        </div>

        <div class="chart-wrap">
          <div class="chart-overlay" aria-label="Timeframe">
            <button class="tf-btn active" data-interval="15m">15m</button>
            <button class="tf-btn" data-interval="1h">1h</button>
            <button class="tf-btn" data-interval="4h">4h</button>
            <button class="tf-btn" data-interval="1d">1d</button>
          </div>
          <div id="hl_chart" role="img" aria-label="Candlestick chart"></div>
          <div class="chart-empty" id="chartEmpty">Loading candles…</div>
        </div>
      </section>

      <!-- Right: Order Book -->
      <section class="panel book" aria-label="Order book">
        <div class="panel-header">
          <div>
            <div class="panel-title">Order book</div>
            <div class="panel-sub" id="bookSub">Hyperliquid L2</div>
          </div>
          <div class="panel-sub" id="bookStatus">connecting…</div>
        </div>

        <div class="book-body">
          <div class="book-scroll" aria-label="Asks">
            <table class="book-table">
              <thead>
                <tr>
                  <th>Price</th>
                  <th>Size</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody id="asksBody">
                <tr><td colspan="3" class="hint">Waiting for data…</td></tr>
              </tbody>
            </table>
          </div>

          <div class="midline" aria-label="Mid price">
            <div class="mid" id="midLine">—</div>
            <div class="spread" id="spreadLine">spread —</div>
          </div>

          <div class="book-scroll" aria-label="Bids">
            <table class="book-table">
              <tbody id="bidsBody">
                <tr><td colspan="3" class="hint">Waiting for data…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <footer style="padding: 0.25rem 0.2rem; color: var(--muted); font-size: 0.78rem;">
      © <span id="year"></span> <a href="/">Hypermonitor</a> · Asset terminal
    </footer>
  </div>

  <div class="price-footer" aria-label="Live prices">
    <div class="price-footer-inner" id="priceFooter">
      <img class="price-logo" src="images/logo.png" alt="Hypermonitor" />
      <div class="price-ticker" id="priceTicker">
        <div class="price-track" id="priceTrack">
          <div class="price-list" id="priceList"></div>
          <div class="price-list clone" id="priceListClone" aria-hidden="true"></div>
        </div>
      </div>
      <div class="price-controls">
        <input id="priceAddInput" class="price-input" type="text" placeholder="Add coin" autocomplete="off" />
        <button id="priceAddBtn" class="price-add-btn" type="button">Add</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <script type="module">
    import * as hl from "https://esm.sh/jsr/@nktkas/hyperliquid";

    const DEFAULT_ASSET = "BTC";
    const INFO_URL = "https://api.hyperliquid.xyz/info";
    const WS_URL = "wss://api.hyperliquid.xyz/ws";

    const assetInputEl = document.getElementById("assetInput");
    const assetGoEl = document.getElementById("assetGo");

    const midKpiEl = document.getElementById("midKpi");
    const baKpiEl = document.getElementById("baKpi");
    const midLineEl = document.getElementById("midLine");
    const spreadLineEl = document.getElementById("spreadLine");
    const chartTitleEl = document.getElementById("chartTitle");
    const chartSubEl = document.getElementById("chartSub");
    const tvSymbolEl = document.getElementById("tvSymbol");
    const bookStatusEl = document.getElementById("bookStatus");
    const asksBodyEl = document.getElementById("asksBody");
    const bidsBodyEl = document.getElementById("bidsBody");
    const themeToggleBtn = document.getElementById("themeToggle");
    const chartHostEl = document.getElementById("hl_chart");
    const chartEmptyEl = document.getElementById("chartEmpty");
    const priceFooterEl = document.getElementById("priceFooter");
    const priceFooterWrapEl = document.querySelector(".price-footer");
    const priceTickerEl = document.getElementById("priceTicker");
    const priceTrackEl = document.getElementById("priceTrack");
    const priceListEl = document.getElementById("priceList");
    const priceListCloneEl = document.getElementById("priceListClone");
    const priceAddInputEl = document.getElementById("priceAddInput");
    const priceAddBtnEl = document.getElementById("priceAddBtn");

    document.getElementById("year").textContent = String(new Date().getFullYear());

    let currentAsset = DEFAULT_ASSET;
    let currentInterval = "15m";

    let chart = null;
    let candleSeries = null;
    let chartResizeObserver = null;
    let candleWs = null;
    let candleWsOpen = false;
    let candleRequestId = 0;
    let candleSubscribed = { coin: null, interval: null };
    let lastCandle = null;

    // Hyperliquid mids
    let subsClient = null;
    let allMidsSub = null;
    const liveMids = new Map();
    const FOOTER_COINS_KEY = "hypermonitor-footer-coins";
    const DEFAULT_FOOTER_COINS = ["BTC", "ETH", "SOL", "HYPE"];
    let trackedFooterCoins = [...DEFAULT_FOOTER_COINS];

    // Hyperliquid order book websocket
    let l2Ws = null;
    let l2WsOpen = false;
    let l2SubscribedCoin = null;
    let lastBook = { bids: [], asks: [] };

    function normalizeCoin(s) {
      return String(s || "").trim().toUpperCase();
    }

    function normalizeFooterCoinSymbol(input) {
      const raw = String(input || "").trim();
      if (!raw) return "";
      if (raw.includes(":")) {
        const parts = raw.split(":");
        return normalizeCoin(parts[parts.length - 1]);
      }
      return normalizeCoin(raw);
    }

    function loadFooterCoins() {
      try {
        const raw = localStorage.getItem(FOOTER_COINS_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length) {
          trackedFooterCoins = parsed.map(normalizeFooterCoinSymbol).filter(Boolean);
        }
      } catch (e) {}
    }

    function saveFooterCoins() {
      try {
        localStorage.setItem(FOOTER_COINS_KEY, JSON.stringify(trackedFooterCoins));
      } catch (e) {}
    }

    function fmtPriceFixed(value, decimals) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "--";
      return n.toLocaleString(undefined, {
        maximumFractionDigits: decimals,
        minimumFractionDigits: decimals,
      });
    }

    function guessPriceDecimals(value) {
      const abs = Math.abs(Number(value));
      if (!Number.isFinite(abs)) return 2;
      if (abs >= 10000) return 0;
      if (abs >= 1000) return 1;
      if (abs >= 100) return 2;
      if (abs >= 10) return 3;
      if (abs >= 1) return 4;
      if (abs >= 0.1) return 5;
      if (abs >= 0.01) return 6;
      return 8;
    }

    function getLivePriceForCoin(coin) {
      const key = normalizeFooterCoinSymbol(coin);
      const px = liveMids.get(key);
      return Number.isFinite(px) ? px : NaN;
    }

    function createCoinFallback(symbol) {
      const letter = (symbol || "?")[0] || "?";
      const span = document.createElement("span");
      span.className = "coinFallback";
      span.textContent = letter;
      span.title = symbol;
      return span;
    }

    function createCoinIcon(symbol) {
      const img = document.createElement("img");
      img.className = "coinIcon";
      img.src = `https://app.hyperliquid.xyz/coins/${symbol}.png`;
      img.alt = symbol;
      img.loading = "lazy";
      img.referrerPolicy = "no-referrer";
      img.addEventListener("error", () => {
        const fallback = createCoinFallback(symbol);
        img.replaceWith(fallback);
      });
      return img;
    }

    function updatePriceTickerRolling() {
      if (!priceFooterWrapEl || !priceListEl || !priceTickerEl) return;
      const items = priceListEl.querySelectorAll(".price-item");
      if (!items.length) {
        priceFooterWrapEl.classList.remove("rolling");
        return;
      }
      const tops = new Set(Array.from(items).map((el) => el.offsetTop));
      const isWrapped = tops.size > 1;
      const isOverflow = priceListEl.scrollWidth > priceTickerEl.clientWidth + 4;
      const forceRoll = items.length >= 10;
      priceFooterWrapEl.classList.toggle("rolling", forceRoll || isWrapped || isOverflow);
    }

    function syncFooterList() {
      if (!priceFooterEl || !priceListEl || !priceListCloneEl) return;
      const desired = trackedFooterCoins.map((c) => normalizeFooterCoinSymbol(c)).filter(Boolean);
      const existing = new Map(
        Array.from(priceListEl.querySelectorAll(".price-item")).map((el) => [el.dataset.coin, el])
      );

      existing.forEach((el, coin) => {
        if (!desired.includes(coin)) el.remove();
      });

      desired.forEach((coin) => {
        let item = existing.get(coin);
        if (!item) {
          item = document.createElement("span");
          item.className = "price-item";
          item.dataset.coin = coin;
          item.setAttribute("draggable", "true");
          const icon = createCoinIcon(coin);
          const price = document.createElement("span");
          price.className = "coin-price";
          price.textContent = "--";
          item.appendChild(icon);
          item.appendChild(price);
          priceListEl.appendChild(item);
        } else {
          priceListEl.appendChild(item);
        }
      });

      priceListCloneEl.innerHTML = priceListEl.innerHTML;
      priceListCloneEl.querySelectorAll(".price-item").forEach((item) => {
        item.removeAttribute("draggable");
      });

      requestAnimationFrame(updatePriceTickerRolling);
    }

    function updateFooterPricesOnly() {
      if (!priceListEl) return;
      trackedFooterCoins.forEach((coin) => {
        const item = priceListEl.querySelector(`.price-item[data-coin="${coin}"]`);
        if (!item) return;
        const priceEl = item.querySelector(".coin-price");
        const price = getLivePriceForCoin(coin);
        if (!priceEl) return;
        if (Number.isFinite(price)) {
          const decimals = guessPriceDecimals(price);
          priceEl.textContent = fmtPriceFixed(price, decimals);
        } else {
          priceEl.textContent = "--";
        }
      });
      priceListCloneEl.innerHTML = priceListEl.innerHTML;
      priceListCloneEl.querySelectorAll(".price-item").forEach((item) => {
        item.removeAttribute("draggable");
      });
      updatePriceTickerRolling();
    }

    function renderFooterPrices() {
      trackedFooterCoins = trackedFooterCoins.map(normalizeFooterCoinSymbol).filter(Boolean);
      saveFooterCoins();
      syncFooterList();
      updateFooterPricesOnly();
    }

    function updateFooterActionLabel() {
      if (!priceAddBtnEl || !priceAddInputEl) return;
      const candidate = normalizeFooterCoinSymbol(priceAddInputEl.value);
      if (!candidate) {
        priceAddBtnEl.textContent = "Add";
        return;
      }
      priceAddBtnEl.textContent = trackedFooterCoins.includes(candidate) ? "Remove" : "Add";
    }

    async function toggleFooterCoin(raw) {
      const candidate = normalizeFooterCoinSymbol(raw);
      if (!candidate) return;
      if (trackedFooterCoins.includes(candidate)) {
        trackedFooterCoins = trackedFooterCoins.filter((c) => c !== candidate);
      } else {
        trackedFooterCoins = [...trackedFooterCoins, candidate];
      }
      saveFooterCoins();
      renderFooterPrices();
      updateFooterActionLabel();
    }

    function getAssetFromUrl() {
      const u = new URL(window.location.href);
      const a = u.searchParams.get("asset");
      return a ? normalizeCoin(a) : null;
    }

    function setAssetInUrl(asset, { replace = false } = {}) {
      const u = new URL(window.location.href);
      u.searchParams.set("asset", asset);
      if (replace) window.history.replaceState({}, "", u);
      else window.history.pushState({}, "", u);
    }

    function applyTheme(theme) {
      const bodyEl = document.body;
      if (theme === "light") {
        bodyEl.classList.add("light");
        themeToggleBtn.textContent = "☀️";
      } else {
        bodyEl.classList.remove("light");
        themeToggleBtn.textContent = "🌙";
      }
      try { localStorage.setItem("hypermonitor-theme", theme); } catch (e) {}
      updateChartTheme();
    }

    function initTheme() {
      let initial = "dark";
      try {
        const saved = localStorage.getItem("hypermonitor-theme");
        if (saved === "light" || saved === "dark") initial = saved;
      } catch (e) {}
      applyTheme(initial);
    }

    function fmtNum(v, { decimals = 2 } = {}) {
      const n = Number(v);
      if (!Number.isFinite(n)) return "—";
      return n.toLocaleString(undefined, { maximumFractionDigits: decimals, minimumFractionDigits: decimals });
    }

    function fmtPx(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return "—";
      // A simple adaptive formatter.
      const abs = Math.abs(n);
      const decimals = abs >= 1000 ? 2 : abs >= 10 ? 3 : abs >= 1 ? 4 : 6;
      return n.toLocaleString(undefined, { maximumFractionDigits: decimals });
    }

    function updateChartHeader(asset) {
      const coin = normalizeCoin(asset);
      if (chartTitleEl) chartTitleEl.textContent = `${coin} · PERP`;
      if (tvSymbolEl) tvSymbolEl.textContent = `Hyperliquid:${coin}`;
    }

    function getChartColors() {
      const isLight = document.body.classList.contains("light");
      return {
        text: isLight ? "#0f172a" : "#e5e7eb",
        grid: isLight ? "rgba(15,23,42,0.12)" : "rgba(148,163,184,0.12)",
        up: isLight ? "#16a34a" : "#4ade80",
        down: isLight ? "#dc2626" : "#f97373",
      };
    }

    function setChartStatus(text) {
      if (!chartEmptyEl) return;
      if (!text) {
        chartEmptyEl.classList.add("hidden");
        return;
      }
      chartEmptyEl.textContent = text;
      chartEmptyEl.classList.remove("hidden");
    }

    function updateChartHeaderStatus(state) {
      if (!chartSubEl) return;
      chartSubEl.textContent = state ? `Hyperliquid candles · ${state}` : "Hyperliquid candles";
    }

    function ensureChart() {
      if (!chartHostEl || !window.LightweightCharts) return;
      if (chart && candleSeries) return;

      chartHostEl.innerHTML = "";
      const colors = getChartColors();
      chart = LightweightCharts.createChart(chartHostEl, {
        width: chartHostEl.clientWidth,
        height: chartHostEl.clientHeight,
        layout: { background: { color: "transparent" }, textColor: colors.text },
        grid: { vertLines: { color: colors.grid }, horzLines: { color: colors.grid } },
        timeScale: { rightOffset: 2, borderColor: colors.grid },
        rightPriceScale: { borderColor: colors.grid },
        crosshair: { mode: 1 },
      });

      const seriesOptions = {
        upColor: colors.up,
        wickUpColor: colors.up,
        downColor: colors.down,
        wickDownColor: colors.down,
        borderVisible: false,
      };

      if (typeof chart.addCandlestickSeries === "function") {
        candleSeries = chart.addCandlestickSeries(seriesOptions);
      } else if (typeof chart.addSeries === "function" && window.LightweightCharts?.CandlestickSeries) {
        candleSeries = chart.addSeries(window.LightweightCharts.CandlestickSeries, seriesOptions);
      } else {
        throw new Error("Unsupported LightweightCharts build: no candlestick series available.");
      }

      if (chartResizeObserver) chartResizeObserver.disconnect();
      chartResizeObserver = new ResizeObserver(() => {
        chart.applyOptions({ width: chartHostEl.clientWidth, height: chartHostEl.clientHeight });
      });
      chartResizeObserver.observe(chartHostEl);
    }

    function updateChartTheme() {
      if (!chart || !candleSeries) return;
      const colors = getChartColors();
      chart.applyOptions({
        layout: { background: { color: "transparent" }, textColor: colors.text },
        grid: { vertLines: { color: colors.grid }, horzLines: { color: colors.grid } },
        timeScale: { borderColor: colors.grid },
        rightPriceScale: { borderColor: colors.grid },
      });
      candleSeries.applyOptions({
        upColor: colors.up,
        wickUpColor: colors.up,
        downColor: colors.down,
        wickDownColor: colors.down,
      });
    }

    const INTERVAL_MS = {
      "1m": 60000,
      "3m": 180000,
      "5m": 300000,
      "15m": 900000,
      "30m": 1800000,
      "1h": 3600000,
      "2h": 7200000,
      "4h": 14400000,
      "8h": 28800000,
      "12h": 43200000,
      "1d": 86400000,
      "3d": 259200000,
      "1w": 604800000,
      "1M": 2592000000,
    };

    async function fetchCandleSnapshot(coin, interval) {
      ensureChart();
      if (!candleSeries) return;
      const requestId = ++candleRequestId;
      const msPer = INTERVAL_MS[interval] || 900000;
      const end = Date.now();
      const start = end - msPer * 240;

      setChartStatus("Loading candles…");
      updateChartHeaderStatus("loading");

      const res = await fetch(INFO_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "candleSnapshot", req: { coin, interval, startTime: start, endTime: end } }),
      });
      if (!res.ok) throw new Error(`candleSnapshot failed: ${res.status} ${res.statusText}`);
      const data = await res.json();
      if (requestId !== candleRequestId) return;

      const candles = (Array.isArray(data) ? data : [])
        .map((c) => ({
          time: Math.floor(Number(c.t) / 1000),
          open: Number(c.o),
          high: Number(c.h),
          low: Number(c.l),
          close: Number(c.c),
        }))
        .filter((c) =>
          Number.isFinite(c.time) &&
          Number.isFinite(c.open) &&
          Number.isFinite(c.high) &&
          Number.isFinite(c.low) &&
          Number.isFinite(c.close)
        )
        .sort((a, b) => a.time - b.time);

      candleSeries.setData(candles);
      lastCandle = candles.length ? candles[candles.length - 1] : null;
      setChartStatus(candles.length ? "" : "No candles returned.");
      updateChartHeaderStatus(candleWsOpen ? "live" : "ready");
    }

    function connectCandleWs(coin, interval) {
      if (candleWs) {
        try { candleWs.close(); } catch {}
      }
      candleWs = null;
      candleWsOpen = false;
      updateChartHeaderStatus("connecting");

      try {
        candleWs = new WebSocket(WS_URL);
      } catch (err) {
        console.warn("candle ws error", err);
        updateChartHeaderStatus("ws error");
        return;
      }

      candleWs.addEventListener("open", () => {
        candleWsOpen = true;
        candleSubscribed = { coin, interval };
        updateChartHeaderStatus("live");
        try {
          candleWs.send(JSON.stringify({ method: "subscribe", subscription: { type: "candle", coin, interval } }));
        } catch {}
      });

      candleWs.addEventListener("message", (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg?.channel !== "candle") return;
          const arr = Array.isArray(msg?.data) ? msg.data : [];
          for (const c of arr) {
            const bar = {
              time: Math.floor(Number(c.t) / 1000),
              open: Number(c.o),
              high: Number(c.h),
              low: Number(c.l),
              close: Number(c.c),
            };
            if (Number.isFinite(bar.time)) {
              candleSeries?.update(bar);
              lastCandle = bar;
            }
          }
        } catch {}
      });

      candleWs.addEventListener("close", () => {
        candleWsOpen = false;
        updateChartHeaderStatus("reconnecting");
        setTimeout(() => {
          if (!candleSubscribed.coin || !candleSubscribed.interval) return;
          connectCandleWs(candleSubscribed.coin, candleSubscribed.interval);
        }, 900);
      });

      candleWs.addEventListener("error", () => {
        candleWsOpen = false;
        updateChartHeaderStatus("ws error");
        try { candleWs.close(); } catch {}
      });
    }

    async function refreshCandles() {
      const coin = normalizeCoin(currentAsset);
      updateChartHeader(coin);
      try {
        await fetchCandleSnapshot(coin, currentInterval);
      } catch (err) {
        console.error("candle snapshot error", err);
        const msg = err && err.message ? err.message : String(err || "Unknown error");
        setChartStatus(`Failed to load candles: ${msg}`);
        updateChartHeaderStatus("error");
      }
      connectCandleWs(coin, currentInterval);
    }

    function getBucketTimeSec(interval) {
      const msPer = INTERVAL_MS[interval] || 900000;
      const bucketStartMs = Math.floor(Date.now() / msPer) * msPer;
      return Math.floor(bucketStartMs / 1000);
    }

    function updateLastCandleFromPrice(px) {
      if (!candleSeries || !Number.isFinite(px)) return;
      const bucketTime = getBucketTimeSec(currentInterval);
      if (!lastCandle || !Number.isFinite(lastCandle.time)) {
        lastCandle = { time: bucketTime, open: px, high: px, low: px, close: px };
        candleSeries.update(lastCandle);
        return;
      }

      if (lastCandle.time < bucketTime) {
        lastCandle = { time: bucketTime, open: px, high: px, low: px, close: px };
        candleSeries.update(lastCandle);
        return;
      }

      if (lastCandle.time === bucketTime) {
        const next = {
          time: lastCandle.time,
          open: Number.isFinite(lastCandle.open) ? lastCandle.open : px,
          high: Math.max(Number.isFinite(lastCandle.high) ? lastCandle.high : px, px),
          low: Math.min(Number.isFinite(lastCandle.low) ? lastCandle.low : px, px),
          close: px,
        };
        lastCandle = next;
        candleSeries.update(next);
      }
    }

    function getBookLevelPx(level) {
      if (!level) return null;
      if (Array.isArray(level)) return Number(level[0]);
      return Number(level.px ?? level.price);
    }

    function getBookLevelSz(level) {
      if (!level) return null;
      if (Array.isArray(level)) return Number(level[1]);
      return Number(level.sz ?? level.size);
    }

    function renderOrderBook() {
      const bids = Array.isArray(lastBook.bids) ? lastBook.bids.slice(0, 15) : [];
      const asks = Array.isArray(lastBook.asks) ? lastBook.asks.slice(0, 15) : [];

      if (!bids.length && !asks.length) {
        asksBodyEl.innerHTML = `<tr><td colspan="3" class="hint">Waiting for data…</td></tr>`;
        bidsBodyEl.innerHTML = `<tr><td colspan="3" class="hint">Waiting for data…</td></tr>`;
        return;
      }

      const bidTotals = [];
      const askTotals = [];
      let bCum = 0;
      let aCum = 0;

      bids.forEach((lvl) => {
        const sz = getBookLevelSz(lvl) || 0;
        bCum += sz;
        bidTotals.push(bCum);
      });

      asks.forEach((lvl) => {
        const sz = getBookLevelSz(lvl) || 0;
        aCum += sz;
        askTotals.push(aCum);
      });

      const maxTotal = Math.max(bidTotals.at(-1) || 0, askTotals.at(-1) || 0, 1);

      // Asks often shown from best -> worse (top down). Incoming asks are usually best first.
      asksBodyEl.innerHTML = asks.map((lvl, i) => {
        const px = getBookLevelPx(lvl);
        const sz = getBookLevelSz(lvl);
        const total = askTotals[i] || 0;
        const w = Math.max(0, Math.min(1, total / maxTotal));
        return `
          <tr>
            <td style="color: var(--danger);">${fmtPx(px)}</td>
            <td>${fmtNum(sz, { decimals: 4 })}</td>
            <td>${fmtNum(total, { decimals: 4 })}</td>
            <td class="sr-only">ask</td>
            <td class="row-bar ask" style="width:${(w * 100).toFixed(2)}%;"></td>
          </tr>
        `;
      }).join("");

      bidsBodyEl.innerHTML = bids.map((lvl, i) => {
        const px = getBookLevelPx(lvl);
        const sz = getBookLevelSz(lvl);
        const total = bidTotals[i] || 0;
        const w = Math.max(0, Math.min(1, total / maxTotal));
        return `
          <tr>
            <td style="color: var(--accent);">${fmtPx(px)}</td>
            <td>${fmtNum(sz, { decimals: 4 })}</td>
            <td>${fmtNum(total, { decimals: 4 })}</td>
            <td class="sr-only">bid</td>
            <td class="row-bar bid" style="width:${(w * 100).toFixed(2)}%;"></td>
          </tr>
        `;
      }).join("");

      // Mid + spread labels
      const bestBid = getBookLevelPx(bids[0]);
      const bestAsk = getBookLevelPx(asks[0]);
      const mid = (Number.isFinite(bestBid) && Number.isFinite(bestAsk)) ? (bestBid + bestAsk) / 2
                : (Number.isFinite(bestBid) ? bestBid : (Number.isFinite(bestAsk) ? bestAsk : NaN));

      if (Number.isFinite(mid)) {
        midLineEl.textContent = fmtPx(mid);
        midKpiEl.textContent = fmtPx(mid);
        updateLastCandleFromPrice(mid);
      }

      if (Number.isFinite(bestBid) && Number.isFinite(bestAsk)) {
        const spreadAbs = bestAsk - bestBid;
        const spreadPct = (spreadAbs / ((bestAsk + bestBid) / 2)) * 100;
        spreadLineEl.textContent = `spread ${fmtPx(spreadAbs)} (${spreadPct.toFixed(3)}%)`;
        baKpiEl.textContent = `${fmtPx(bestBid)} / ${fmtPx(bestAsk)}`;
      } else {
        spreadLineEl.textContent = "spread —";
        baKpiEl.textContent = "—";
      }
    }

    function ensureL2BookWs() {
      if (l2Ws) return;
      try {
        l2Ws = new WebSocket(WS_URL);
      } catch (err) {
        console.warn("l2Book ws error", err);
        bookStatusEl.textContent = "ws error";
        l2Ws = null;
        return;
      }

      l2Ws.addEventListener("open", () => {
        l2WsOpen = true;
        bookStatusEl.textContent = "live";
        if (l2SubscribedCoin) {
          try {
            l2Ws.send(JSON.stringify({ method: "subscribe", subscription: { type: "l2Book", coin: l2SubscribedCoin } }));
          } catch {}
        }
      });

      l2Ws.addEventListener("message", (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg?.channel !== "l2Book") return;
          const data = msg?.data;
          const coin = data?.coin || msg?.subscription?.coin;
          if (!coin) return;
          if (normalizeCoin(coin) !== normalizeCoin(l2SubscribedCoin)) return;

          const bids = data?.levels?.[0] || data?.bids || [];
          const asks = data?.levels?.[1] || data?.asks || [];
          lastBook = { bids, asks };
          renderOrderBook();
        } catch {}
      });

      l2Ws.addEventListener("close", () => {
        l2WsOpen = false;
        bookStatusEl.textContent = "disconnected";
        l2Ws = null;
      });
    }

    function subscribeL2Book(coin) {
      const c = normalizeCoin(coin);
      l2SubscribedCoin = c;
      lastBook = { bids: [], asks: [] };
      renderOrderBook();
      ensureL2BookWs();
      if (l2WsOpen && l2Ws) {
        try {
          l2Ws.send(JSON.stringify({ method: "subscribe", subscription: { type: "l2Book", coin: c } }));
        } catch {}
      }
    }

    async function initClients() {
      if (!subsClient) subsClient = new hl.SubscriptionClient({ transport: new hl.WebSocketTransport() });
    }

    async function ensureAllMids() {
      if (!subsClient || allMidsSub) return;
      try {
        allMidsSub = await subsClient.allMids((event) => {
          let mids = event;
          if (event && typeof event === "object") {
            if ("data" in event && event.data) mids = event.data;
            if (mids && typeof mids === "object" && "mids" in mids) mids = mids.mids;
          }
          if (!mids || typeof mids !== "object") return;
          for (const [coin, midStr] of Object.entries(mids)) {
            const px = Number(midStr);
            if (!Number.isNaN(px)) liveMids.set(normalizeCoin(coin), px);
          }

          // Update footer prices + KPI (if we have a mid)
          const px = liveMids.get(normalizeCoin(currentAsset));
          if (Number.isFinite(px)) midKpiEl.textContent = fmtPx(px);
          updateFooterPricesOnly();
        });
      } catch (err) {
        console.error("allMids subscription error", err);
      }
    }

    function setAsset(nextAsset, { replaceUrl = false } = {}) {
      const next = normalizeCoin(nextAsset);
      if (!next) return;
      if (next === currentAsset) return;

      currentAsset = next;
      assetInputEl.value = next;
      setAssetInUrl(next, { replace: replaceUrl });

      // Chart + book
      refreshCandles();
      subscribeL2Book(next);

      // KPIs from allMids if present
      const px = liveMids.get(next);
      if (Number.isFinite(px)) midKpiEl.textContent = fmtPx(px);
      else midKpiEl.textContent = "—";

      baKpiEl.textContent = "—";
      midLineEl.textContent = "—";
      spreadLineEl.textContent = "spread —";

      renderFooterPrices();
    }

    function hookTimeframes() {
      document.querySelectorAll(".tf-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tf-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentInterval = btn.getAttribute("data-interval") || "15m";
          refreshCandles();
        });
      });
    }

    function hookAssetInput() {
      const commit = () => {
        const v = normalizeCoin(assetInputEl.value);
        if (!v) return;
        setAsset(v);
      };
      assetGoEl.addEventListener("click", commit);
      assetInputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") commit();
      });
    }

    function hookTheme() {
      themeToggleBtn.addEventListener("click", () => {
        const next = document.body.classList.contains("light") ? "dark" : "light";
        applyTheme(next);
      });
    }

    function hookFooterControls() {
      if (priceAddBtnEl) {
        priceAddBtnEl.addEventListener("click", async () => {
          const value = priceAddInputEl?.value || "";
          await toggleFooterCoin(value);
          if (priceAddInputEl) priceAddInputEl.value = "";
          updateFooterActionLabel();
        });
      }

      if (priceAddInputEl) {
        priceAddInputEl.addEventListener("keydown", async (e) => {
          if (e.key === "Enter") {
            await toggleFooterCoin(priceAddInputEl.value);
            priceAddInputEl.value = "";
            updateFooterActionLabel();
          }
        });

        priceAddInputEl.addEventListener("input", updateFooterActionLabel);
      }

      if (priceListEl) {
        let draggingCoin = null;

        priceListEl.addEventListener("dragstart", (e) => {
          const item = e.target.closest(".price-item");
          if (!item) return;
          draggingCoin = item.dataset.coin;
          item.classList.add("dragging");
          e.dataTransfer.effectAllowed = "move";
          try { e.dataTransfer.setData("text/plain", draggingCoin); } catch (err) {}
        });

        priceListEl.addEventListener("dragend", (e) => {
          const item = e.target.closest(".price-item");
          if (item) item.classList.remove("dragging");
          draggingCoin = null;
        });

        priceListEl.addEventListener("dragover", (e) => {
          const item = e.target.closest(".price-item");
          if (!item) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
        });

        priceListEl.addEventListener("drop", (e) => {
          const item = e.target.closest(".price-item");
          if (!item || !draggingCoin) return;
          e.preventDefault();
          const targetCoin = item.dataset.coin;
          if (!targetCoin || targetCoin === draggingCoin) return;

          const next = trackedFooterCoins.filter((c) => c !== draggingCoin);
          const targetIndex = next.indexOf(targetCoin);
          if (targetIndex === -1) return;
          next.splice(targetIndex, 0, draggingCoin);
          trackedFooterCoins = next;
          saveFooterCoins();
          renderFooterPrices();
        });
      }

      window.addEventListener("resize", () => {
        updatePriceTickerRolling();
      });
    }

    (async function boot() {
      initTheme();
      hookTheme();
      hookTimeframes();
      hookAssetInput();
      hookFooterControls();
      loadFooterCoins();
      updateFooterActionLabel();

      const initial = getAssetFromUrl() || DEFAULT_ASSET;
      currentAsset = normalizeCoin(initial);
      assetInputEl.value = currentAsset;
      setAssetInUrl(currentAsset, { replace: true });

      await initClients();
      await ensureAllMids();

      renderFooterPrices();

      // Build chart + order book
      refreshCandles();
      subscribeL2Book(currentAsset);
    })();
  </script>
</body>
</html>
