<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Asset Terminal — Hypermonitor</title>
    <meta name="description" content="Real-time crypto asset terminal with live charts and orderbook.">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #0a0a0a;
            --surface2: #111318;
            --border: #1e2329;
            --text: #e6edf3;
            --muted: #7d8590;
            --up: #2EBD85;
            --down: #F6465D;
            --header-h: 58px;
            --toolbar-h: 38px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px;
            overflow: hidden;
        }

        /* ── Layout ── */
        #layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ── Header ── */
        #header {
            height: var(--header-h);
            min-height: var(--header-h);
            background: #0a0a0a;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 20px;
            flex-shrink: 0;
            overflow: hidden;
        }

        /* Coin picker */
        #coin-picker-wrap {
            position: relative;
            flex-shrink: 0;
        }

        #coin-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 10px;
            cursor: pointer;
            color: var(--text);
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            user-select: none;
            transition: border-color 0.15s;
        }

        .coin-btn-meta {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        #coin-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .coin-btn-badge {
            display: inline-flex;
            align-items: center;
            height: 18px;
            padding: 0 6px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        #coin-btn:hover {
            border-color: #58a6ff;
        }

        #coin-btn .caret {
            font-size: 10px;
            color: var(--muted);
            margin-left: 2px;
        }

        #coin-logo {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: contain;
            flex-shrink: 0;
            background: #1e2329;
            padding: 1px;
        }

        .mini-coin-select {
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(6,7,9,0.8);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            margin-bottom: 4px;
            max-width: max-content;
        }

        .mini-coin-logo {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            object-fit: contain;
            background: #1e2329;
            padding: 1px;
            flex-shrink: 0;
        }

        .mini-coin-meta {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .mini-coin-label {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 600;
            font-size: 13px;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .mini-coin-badge {
            display: inline-flex;
            align-items: center;
            height: 16px;
            padding: 0 5px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255,255,255,0.04);
            color: var(--muted);
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        #coin-dropdown {
            display: none;
            position: fixed;
            min-width: 220px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            z-index: 9999;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
        }

        #coin-dropdown.open {
            display: flex;
            flex-direction: column;
        }

        #coin-search {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            width: 100%;
        }

        #coin-search::placeholder {
            color: var(--muted);
        }

        #coin-list {
            max-height: 240px;
            overflow-y: auto;
        }

        .coin-option {
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.1s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .coin-option:hover {
            background: var(--border);
        }

        .coin-option-main {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .coin-option-text {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .coin-option-logo {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            object-fit: contain;
            flex-shrink: 0;
            background: #1e2329;
            padding: 1px;
        }

        .coin-option-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .coin-option-badge {
            display: inline-flex;
            align-items: center;
            height: 18px;
            padding: 0 6px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--muted);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .coin-option .coin-px {
            color: var(--muted);
            font-size: 11px;
            white-space: nowrap;
        }

        /* Header stats */
        #header-stats {
            display: flex;
            align-items: center;
            gap: 20px;
            overflow-x: auto;
            flex: 1;
            min-width: 0;
        }

        .hstat {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex-shrink: 0;
        }

        .hstat .lbl {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .hstat .val {
            font-size: 13px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .val.up {
            color: var(--up);
        }

        .val.dn {
            color: var(--down);
        }

        /* WS dot */
        #ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f6ad55;
            box-shadow: 0 0 5px rgba(246, 173, 85, 0.6);
            flex-shrink: 0;
            margin-left: auto;
            transition: all 0.3s;
        }

        #ws-dot.live {
            background: var(--up);
            box-shadow: 0 0 6px rgba(46, 189, 133, 0.7);
        }

        #ws-dot.err {
            background: var(--down);
            box-shadow: 0 0 6px rgba(246, 70, 93, 0.7);
        }

        /* ── Main ── */
        #main {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ── Chart ── */
        #chart-side {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }

        #chart-toolbar {
            height: var(--toolbar-h);
            min-height: var(--toolbar-h);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 2px;
            flex-shrink: 0;
        }

        .tf-btn {
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            background: none;
            border: none;
            transition: all 0.15s;
            font-family: inherit;
        }

        .tf-btn:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .tf-btn.active {
            color: var(--bg);
            background: var(--text);
        }

        .tb-sep {
            width: 1px;
            height: 16px;
            background: var(--border);
            margin: 0 6px;
        }

        .tb-label {
            font-size: 12px;
            color: var(--muted);
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 4px;
            transition: all 0.15s;
        }

        .tb-label:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .chart-loading-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        .chart-loading-wrap.is-loading > :not(.chart-loading-overlay) {
            opacity: 0;
            pointer-events: none;
        }

        .chart-loading-overlay {
            position: absolute;
            inset: 0;
            z-index: 8;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            background: #060709;
            text-align: center;
            pointer-events: none;
        }

        .chart-loading-wrap.is-loading .chart-loading-overlay {
            display: flex;
        }

        .chart-loading-overlay img {
            width: min(148px, 38%);
            max-width: 148px;
            height: auto;
            opacity: 0.96;
            object-fit: contain;
        }

        .chart-loading-overlay span {
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        #chart-canvas {
            width: 100%;
            height: 100%;
        }

        #chart-wrap a[href*="tradingview"],
        #chart-wrap a[title*="TradingView"],
        #chart-wrap a[aria-label*="TradingView"],
        #chart-wrap-2 a[href*="tradingview"],
        #chart-wrap-2 a[title*="TradingView"],
        #chart-wrap-2 a[aria-label*="TradingView"] {
            background: transparent !important;
            border: 0 !important;
            box-shadow: none !important;
            border-radius: 0 !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }

        #chart-wrap a[href*="tradingview"] svg,
        #chart-wrap a[title*="TradingView"] svg,
        #chart-wrap a[aria-label*="TradingView"] svg,
        #chart-wrap a[href*="tradingview"] img,
        #chart-wrap a[title*="TradingView"] img,
        #chart-wrap a[aria-label*="TradingView"] img,
        #chart-wrap-2 a[href*="tradingview"] svg,
        #chart-wrap-2 a[title*="TradingView"] svg,
        #chart-wrap-2 a[aria-label*="TradingView"] svg,
        #chart-wrap-2 a[href*="tradingview"] img,
        #chart-wrap-2 a[title*="TradingView"] img,
        #chart-wrap-2 a[aria-label*="TradingView"] img {
            filter: brightness(0) invert(1);
            opacity: 0.92;
        }


        /* Chart legend */
        #chart-legend {
            position: absolute;
            top: 10px;
            left: 12px;
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        #legend-name {
            font-size: 13px;
            font-weight: 600;
        }

        #legend-ohlc {
            font-size: 11px;
            display: flex;
            gap: 10px;
            font-variant-numeric: tabular-nums;
            color: var(--muted);
        }

        #legend-ohlc span.v {
            color: var(--text);
        }

        /* ── Right panel ── */
        #right-panel {
            width: 310px;
            min-width: 310px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
            overflow: hidden;
            background: var(--surface);
        }

        .panel-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        .ptab {
            flex: 1;
            text-align: center;
            padding: 9px 0;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }

        .ptab:hover {
            color: var(--text);
        }

        .ptab.active {
            color: var(--text);
            border-bottom-color: var(--text);
        }

        .panel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-panel {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .tab-panel.active {
            display: flex;
        }

        /* Orderbook aggregation selector */
        #ob-agg-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 10px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
            gap: 6px;
        }

        #ob-agg-bar .agg-label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        #ob-agg-btns {
            display: flex;
            gap: 2px;
        }

        .agg-btn {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 500;
            color: var(--muted);
            background: none;
            border: 1px solid transparent;
            cursor: pointer;
            font-family: inherit;
            font-variant-numeric: tabular-nums;
            transition: all 0.12s;
        }

        .agg-btn:hover {
            color: var(--text);
            border-color: var(--border);
        }

        .agg-btn.active {
            color: var(--text);
            background: var(--surface2);
            border-color: var(--border);
        }

        /* Orderbook */
        .ob-hdr {
            display: flex;
            padding: 5px 12px;
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }

        .ob-hdr .c1 {
            flex: 1.1;
        }

        .ob-hdr .c2 {
            flex: 1;
            text-align: right;
        }

        .ob-hdr .c3 {
            flex: 1;
            text-align: right;
        }

        #ob-asks-wrap,
        #ob-bids-wrap {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #ob-asks-inner {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 100%;
            overflow: hidden;
        }

        #ob-bids-inner {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .ob-row {
            display: flex;
            align-items: center;
            padding: 0 12px;
            position: relative;
            cursor: pointer;
            font-size: 11.5px;
            font-variant-numeric: tabular-nums;
            line-height: 1.85;
            transition: background 0.08s;
        }

        .ob-row:nth-child(odd) {
            background: rgba(255, 255, 255, 0.012);
        }

        .ob-row:hover {
            background: var(--surface2) !important;
        }

        .ob-row .bar {
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            pointer-events: none;
            opacity: 0.15;
        }

        .ob-row .bar.ask-bar {
            background: var(--down);
        }

        .ob-row .bar.bid-bar {
            background: var(--up);
        }

        .ob-row .c1 {
            flex: 1.1;
            font-weight: 600;
            z-index: 1;
        }

        .ob-row .c2 {
            flex: 1;
            text-align: right;
            color: var(--muted);
            z-index: 1;
            font-size: 11px;
        }

        .ob-row .c3 {
            flex: 1;
            text-align: right;
            color: var(--muted);
            z-index: 1;
            font-size: 11px;
        }

        .ob-row .c1.ask {
            color: var(--down);
        }

        .ob-row .c1.bid {
            color: var(--up);
        }

        #ob-spread {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: #060709;
            flex-shrink: 0;
            font-size: 11px;
        }

        #ob-mid {
            font-size: 17px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.3px;
        }

        #ob-spread-info {
            color: var(--muted);
            font-size: 10px;
            text-align: right;
            line-height: 1.6;
        }

        /* Trades */
        #trades-hdr {
            display: flex;
            padding: 6px 12px;
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--surface2);
        }

        #trades-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .trade-row {
            display: flex;
            padding: 2px 12px;
            font-size: 11px;
            font-variant-numeric: tabular-nums;
            line-height: 1.75;
            align-items: center;
        }

        .trade-row .t-time {
            color: var(--muted);
            flex: 0 0 56px;
            font-size: 10px;
        }

        .trade-row .t-wallet {
            flex: 0 0 88px;
            min-width: 0;
        }

        .trade-wallet-btn {
            display: inline-flex;
            align-items: center;
            width: 100%;
            padding: 0;
            border: 0;
            background: transparent;
            color: var(--muted);
            font: inherit;
            font-size: 10px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .trade-wallet-btn:not(:disabled):hover {
            color: var(--text);
            text-decoration: underline;
        }

        .trade-wallet-btn:disabled {
            cursor: default;
            opacity: 0.5;
        }

        .trade-row .t-px {
            flex: 1;
            font-weight: 600;
        }

        .trade-row .t-sz {
            flex: 1;
            text-align: right;
            color: var(--muted);
            font-size: 11px;
        }

        .trade-row .t-px.buy {
            color: var(--up);
        }

        .trade-row .t-px.sell {
            color: var(--down);
        }

        .trade-row:nth-child(odd) {
            background: rgba(255, 255, 255, 0.01);
        }

        .wallet-modal-backdrop {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: rgba(2, 4, 8, 0.8);
            z-index: 12000;
        }

        .wallet-modal-backdrop.open {
            display: flex;
        }

        .wallet-modal {
            width: min(1480px, calc(100vw - 36px));
            height: min(92vh, calc(100vh - 36px));
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.6);
        }

        .wallet-modal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-height: 44px;
            padding: 0 12px 0 14px;
            border-bottom: 1px solid var(--border);
            background: #0c0f13;
        }

        .wallet-modal-title {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
        }

        .wallet-modal-wallet {
            color: var(--muted);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .wallet-modal-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .wallet-modal-link {
            color: var(--muted);
            font-size: 11px;
            text-decoration: none;
        }

        .wallet-modal-link:hover {
            color: var(--text);
        }

        .wallet-modal-close {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface2);
            color: var(--text);
            font-size: 15px;
            line-height: 1;
        }

        .wallet-modal-frame {
            width: 100%;
            height: 100%;
            flex: 1;
            border: 0;
            background: #080a0d;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div id="layout">

        <!-- HEADER -->
        <header id="header">
            <div id="coin-picker-wrap">
                <div id="coin-btn" onclick="toggleDropdown()">

    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        // ── Config ──────────────────────────────────────────────────
        const API = 'https://api.hyperliquid.xyz/info';
        const WS = 'wss://api.hyperliquid.xyz/ws';
        const COIN_ICON_BASE = 'https://app.hyperliquid.xyz/coins/';
        const NON_CRYPTO_PREFIXES = ['xyz', 'flx', 'hyna', 'km', 'vntl', 'cash'];
        const SPECIAL_LOGOS = new Map([
            ['USA500', 'images/coins/USA500.png'],
            ['COPPER', 'images/coins/COPPER.png'],
            ['GOLD', 'images/coins/GOLD.svg'],
            ['SILVER', 'images/coins/SILVER.svg'],
            ['CRCL', 'images/coins/CRCL.svg'],
            ['OIL', 'images/coins/OIL.svg'],
            ['USOIL', 'images/coins/USOIL.svg']
        ]);
        const DOMAIN_LOGOS = new Map([
            ['NVDA', 'https://logo.clearbit.com/nvidia.com'],
            ['MSTR', 'https://logo.clearbit.com/microstrategy.com'],
            ['TSLA', 'https://logo.clearbit.com/tesla.com'],
            ['AAPL', 'https://logo.clearbit.com/apple.com'],
            ['AMZN', 'https://logo.clearbit.com/amazon.com'],
            ['GOOGL', 'https://logo.clearbit.com/google.com'],
            ['MSFT', 'https://logo.clearbit.com/microsoft.com'],
            ['META', 'https://logo.clearbit.com/meta.com'],
            ['SPY', 'https://logo.clearbit.com/ssga.com'],
            ['QQQ', 'https://logo.clearbit.com/invesco.com'],
            ['CRCL', 'https://logo.clearbit.com/circle.com']
        ]);
        const TF_MS = { '1m': 60e3, '5m': 300e3, '15m': 900e3, '1h': 3600e3, '4h': 14400e3, '1d': 86400e3 };
        const ROWS = 14;
        const MAX_TRADES = 80;
        let perpDexNames = null;

        function splitDexCoin(name) {
            const s = String(name || '').trim();
            const idx = s.indexOf(':');
            if (idx > 0 && idx < s.length - 1) {
                return { dex: s.slice(0, idx), base: s.slice(idx + 1) };
            }
            return { dex: '', base: s };
        }

        function buildMarketKey(name, dex = '') {
            const raw = String(name || '').trim();
            if (!raw) return '';
            const parsed = splitDexCoin(raw);
            const base = String(parsed.base || raw).trim().toUpperCase();
            const prefix = String(parsed.dex || dex || '').trim().toLowerCase();
            return prefix ? `${prefix}:${base}` : base;
        }

        function getCoinDisplayName(name) {
            const { base } = splitDexCoin(name);
            return String(base || name || '').trim().toUpperCase();
        }

        function getCoinDexLabel(name) {
            const { dex } = splitDexCoin(name);
            return String(dex || '').trim().toLowerCase();
        }

        function getCoinDisplayLabel(name) {
            const normalized = buildMarketKey(name);
            const base = getCoinDisplayName(normalized);
            const dex = getCoinDexLabel(normalized);
            return dex ? `${dex}:${base}` : base;
        }

        function parseCoin() {
            const p = new URLSearchParams(location.search);
            return buildMarketKey(p.get('coin') || p.get('asset') || 'BTC');
        }

        // ── State ──────────────────────────────────────────────────
        const S = {
            coin: parseCoin(), tf: '15m', markPx: 0, aggTick: 0,
            markets: [], tradeBuf: [], ws: null,
            
            // Dual chart
            chart2Active: false,
            coin2: 'ETH'
        };

        // ── DOM refs ───────────────────────────────────────────────
        const $ = id => document.getElementById(id);
        const sMark = $('s-mark'), sChg = $('s-chg');
        const sVol = $('s-vol'), sOi = $('s-oi'), sFund = $('s-fund');
        const obAsks = $('ob-asks-inner'), obBids = $('ob-bids-inner');
        const obMid = $('ob-mid'), obSprdInfo = $('ob-spread-info');
        const tradesList = $('trades-list');
        const walletModalBackdrop = $('wallet-modal-backdrop');
        const walletModalFrame = $('wallet-modal-frame');
        const walletModalWallet = $('wallet-modal-wallet');
        const walletModalLink = $('wallet-modal-link');
        const walletModalClose = $('wallet-modal-close');
        
        // Legends
        const legName = $('legend-name'), legO = $('leg-o'), legH = $('leg-h'), legL = $('leg-l'), legC = $('leg-c'), legPct = $('leg-pct');
        const legName2 = $('legend-name-2'), legO2 = $('leg-o-2'), legH2 = $('leg-h-2'), legL2 = $('leg-l-2'), legC2 = $('leg-c-2'), legPct2 = $('leg-pct-2');

        // Layouts
        const rightPanel = $('right-panel');
        const obOpenBtn = $('ob-open-btn');
        const chartCont2 = $('chart-container-2');
        const addChartBtn = $('add-chart-btn');
        const chartLoadingWrap1 = $('chart-wrap');
        const chartLoadingWrap2 = $('chart-wrap-2');

        function setChartLoading(targetNum, isLoading, message = 'Loading...') {
            const wrap = targetNum === 2 ? chartLoadingWrap2 : chartLoadingWrap1;
            const overlay = $(`chart-loading-${targetNum}`);
            if (!wrap || !overlay) return;
            wrap.classList.toggle('is-loading', Boolean(isLoading));
            overlay.setAttribute('aria-hidden', isLoading ? 'false' : 'true');
            const textEl = overlay.querySelector('span');
            if (textEl) textEl.textContent = message;
        }

        function toggleOb() {
            if (rightPanel.style.display === 'none') {
                rightPanel.style.display = 'flex';
                obOpenBtn.style.display = 'none';
            } else {
                rightPanel.style.display = 'none';
                obOpenBtn.style.display = 'inline-block';
            }
        }

        function toggleChart2() {
            S.chart2Active = !S.chart2Active;
            if (S.chart2Active) {
                chartCont2.style.display = 'flex';
                addChartBtn.textContent = '- Remove Chart';
                syncSelectedCoinUi(2);
                fetchCandles2();
            } else {
                chartCont2.style.display = 'none';
                addChartBtn.textContent = '+ Add Chart';
            }
            connectWs();
        }

        // ── Formatting ─────────────────────────────────────────────
        function pxDec(v) { return v >= 10000 ? 1 : v >= 1000 ? 2 : v >= 10 ? 3 : 4; }
        function fmt(v, d) {
            if (!Number.isFinite(v)) return '–';
            if (d === undefined) d = pxDec(v);
            return v.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
        }
        function fmtK(v) {
            if (!Number.isFinite(v)) return '–';
            if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
            if (v >= 1e6) return (v / 1e6).toFixed(2) + 'M';
            if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
            return v.toFixed(2);
        }

        // ── Chart 1 Setup ──────────────────────────────────────────
        const chartWrap = $('chart-wrap');
        const chart = LightweightCharts.createChart($('chart-canvas'), {
            layout: { background: { color: '#060709' }, textColor: '#7d8590', attributionLogo: false },
            grid: { vertLines: { color: '#111318' }, horzLines: { color: '#111318' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal, vertLine: { color: '#58a6ff44', labelBackgroundColor: '#1e2329' }, horzLine: { color: '#58a6ff44', labelBackgroundColor: '#1e2329' } },
            rightPriceScale: { borderColor: '#1e2329' },
            timeScale: { borderColor: '#1e2329', timeVisible: true, secondsVisible: false },
        });

        const candles = chart.addCandlestickSeries({ upColor: '#2EBD85', wickUpColor: '#2EBD85', downColor: '#F6465D', wickDownColor: '#F6465D', borderVisible: false });
        const volSeries = chart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'vol', color: '#2EBD8540' });
        chart.priceScale('vol').applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });

        new ResizeObserver(() => { chart.applyOptions({ width: chartWrap.clientWidth, height: chartWrap.clientHeight }); }).observe(chartWrap);

        chart.subscribeCrosshairMove(param => {
            const bar = param?.seriesData?.get(candles);
            if (bar) {
                const d = pxDec(bar.close);
                legO.textContent = fmt(bar.open, d); legH.textContent = fmt(bar.high, d); legL.textContent = fmt(bar.low, d);
                legC.textContent = fmt(bar.close, d); legC.style.color = bar.close >= bar.open ? 'var(--up)' : 'var(--down)';
                const pct = ((bar.close - bar.open) / bar.open * 100).toFixed(2);
                legPct.textContent = `${pct >= 0 ? '+' : ''}${pct}%`; legPct.style.color = pct >= 0 ? 'var(--up)' : 'var(--down)';
            }
        });

        // ── Chart 2 Setup ──────────────────────────────────────────
        const chartWrap2 = $('chart-wrap-2');
        const chart2 = LightweightCharts.createChart($('chart-canvas-2'), {
            layout: { background: { color: '#060709' }, textColor: '#7d8590', attributionLogo: false },
            grid: { vertLines: { color: '#111318' }, horzLines: { color: '#111318' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal, vertLine: { color: '#58a6ff44', labelBackgroundColor: '#1e2329' }, horzLine: { color: '#58a6ff44', labelBackgroundColor: '#1e2329' } },
            rightPriceScale: { borderColor: '#1e2329' },
            timeScale: { borderColor: '#1e2329', timeVisible: true, secondsVisible: false },
        });

        const candles2 = chart2.addCandlestickSeries({ upColor: '#2EBD85', wickUpColor: '#2EBD85', downColor: '#F6465D', wickDownColor: '#F6465D', borderVisible: false });
        const volSeries2 = chart2.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'vol', color: '#2EBD8540' });
        chart2.priceScale('vol').applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });

        new ResizeObserver(() => { chart2.applyOptions({ width: chartWrap2.clientWidth, height: chartWrap2.clientHeight }); }).observe(chartWrap2);

        chart2.subscribeCrosshairMove(param => {
            const bar = param?.seriesData?.get(candles2);
            if (bar) {
                const d = pxDec(bar.close);
                legO2.textContent = fmt(bar.open, d); legH2.textContent = fmt(bar.high, d); legL2.textContent = fmt(bar.low, d);
                legC2.textContent = fmt(bar.close, d); legC2.style.color = bar.close >= bar.open ? 'var(--up)' : 'var(--down)';
                const pct = ((bar.close - bar.open) / bar.open * 100).toFixed(2);
                legPct2.textContent = `${pct >= 0 ? '+' : ''}${pct}%`; legPct2.style.color = pct >= 0 ? 'var(--up)' : 'var(--down)';
            }
        });

        // ── Candle data (deduplicated maps) ────────────────────────
        let candleMap = new Map(), volMap = new Map();
        let oldestTs = null, isLoadingHistory = false;

        let candleMap2 = new Map(), volMap2 = new Map();
        let oldestTs2 = null, isLoadingHistory2 = false;

        function parseRawCandles(data) {
            const cv = [], vl = [];
            for (const c of (data || [])) {
                const t = Math.floor(Number(c.t) / 1000);
                const o = Number(c.o), h = Number(c.h), l = Number(c.l), cl = Number(c.c), v = Number(c.v);
                if (!Number.isFinite(t)) continue;
                cv.push({ time: t, open: o, high: h, low: l, close: cl });
                vl.push({ time: t, value: v, color: cl >= o ? '#2EBD8540' : '#F6465D40' });
            }
            return { cv, vl };
        }

        async function fetchCandles() {
            const ms = TF_MS[S.tf] || 900e3, end = Date.now(), st = end - ms * 500;
            setChartLoading(1, true);
            try {
                const r = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'candleSnapshot', req: { coin: S.coin, interval: S.tf, startTime: st, endTime: end } }) });
                const { cv, vl } = parseRawCandles(await r.json());
                candleMap.clear(); volMap.clear();
                cv.forEach(c => candleMap.set(c.time, c)); vl.forEach(v => volMap.set(v.time, v));
                const cvArr = [...candleMap.values()].sort((a,b)=>a.time-b.time);
                oldestTs = cvArr.length ? cvArr[0].time : null;
                candles.setData(cvArr); volSeries.setData([...volMap.values()].sort((a,b)=>a.time-b.time));
                chart.timeScale().fitContent();
                if (cvArr.length) {
                    const last = cvArr[cvArr.length - 1], d = pxDec(last.close);
                    legO.textContent = fmt(last.open, d); legH.textContent = fmt(last.high, d); legL.textContent = fmt(last.low, d);
                    legC.textContent = fmt(last.close, d); legC.style.color = last.close >= last.open ? 'var(--up)' : 'var(--down)';
                }
            } catch(e) {} finally {
                setChartLoading(1, false);
            }
        }
        
        async function fetchCandles2() {
            if (!S.chart2Active) return;
            const coinLabel = getSelectedCoinLabel(S.coin2);
            $(`legend-name-2`).textContent = `${coinLabel}/USD • ${S.tf}`;
            syncSelectedCoinUi(2);
            
            const ms = TF_MS[S.tf] || 900e3, end = Date.now(), st = end - ms * 500;
            setChartLoading(2, true);
            try {
                const r = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'candleSnapshot', req: { coin: S.coin2, interval: S.tf, startTime: st, endTime: end } }) });
                const { cv, vl } = parseRawCandles(await r.json());
                candleMap2.clear(); volMap2.clear();
                cv.forEach(c => candleMap2.set(c.time, c)); vl.forEach(v => volMap2.set(v.time, v));
                const cvArr = [...candleMap2.values()].sort((a,b)=>a.time-b.time);
                oldestTs2 = cvArr.length ? cvArr[0].time : null;
                candles2.setData(cvArr); volSeries2.setData([...volMap2.values()].sort((a,b)=>a.time-b.time));
                chart2.timeScale().fitContent();
                if (cvArr.length) {
                    const last = cvArr[cvArr.length - 1], d = pxDec(last.close);
                    legO2.textContent = fmt(last.open, d); legH2.textContent = fmt(last.high, d); legL2.textContent = fmt(last.low, d);
                    legC2.textContent = fmt(last.close, d); legC2.style.color = last.close >= last.open ? 'var(--up)' : 'var(--down)';
                }
            } catch(e) {} finally {
                setChartLoading(2, false);
            }
        }

        async function loadOlderCandles(targetChart) {

        // ── API calls ─────────────────────────────────────────────
        async function getPerpDexNames() {

        async function fetchDexMeta(dex = '') {
            const payload = dex ? { type: 'metaAndAssetCtxs', dex } : { type: 'metaAndAssetCtxs' };
            const r = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },

            });
            const data = await r.json();
            const [meta, ctxs] = Array.isArray(data) ? data : [data?.meta, data?.assetCtxs];

                universe: Array.isArray(meta?.universe) ? meta.universe : [],
                ctxs: Array.isArray(ctxs) ? ctxs : []
            };

        function getCtxMarkPx(ctx) {
            return Number(ctx?.markPx ?? ctx?.mark ?? ctx?.midPx ?? ctx?.mid ?? ctx?.px);
        }

        function getCtxPrevPx(ctx) {
            return Number(ctx?.prevDayPx ?? ctx?.prevDay ?? ctx?.prevPx ?? ctx?.openPx);
        }

        function buildMarketEntry(entry, ctx, dex = '') {
            const rawName = String(ctx?.coin ?? ctx?.symbol ?? ctx?.asset ?? entry?.name ?? '').trim();
            const key = buildMarketKey(rawName, dex);
            if (!key) return null;
            return {
                key,
                dex: getCoinDexLabel(key),
                name: getCoinDisplayName(key),
                label: getCoinDisplayLabel(key),
                markPx: getCtxMarkPx(ctx),
                prevDayPx: getCtxPrevPx(ctx),
                funding: Number(ctx?.funding),
                dayNtlVlm: Number(ctx?.dayNtlVlm),
                openInterest: Number(ctx?.openInterest),
                isDelisted: Boolean(entry?.isDelisted)
            };
        }

        async function fetchMeta() {
            const dexNames = await getPerpDexNames();
            const results = await Promise.allSettled(dexNames.map(dex => fetchDexMeta(dex)));
            const mergedMarkets = new Map();

            results.forEach(result => {
                if (result.status !== 'fulfilled') return;
                const { dex, universe, ctxs } = result.value || {};
                const len = Math.max(universe.length, ctxs.length);
                for (let i = 0; i < len; i += 1) {
                    const market = buildMarketEntry(universe[i], ctxs[i], dex);
                    if (!isTradableCoin(market)) continue;
                    if (!mergedMarkets.has(market.key)) mergedMarkets.set(market.key, market);
                }
            });

            S.markets = [...mergedMarkets.values()].sort((a, b) => {
                const volDiff = (Number(b.dayNtlVlm) || 0) - (Number(a.dayNtlVlm) || 0);
                if (volDiff !== 0) return volDiff;
                return a.name.localeCompare(b.name);
            });
        }

        // ── Aggregation bar ────────────────────────────────────────
        function smartTicks(price) { return price >= 50000 ? [1,5,10,50,100] : price >= 10000 ? [0.5,1,5,10,50] : price >= 1000 ? [0.1,0.5,1,5,10] : price >= 100 ? [0.01,0.05,0.1,0.5,1] : price >= 10 ? [0.001,0.005,0.01,0.05,0.1] : price >= 1 ? [0.0001,0.001,0.005,0.01,0.05] : [0.00001,0.0001,0.001,0.01,0.1]; }
        function fmtTick(t) { if (t >= 1) return t % 1 === 0 ? t.toString() : t.toFixed(1); const s = t.toString(); return s.includes('e') ? t.toPrecision(1) : s; }
        function buildAggBar(price) {
            const ticks = smartTicks(price);
            if (!S.aggTick || !ticks.includes(S.aggTick)) S.aggTick = ticks[0];
            $('ob-agg-btns').innerHTML = ticks.map(t => `<button class="agg-btn${S.aggTick === t ? ' active' : ''}" onclick="setAgg(${t})">${fmtTick(t)}</button>`).join('');
        }

        // ── Orderbook fetch (REST) ─────────────────────────────────
        async function fetchBook() {
            try {
                const r = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'l2Book', coin: S.coin }) });
                const data = await r.json();
                renderBook(data?.levels?.[0] ?? data?.bids ?? [], data?.levels?.[1] ?? data?.asks ?? []);
            } catch (e) { }
        }

        // ── Orderbook renderer ─────────────────────────────────────
        function aggregateLevels(levels, tick, side) {
            if (!tick || tick <= 0) return levels.map(l => ({ px: Number(l.px), sz: Number(l.sz) }));
            const map = new Map();
            for (const l of levels) {
                const px = Number(l.px), sz = Number(l.sz);
                const bucket = side === 'ask' ? Math.ceil(px / tick) * tick : Math.floor(px / tick) * tick;
                const key = bucket.toFixed(10);
                map.set(key, (map.get(key) || 0) + sz);
            }
            return [...map.entries()].map(([k, sz]) => ({ px: parseFloat(k), sz })).sort((a, b) => side === 'ask' ? a.px - b.px : b.px - a.px);
        }

        function renderBook(bids, asks) {
            const d = pxDec(S.markPx || 1000), tick = S.aggTick || 0;
            const aggAsks = aggregateLevels(asks, tick, 'ask').slice(0, ROWS), aggBids = aggregateLevels(bids, tick, 'bid').slice(0, ROWS);
            let maxT = 0, aLvl = [], bLvl = [], cum = 0;
            for (const a of aggAsks) { cum += a.px * a.sz; aLvl.push({ px: a.px, sz: a.px * a.sz, cum }); }
            maxT = Math.max(maxT, cum); cum = 0;
            for (const b of aggBids) { cum += b.px * b.sz; bLvl.push({ px: b.px, sz: b.px * b.sz, cum }); }
            maxT = Math.max(maxT, cum);

            obAsks.innerHTML = [...aLvl].reverse().map(lv => `<div class="ob-row"><div class="bar ask-bar" style="width:${maxT > 0 ? (lv.cum/maxT*100).toFixed(1) : 0}%"></div><span class="c1 ask">${fmt(lv.px, d)}</span><span class="c2">${fmtK(lv.sz)}</span><span class="c3">${fmtK(lv.cum)}</span></div>`).join('');
            obBids.innerHTML = bLvl.map(lv => `<div class="ob-row"><div class="bar bid-bar" style="width:${maxT > 0 ? (lv.cum/maxT*100).toFixed(1) : 0}%"></div><span class="c1 bid">${fmt(lv.px, d)}</span><span class="c2">${fmtK(lv.sz)}</span><span class="c3">${fmtK(lv.cum)}</span></div>`).join('');

            if (aggAsks.length && aggBids.length) {
                const bestAsk = Number(aggAsks[0].px), bestBid = Number(aggBids[0].px);
                const mid = (bestAsk + bestBid) / 2, spread = bestAsk - bestBid, pct = (spread / mid * 100).toFixed(3);
                obMid.textContent = fmt(mid, d); obMid.className = 'val ' + (mid >= S.markPx ? 'up' : 'dn');
                obSprdInfo.textContent = `Spread ${fmt(spread, d)} (${pct}%)`;
            }
        }

        // ── Trades renderer ────────────────────────────────────────
        function renderTrades() {
            const fragment = document.createDocumentFragment();
            S.tradeBuf.forEach(trade => fragment.appendChild(buildTradeRow(trade)));
            tradesList.replaceChildren(fragment);
        }

        function formatWalletShort(wallet) {
            const value = String(wallet || '').trim();
            if (!value) return '—';
            return value.length <= 8 ? value : `${value.slice(0, 8)}…`;
        }

        function buildWalletTrackerHref(wallet) {
            return `track.html?wallet=${encodeURIComponent(wallet)}`;
        }

        function openWalletModal(wallet) {
            const value = String(wallet || '').trim();
            if (!value || !walletModalBackdrop || !walletModalFrame) return;
            walletModalWallet.textContent = value;
            walletModalLink.href = buildWalletTrackerHref(value);
            walletModalFrame.src = buildWalletTrackerHref(value);
            walletModalBackdrop.classList.add('open');
        }

        function closeWalletModal() {
            if (!walletModalBackdrop || !walletModalFrame) return;
            walletModalBackdrop.classList.remove('open');
            walletModalFrame.src = 'about:blank';
        }

        function getTradeWallet(rawTrade) {
            if (!rawTrade || typeof rawTrade !== 'object') return '';
            const direct = String(rawTrade.wallet || rawTrade.user || '').trim();
            if (direct) return direct;
            const users = Array.isArray(rawTrade.users) ? rawTrade.users : [];
            const side = String(rawTrade.side || '').toUpperCase();
            if (side === 'B') return String(users[0] || users[1] || '').trim();
            return String(users[1] || users[0] || '').trim();
        }

        function getTradeKey(rawTrade, wallet) {
            const hash = String(rawTrade?.hash || rawTrade?.txHash || '').trim();
            const tid = String(rawTrade?.tid ?? rawTrade?.tradeId ?? '').trim();
            const time = String(rawTrade?.time ?? '').trim();
            const side = String(rawTrade?.side || '').trim();
            const px = String(rawTrade?.px ?? '').trim();
            const sz = String(rawTrade?.sz ?? '').trim();
            return [hash, tid, time, side, px, sz, wallet].join('|');
        }

        function normalizeTrade(rawTrade) {
            const wallet = getTradeWallet(rawTrade);
            const trade = {
                key: getTradeKey(rawTrade, wallet),
                time: Number(rawTrade?.time ?? Date.now()),
                side: String(rawTrade?.side || '').toUpperCase(),
                px: Number(rawTrade?.px),
                sz: Number(rawTrade?.sz),
                wallet
            };
            if (!trade.key || !Number.isFinite(trade.px) || !Number.isFinite(trade.sz)) return null;
            return trade;
        }

        function compareTrades(a, b) {
            const timeDiff = Number(b?.time || 0) - Number(a?.time || 0);
            if (timeDiff !== 0) return timeDiff;
            return String(b?.key || '').localeCompare(String(a?.key || ''));
        }

        function buildTradeRow(trade) {
            const d = pxDec(S.markPx || 1000);
            const row = document.createElement('div');
            row.className = 'trade-row';

            const dt = new Date(Number(trade.time));
            const ts = `${String(dt.getHours()).padStart(2, '0')}:${String(dt.getMinutes()).padStart(2, '0')}:${String(dt.getSeconds()).padStart(2, '0')}`;

            const timeEl = document.createElement('span');
            timeEl.className = 't-time';
            timeEl.textContent = ts;

            const walletEl = document.createElement('button');
            walletEl.type = 'button';
            walletEl.className = 'trade-wallet-btn t-wallet';
            walletEl.textContent = formatWalletShort(trade.wallet);
            walletEl.title = trade.wallet || 'Wallet unavailable';
            if (trade.wallet) walletEl.dataset.wallet = trade.wallet;
            else walletEl.disabled = true;

            const priceEl = document.createElement('span');
            priceEl.className = `t-px ${trade.side === 'B' ? 'buy' : 'sell'}`;
            priceEl.textContent = fmt(Number(trade.px), d);

            const sizeEl = document.createElement('span');
            sizeEl.className = 't-sz';
            sizeEl.textContent = fmtK(Number(trade.sz) * Number(trade.px));

            row.append(timeEl, walletEl, priceEl, sizeEl);
            return row;
        }

        function syncTradeKeys() {
            tradeKeys = new Set(S.tradeBuf.map(trade => trade.key));
        }

        function resetTrades() {
            S.tradeBuf = [];
            syncTradeKeys();
            tradesList.replaceChildren();
        }

        function ingestTrades(rawTrades) {
            const nextTrades = [];
            for (const rawTrade of Array.isArray(rawTrades) ? rawTrades : []) {
                const trade = normalizeTrade(rawTrade);
                if (!trade || tradeKeys.has(trade.key)) continue;
                tradeKeys.add(trade.key);
                nextTrades.push(trade);
            }
            if (!nextTrades.length) return;

            nextTrades.sort(compareTrades);
            const currentTopTime = S.tradeBuf[0]?.time ?? -Infinity;
            const canPrepend = !S.tradeBuf.length || nextTrades.every(trade => trade.time >= currentTopTime);

            S.tradeBuf = nextTrades.concat(S.tradeBuf).sort(compareTrades).slice(0, MAX_TRADES);
            syncTradeKeys();

            if (!canPrepend) {
                renderTrades();
                return;
            }

            const fragment = document.createDocumentFragment();
            nextTrades.forEach(trade => fragment.appendChild(buildTradeRow(trade)));
            tradesList.prepend(fragment);
            while (tradesList.childElementCount > S.tradeBuf.length) {
                tradesList.removeChild(tradesList.lastElementChild);
            }
        }

        // ── WebSocket ──────────────────────────────────────────────
        let tradeKeys = new Set();

        function connectWs() {
            if (S.ws) { try { S.ws.close(); } catch (_) { } }
            S.ws = new WebSocket(WS);
            S.ws.onopen = () => {
                const subs = [
                    { type: 'l2Book', coin: S.coin }, 
                    { type: 'trades', coin: S.coin }, 
                    { type: 'candle', coin: S.coin, interval: S.tf }
                ];
                if (S.chart2Active && S.coin !== S.coin2) {
                    subs.push({ type: 'candle', coin: S.coin2, interval: S.tf });
                }
                subs.forEach(sub => S.ws.send(JSON.stringify({ method: 'subscribe', subscription: sub })));
            };
            S.ws.onmessage = ev => {
                try {
                    const msg = JSON.parse(ev.data), ch = msg.channel, d = msg.data;
                    if (ch === 'l2Book') {
                        renderBook(d?.levels?.[0] ?? d?.bids ?? [], d?.levels?.[1] ?? d?.asks ?? []);
                    } else if (ch === 'trades') {
                        ingestTrades(d);
                    } else if (ch === 'candle') {
                        const arr = Array.isArray(d) ? d : [];
                        if (!arr.length) return;
                        const coinStr = buildMarketKey(arr[0].s); 
                        
                        for (const c of arr) {
                            const bar = { time: Math.floor(c.t / 1000), open: +c.o, high: +c.h, low: +c.l, close: +c.c };
                            if (coinStr === S.coin) {
                                candles.update(bar);
                                if (candleMap.has(bar.time)) { const old = candleMap.get(bar.time); old.open = bar.open; old.high = bar.high; old.low = bar.low; old.close = bar.close; }
                                volSeries.update({ time: bar.time, value: +c.v, color: bar.close >= bar.open ? '#2EBD8540' : '#F6465D40' });
                            }
                            if (S.chart2Active && coinStr === S.coin2) {
                                candles2.update(bar);
                                if (candleMap2.has(bar.time)) { const old = candleMap2.get(bar.time); old.open = bar.open; old.high = bar.high; old.low = bar.low; old.close = bar.close; }
                                volSeries2.update({ time: bar.time, value: +c.v, color: bar.close >= bar.open ? '#2EBD8540' : '#F6465D40' });
                            }
                        }
                    }
                } catch (_) { }
            };
            S.ws.onclose = () => { setTimeout(connectWs, 2000); };
        }

        // ── Coin Picker Maps ───────────────────────────────────────
        let allCoins = [];
        let availableCoinNames = new Set();
        let marketByKey = new Map();
        let marketNameIndex = new Map();

        function coinLogoPath(name, ext = 'svg') {
            return `images/coins/${encodeURIComponent(getCoinDisplayName(name))}.${ext}`;

        function coinLogoCandidates(name) {
            const normalized = buildMarketKey(name);
            const { dex, base } = splitDexCoin(normalized);
            const baseName = String(base || normalized).trim().toUpperCase();
            const exact = dex ? `${dex.toLowerCase()}:${baseName}` : baseName;
            const urls = [];
            const push = url => {
                if (url && !urls.includes(url)) urls.push(url);
            };

            const hyperliquidLogoKeys = [];
            if (exact.includes(':')) hyperliquidLogoKeys.push(exact);
            NON_CRYPTO_PREFIXES.forEach(prefix => {
                const prefixed = `${prefix}:${baseName}`;
                if (!hyperliquidLogoKeys.includes(prefixed)) hyperliquidLogoKeys.push(prefixed);
            });
            if (!hyperliquidLogoKeys.includes(baseName)) hyperliquidLogoKeys.push(baseName);

            hyperliquidLogoKeys.forEach(key => {
                push(`${COIN_ICON_BASE}${encodeURIComponent(key)}.svg`);
                push(`${COIN_ICON_BASE}${encodeURIComponent(key)}.png`);
            });

            push(SPECIAL_LOGOS.get(exact));
            push(SPECIAL_LOGOS.get(baseName));
            push(DOMAIN_LOGOS.get(exact));
            push(DOMAIN_LOGOS.get(baseName));
            push(coinLogoPath(baseName, 'svg'));
            push(coinLogoPath(baseName, 'png'));
            push(`https://financialmodelingprep.com/image-stock/${encodeURIComponent(baseName)}.png`);
            push(`https://eodhd.com/img/logos/US/${encodeURIComponent(baseName)}.png`);
            return urls;
        }

        function setCoinLogo(el, name) {
            if (!el) return;
            const candidates = coinLogoCandidates(name);
            el.dataset.coin = buildMarketKey(name);
            el.dataset.logoCandidates = JSON.stringify(candidates);
            el.dataset.logoIndex = '0';
            if (!candidates.length) {
                el.style.display = 'none';
                return;
            }
            el.src = candidates[0];
            el.style.display = 'block';
            el.style.visibility = 'visible';

        function handleCoinImgError(el) {
            if (!el) return;
            const coin = el.dataset.coin;
            if (!coin) {
                el.style.display = 'none';
                return;
            }
            let candidates = [];
            try {
                candidates = JSON.parse(el.dataset.logoCandidates || '[]');
            } catch (_) {

            const nextIdx = Number(el.dataset.logoIndex || '0') + 1;
            if (nextIdx >= candidates.length) {

                return;
            }
            el.dataset.logoIndex = String(nextIdx);
            el.src = candidates[nextIdx];

        function isTradableCoin(market) {
            if (!market?.key || market.isDelisted) return false;
            return Number.isFinite(market.markPx) && market.markPx > 0;

        function syncSelectedCoinUi(targetNum = 1) {

        function resolveCoinSelection(value) {
            const normalized = buildMarketKey(value);
            if (availableCoinNames.has(normalized)) return normalized;
            const displayName = getCoinDisplayName(value);
            const matches = marketNameIndex.get(displayName);
            return matches?.[0]?.key || null;
        }

        function syncPrimaryCoinUrl() {
            if (!S.coin) return;
            const url = new URL(location.href);
            url.searchParams.set('coin', S.coin);
            history.replaceState(null, '', url.toString());
        }

        function syncSelectedCoins() {
            if (!allCoins.length) return;
            S.coin = resolveCoinSelection(S.coin) || allCoins[0].key;
            const secondary = resolveCoinSelection(S.coin2);
            if (!secondary || secondary === S.coin) {
                const fallback = allCoins.find(c => c.key !== S.coin);
                S.coin2 = fallback ? fallback.key : S.coin;
            } else {
                S.coin2 = secondary;

            syncPrimaryCoinUrl();
        }

        function buildCoinList() {
            allCoins = S.markets.slice();
            marketByKey = new Map(allCoins.map(c => [c.key, c]));
            marketNameIndex = new Map();
            allCoins.forEach(coin => {
                if (!marketNameIndex.has(coin.name)) marketNameIndex.set(coin.name, []);
                marketNameIndex.get(coin.name).push(coin);
            });
            availableCoinNames = new Set(allCoins.map(c => c.key));
            syncSelectedCoins();
            renderCoinList(allCoins, 1);
            renderCoinList(allCoins, 2);
            syncSelectedCoinUi(1);
            syncSelectedCoinUi(2);
        }

        function renderCoinList(list, targetNum) {
            $(`coin-list${targetNum===2?'-2':''}`).innerHTML = list.map(c => {
                const logoCandidates = JSON.stringify(coinLogoCandidates(c.key)).replace(/'/g, '&#39;');
                return `
                <div class="coin-option" data-coin-key="${c.key}" data-target-num="${targetNum}" tabindex="0" title="${c.key}">
                    <span class="coin-option-main">
                        <img class="coin-option-logo" src="${coinLogoCandidates(c.key)[0] || coinLogoPath(c.key)}" data-coin="${c.key}" data-logo-candidates='${logoCandidates}' data-logo-index="0" onerror="handleCoinImgError(this)" alt="${c.name}">
                        <span class="coin-option-text">
                            <span class="coin-option-name">${c.name}</span>
                            ${c.dex ? `<span class="coin-option-badge">${c.dex}</span>` : ''}
                        </span>
                    </span>
                    <span class="coin-px">$${fmt(c.markPx, pxDec(c.markPx))}</span>
                </div>
            `;
            }).join('');
        }

        function filterCoins(q) {
            q = q.trim().toUpperCase();
            renderCoinList(q ? allCoins.filter(c => c.name.includes(q) || c.label.toUpperCase().includes(q) || c.key.toUpperCase().includes(q)) : allCoins, 1);
        }
        function filterCoins2(q) {
            q = q.trim().toUpperCase();
            renderCoinList(q ? allCoins.filter(c => c.name.includes(q) || c.label.toUpperCase().includes(q) || c.key.toUpperCase().includes(q)) : allCoins, 2);
        }

        function toggleDropdown() {
            const dd = $('coin-dropdown'), btn = $('coin-btn');
            if (dd.classList.contains('open')) { dd.classList.remove('open'); return; }
            dd.classList.add('open');
            positionDropdown(dd, btn);
            $('coin-search').value = '';
            renderCoinList(allCoins, 1);
            $('coin-search').focus();
        }

        function toggleDropdown2() {
            const dd = $('coin-dropdown-2');
            if (dd.style.display === 'block') { dd.style.display = 'none'; return; }
            dd.style.display = 'block';
            positionDropdown(dd, $('coin-toggle-2'));
            $('coin-search-2').value = '';
            renderCoinList(allCoins, 2);
            $('coin-search-2').focus();
        }

        function selectCoin(name, targetNum) {
            const selected = resolveCoinSelection(name);
            if (!selected || !availableCoinNames.has(selected)) return;
            if (targetNum === 1) {
                if (selected === S.coin) { $('coin-dropdown').classList.remove('open'); return; }
                S.coin = selected;
                resetTrades();
                $('coin-dropdown').classList.remove('open');
                syncPrimaryCoinUrl();
                syncSelectedCoinUi(1);
                reinit();
            } else {
                S.coin2 = selected;
                $('coin-dropdown-2').style.display = 'none';
                syncSelectedCoinUi(2);
                fetchCandles2();
                connectWs();
            }
        }

        function positionDropdown(dd, anchor) {
            if (!dd || !anchor) return;
            dd.style.visibility = 'hidden';
            dd.style.minWidth = `${Math.max(anchor.offsetWidth, 220)}px`;
            const rect = anchor.getBoundingClientRect();
            const width = dd.offsetWidth || 220;
            const height = dd.offsetHeight || 280;
            const left = Math.max(8, Math.min(rect.left, window.innerWidth - width - 8));
            const top = Math.max(8, Math.min(rect.bottom + 6, window.innerHeight - height - 8));
            dd.style.left = `${left}px`;
            dd.style.top = `${top}px`;
            dd.style.visibility = '';
        }

        function handleCoinListActivation(event) {
            const option = event.target.closest('.coin-option[data-coin-key]');
            if (!option) return;
            selectCoin(option.dataset.coinKey || '', Number(option.dataset.targetNum || '1'));
        }

        function handleCoinListKeydown(event) {
            const option = event.target.closest('.coin-option[data-coin-key]');
            if (!option) return;
            if (event.key !== 'Enter' && event.key !== ' ') return;
            event.preventDefault();
            selectCoin(option.dataset.coinKey || '', Number(option.dataset.targetNum || '1'));
        }

        $('coin-list').addEventListener('click', handleCoinListActivation);
        $('coin-list-2').addEventListener('click', handleCoinListActivation);
        $('coin-list').addEventListener('keydown', handleCoinListKeydown);
        $('coin-list-2').addEventListener('keydown', handleCoinListKeydown);

        document.addEventListener('click', e => {
            if (!$('coin-picker-wrap').contains(e.target)) $('coin-dropdown').classList.remove('open');
            if (!$('chart-container-2').contains(e.target)) $('coin-dropdown-2').style.display = 'none';
        });

        tradesList.addEventListener('click', event => {
            const target = event.target;
            if (!(target instanceof HTMLElement)) return;
            const button = target.closest('.trade-wallet-btn[data-wallet]');
            if (!button) return;
            openWalletModal(button.dataset.wallet || '');
        });

        if (walletModalClose) {
            walletModalClose.addEventListener('click', closeWalletModal);
        }

        if (walletModalBackdrop) {
            walletModalBackdrop.addEventListener('click', event => {
                if (event.target === walletModalBackdrop) closeWalletModal();
            });
        }

        document.addEventListener('keydown', event => {
            if (event.key === 'Escape' && walletModalBackdrop?.classList.contains('open')) {
                closeWalletModal();
            }
        });

        // ── TF buttons ─────────────────────────────────────────────
        document.querySelectorAll('.tf-btn').forEach(btn => {
            if (btn.id === 'add-chart-btn') return;
            btn.addEventListener('click', async () => {
                const tf = btn.dataset.tf;
                if (tf === S.tf) return;
                S.tf = tf;
                document.querySelectorAll('.tf-btn:not(#add-chart-btn)').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                legName.textContent = `${getSelectedCoinLabel(S.coin)}/USD • ${S.tf}`;
                await fetchCandles();
                await fetchCandles2();
                connectWs();
            });
        });

        // ── Panel tabs ─────────────────────────────────────────────
        document.querySelectorAll('.ptab').forEach(tab => {
            tab.addEventListener('click', () => {
                const id = tab.dataset.tab;
                document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                $('tab-' + id).classList.add('active');
            });
        });

        // ── Funding countdown ──────────────────────────────────────
        setInterval(() => {
            const now = new Date(), nextH = new Date(now);
            nextH.setMinutes(0, 0, 0); nextH.setHours(nextH.getHours() + 1);
            const diff = nextH - now;
            const m = String(Math.floor(diff / 60000)).padStart(2, '0');
            const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
            const base = sFund.dataset.base || '';
            sFund.textContent = base + ` 00:${m}:${s}`;
        }, 1000);

        // ── Boot ───────────────────────────────────────────────────
        async function reinit() {
            applyStats();
            await fetchCandles();
            await fetchBook();
            connectWs();
        }

        async function init() {
            await fetchMeta();
            buildCoinList();
            applyStats();
            await fetchCandles();
            await fetchBook();
            connectWs();
            setInterval(() => { if (!document.hidden) fetchBook(); }, 1000);
        }

        init();
    </script>
</body>
</html>
